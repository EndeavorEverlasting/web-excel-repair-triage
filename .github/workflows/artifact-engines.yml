name: Artifact engine tests

permissions:
  contents: write

on:
  pull_request:
  push:
    branches: [main]

jobs:
  artifact-engines:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            python -m pip install openpyxl
          fi
          python -m pip install pytest

      - name: Import artifact engines
        run: |
          python -c "import triage.cybernet_targets.cli; import triage.nw_prj_neuron_track_hours.cli; import triage.nw_prj_neuron_track_hours.bonita_cli; import triage.admin_billing_summary.cli; import triage.one_marcus_recon.cli; import triage.sidecar_html; import triage.artifact_fingerprint; import triage.artifact_profiles; import triage.artifact_compare; import triage.same_family_compare; import triage.roster_log_compare.compare; import triage.roster_log_review_queue.cli; import triage.gitignore_hygiene; print('imports ok')"

      - name: Gitignore hygiene
        run: python -m triage.gitignore_hygiene

      - name: Run artifact engine tests
        run: |
          python -m pytest \
            tests/test_cybernet_targets.py \
            tests/test_nw_prj_neuron_track_hours.py \
            tests/test_nw_prj_neuron_track_hours_bonita.py \
            tests/test_admin_billing_summary.py \
            tests/test_one_marcus_recon.py \
            tests/test_one_marcus_generate.py \
            tests/test_one_marcus_immutability.py \
            tests/test_sidecar_html_portal.py \
            tests/test_artifact_compare.py \
            tests/test_roster_log_compare.py \
            tests/test_same_family_compare.py \
            tests/test_gitignore_hygiene.py \
            tests/test_roster_log_review_queue.py \
            -q

  repair-prompt-kit-header:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/prompt-kit-header-navigation-contract'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Repair canonical sources and regenerate deployed prompt kit
        run: python .github/temp-fix-prompt-kit-header.py

      - name: Restore one-shot staging surfaces
        run: git restore -- .github/workflows/artifact-engines.yml .github/temp-fix-prompt-kit-header.py

      - name: Validate exact operator-opened artifact
        run: |
          python -m py_compile build_prompt_kit.py tests/test_prompt_kit_header_contract.py
          python tests/test_prompt_kit_header_contract.py
          python -m pytest tests/test_prompt_kit_header_contract.py tests/test_harness_doctrine.py -q
          git diff --check
          git status --short
          git diff --stat
          git diff --name-only

      - name: Commit and push repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add build_prompt_kit.py docs/prompt-kit.js web/prompt-kit/index.html web/README.md tests/test_prompt_kit_header_contract.py
          git commit -m 'fix(prompt-kit): lock header navigation contract'
          git push origin HEAD:fix/prompt-kit-header-navigation-contract
