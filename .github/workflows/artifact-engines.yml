name: Artifact engine tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  artifact-engines:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt --quiet
          else
            python -m pip install openpyxl --quiet
          fi
          python -m pip install pytest --quiet

      - name: Import artifact engines
        run: |
          python -c "import triage.cybernet_targets.cli; import triage.nw_prj_neuron_track_hours.cli; import triage.nw_prj_neuron_track_hours.bonita_cli; import triage.admin_billing_summary.cli; import triage.one_marcus_recon.cli; import triage.sidecar_html; import triage.artifact_fingerprint; import triage.artifact_profiles; import triage.artifact_compare; import triage.same_family_compare; import triage.roster_log_compare.compare; import triage.roster_log_review_queue.cli; import triage.gitignore_hygiene; print('imports ok')"

      - name: Gitignore hygiene
        run: python -m triage.gitignore_hygiene

      - name: Test Cybernet targets
        run: python -m pytest tests/test_cybernet_targets.py --tb=short -q

      - name: Test Neuron track hours
        run: python -m pytest tests/test_nw_prj_neuron_track_hours.py --tb=short -q

      - name: Test Neuron track hours Bonita
        run: python -m pytest tests/test_nw_prj_neuron_track_hours_bonita.py --tb=short -q

      - name: Test admin billing summary
        run: python -m pytest tests/test_admin_billing_summary.py --tb=short -q

      - name: Test One Marcus filename date inference
        run: python -m pytest tests/test_one_marcus_recon.py::test_infers_recon_update_date_from_filename --tb=short -q

      - name: Test One Marcus stable tab rename
        run: python -m pytest tests/test_one_marcus_recon.py::test_renames_part_number_tab_to_stable_name --tb=short -q

      - name: Test One Marcus baseline comparison
        run: python -m pytest tests/test_one_marcus_recon.py::test_relinked_workbook_passes_baseline_compare --tb=short -q

      - name: Test One Marcus formula relink
        run: python -m pytest tests/test_one_marcus_recon.py::test_rewrites_formulas_from_old_part_number_tab --tb=short -q

      - name: Test One Marcus external formula localization
        run: python -m pytest tests/test_one_marcus_recon.py::test_localizes_external_part_number_formulas --tb=short -q

      - name: Test One Marcus external link cleanup
        run: python -m pytest tests/test_one_marcus_recon.py::test_removes_external_link_parts_after_localization --tb=short -q

      - name: Test One Marcus calc chain cleanup
        run: python -m pytest tests/test_one_marcus_recon.py::test_removes_calc_chain_after_formula_patch --tb=short -q

      - name: Test One Marcus sheet order preservation
        run: python -m pytest tests/test_one_marcus_recon.py::test_preserves_unrelated_tabs_and_sheet_order --tb=short -q

      - name: Test One Marcus dry run
        run: python -m pytest tests/test_one_marcus_recon.py::test_dry_run_reports_without_output_write --tb=short -q

      - name: Test One Marcus ambiguous date handling
        run: python -m pytest tests/test_one_marcus_recon.py::test_warns_on_ambiguous_date_candidates --tb=short -q

      - name: Test One Marcus Web Excel preflight
        run: python -m pytest tests/test_one_marcus_recon.py::test_webexcel_preflight_rejects_stale_refs_and_stopship_tokens --tb=short -q

      - name: Test One Marcus real workbook regression
        run: python -m pytest tests/test_one_marcus_recon.py::test_real_workbook_idempotent_regression --tb=short -q

      - name: Test One Marcus generation
        run: python -m pytest tests/test_one_marcus_generate.py --tb=short -q

      - name: Test One Marcus immutability
        run: python -m pytest tests/test_one_marcus_immutability.py --tb=short -q

      - name: Test sidecar HTML portal
        run: python -m pytest tests/test_sidecar_html_portal.py --tb=short -q

      - name: Test artifact compare
        run: python -m pytest tests/test_artifact_compare.py --tb=short -q

      - name: Test roster log compare
        run: python -m pytest tests/test_roster_log_compare.py --tb=short -q

      - name: Test same-family compare
        run: python -m pytest tests/test_same_family_compare.py --tb=short -q

      - name: Test Gitignore hygiene contracts
        run: python -m pytest tests/test_gitignore_hygiene.py --tb=short -q

      - name: Test roster log review queue
        run: python -m pytest tests/test_roster_log_review_queue.py --tb=short -q
