name: Governance contract

on:
  pull_request:
    paths:
      - AGENTS.md
      - tests/test_governance_contract.py
      - tests/test_prompt_kit_navigation_governance.py
      - .github/workflows/governance-contract.yml
  push:
    branches: [main]
    paths:
      - AGENTS.md
      - tests/test_governance_contract.py
      - tests/test_prompt_kit_navigation_governance.py
      - .github/workflows/governance-contract.yml

permissions:
  contents: read

jobs:
  governance-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile governance validators
        run: python -m py_compile tests/test_governance_contract.py tests/test_prompt_kit_navigation_governance.py
      - name: Enforce canonical governance doctrine
        run: python -m unittest tests.test_governance_contract tests.test_prompt_kit_navigation_governance -v
      - name: Check patch hygiene
        run: git diff --check origin/main...HEAD
