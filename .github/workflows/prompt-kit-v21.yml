name: AI Prompt Kit contracts

on:
  pull_request:
  push:
    branches: [main]

jobs:
  prompt-kit-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Import validators
        run: |
          python -c "import triage.workbook_package_hygiene; import triage.copy_surface_bounds; import triage.prompt_kit_contract; import triage.prompt_kit_operability_contract; import triage.prompt_kit_copy_range_links; import triage.prompt_kit_v33_generator; import triage.prompt_kit_v33_ooxml; import triage.worksheet_cell_integrity; import triage.web_excel_compatibility_rules; print('prompt kit validators import ok')"
      - name: Run copy-range link contract
        run: python -m pytest tests/test_prompt_kit_copy_range_links.py -q
      - name: Run V33 finalizer contract
        run: python -m pytest tests/test_prompt_kit_v33_generator.py::test_finalize_codifies_navigation_ranges_cream_tabs_and_protection -q
      - name: Run V33 P02 ownership contract
        run: python -m pytest tests/test_prompt_kit_v33_generator.py::test_p02_must_assign_harness_build_work -q
      - name: Generate V33 bundle fixture
        run: |
          python - <<'PY'
          import json
          import runpy
          import zipfile
          from pathlib import Path
          from triage.prompt_kit_v33_generator import generate_v33

          namespace = runpy.run_path('tests/test_prompt_kit_v33_generator.py')
          build_source = namespace['_build_source']
          root = Path('Outputs/ci-v33-bundle')
          root.mkdir(parents=True, exist_ok=True)
          source = root / 'source.xlsx'
          build_source(source)
          source_bundle = root / 'source_bundle.zip'
          with zipfile.ZipFile(source_bundle, 'w', compression=zipfile.ZIP_DEFLATED) as archive:
              archive.write(source, 'AI_Harness_Prompt_Kit_v33.xlsx')
              archive.writestr('AI_Harness_Prompt_Kit_v33_Night_Shift_Quickstart.md', 'quickstart')
          result = generate_v33(source_bundle, root / 'out')
          (root / 'result.json').write_text(json.dumps(result, indent=2), encoding='utf-8')
          PY
      - name: Validate V33 bundle manifest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('Outputs/ci-v33-bundle')
          manifest = json.loads((root / 'out' / 'AI_Harness_Prompt_Kit_v33_manifest.json').read_text())
          assert manifest['gnhf_build_prompt'] == 'P39'
          assert manifest['editable_range'] == 'Opportunity_Discovery!A1:R100'
          assert len(manifest['prompt_ranges']) == 45
          assert manifest['copy_range_links']['prompt_count'] == 45
          assert manifest['copy_range_links']['links_written'] == 90
          PY
      - name: Validate V33 bundle contents
        run: |
          python - <<'PY'
          import json
          import zipfile
          from pathlib import Path
          root = Path('Outputs/ci-v33-bundle')
          result = json.loads((root / 'result.json').read_text())
          with zipfile.ZipFile(result['bundle']) as archive:
              names = set(archive.namelist())
          assert 'AI_Harness_Prompt_Kit_v33.xlsx' in names
          assert 'AI_Harness_Prompt_Kit_v33_manifest.json' in names
          assert 'AI_Harness_Prompt_Kit_v33_Night_Shift_Quickstart.md' in names
          PY
      - name: Run V33 bundle regression test
        run: python -m pytest tests/test_prompt_kit_v33_generator.py::test_generate_bundle_preserves_support_files_and_writes_manifest -q
      - name: Run remaining prompt-kit contract suite
        run: |
          python -m pytest \
            tests/test_workbook_package_hygiene.py \
            tests/test_copy_surface_bounds.py \
            tests/test_prompt_kit_contract.py \
            tests/test_prompt_kit_operability_contract.py \
            tests/test_worksheet_cell_integrity.py \
            tests/test_web_excel_compatibility_rules.py \
            tests/test_prompt_kit_v21.py \
            tests/test_prompt_kit_v21_generator.py \
            tests/test_prompt_kit_v21_repair_regressions.py \
            -q
      - name: Verify CLIs
        run: |
          python -m triage.workbook_package_hygiene --help
          python -m triage.copy_surface_bounds --help
          python -m triage.prompt_kit_contract --help
          python -m triage.prompt_kit_operability_contract --help
          python -m triage.prompt_kit_copy_range_links --help
          python -m triage.prompt_kit_v33_generator --help
          python -m triage.worksheet_cell_integrity --help
          python -m triage.web_excel_compatibility_rules --help
