name: Repair V39 scaffold materialization

on:
  pull_request:
    branches:
      - feat/prompt-kit-v39-segmented
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/v39-structural-visual-contract
          fetch-depth: 0

      - name: Apply bounded scaffold repair
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          source_path = Path('triage/prompt_kit_v39_ooxml_base.py')
          source = source_path.read_text(encoding='utf-8')
          apply_pattern = re.compile(
              r'''        rows = _row_lookup\(prompt_root\)\n'''
              r'''        filled = 0\n'''
              r'''.*?'''
              r'''        prompts\.append\(\{"sheet": sheet_name, "range": range_str, "top_nav_row": top_nav, "bottom_nav_row": bottom_nav, "columns": columns, "cells_filled": filled\}\)\n''',
              re.DOTALL,
          )
          new_apply = '''        rows = _row_lookup(prompt_root)
          sheet_data = prompt_root.find("m:sheetData", NS)
          if sheet_data is None:
              raise ValueError(f"prompt tab {sheet_name} has no sheetData element")
          xfs_element = _ensure_collection(styles, "cellXfs")
          scaffold_style_cache: dict[int, int] = {}

          def scaffold_style_for(base_style: int) -> int:
              cached = scaffold_style_cache.get(base_style)
              if cached is not None:
                  return cached
              xfs = list(xfs_element)
              if base_style < 0 or base_style >= len(xfs):
                  raise ValueError(
                      f"prompt tab {sheet_name} cell style {base_style} is outside cellXfs"
                  )
              base_xf = xfs[base_style]
              base_fill_id = int(base_xf.attrib.get("fillId", "0"))
              if base_fill_id == scaffold_fill_id:
                  scaffold_style_cache[base_style] = base_style
                  return base_style
              new_xf = deepcopy(base_xf)
              new_xf.attrib["fillId"] = str(scaffold_fill_id)
              new_xf.attrib["applyFill"] = "1"
              style_id = _ensure_style_child(xfs_element, new_xf)
              scaffold_style_cache[base_style] = style_id
              return style_id

          def ensure_row(row_number: int) -> ET.Element:
              existing = rows.get(row_number)
              if existing is not None:
                  return existing
              row = ET.Element(f"{{{MAIN_NS}}}row", {"r": str(row_number)})
              insertion = len(list(sheet_data))
              for index, candidate in enumerate(list(sheet_data)):
                  candidate_number = int(candidate.attrib.get("r", "0"))
                  if candidate_number > row_number:
                      insertion = index
                      break
              sheet_data.insert(insertion, row)
              rows[row_number] = row
              return row

          def insert_cell(row: ET.Element, cell: ET.Element, ref: str) -> None:
              target_column = _impl._column_number(_cell_parts(ref)[0])
              insertion = len(list(row))
              for index, candidate in enumerate(list(row)):
                  candidate_ref = candidate.attrib.get("r", "")
                  if candidate_ref and _impl._column_number(_cell_parts(candidate_ref)[0]) > target_column:
                      insertion = index
                      break
              row.insert(insertion, cell)

          filled = 0
          materialized = 0
          for row_number in range(top_nav, bottom_nav + 1):
              row = ensure_row(row_number)
              for col in columns:
                  ref = f"{col}{row_number}"
                  cell = next((c for c in row.findall("m:c", NS) if c.attrib.get("r") == ref), None)
                  if cell is None:
                      style_id = scaffold_style_for(0)
                      cell = ET.Element(
                          f"{{{MAIN_NS}}}c",
                          {"r": ref, "s": str(style_id)},
                      )
                      insert_cell(row, cell, ref)
                      filled += 1
                      materialized += 1
                      continue
                  base_style = int(cell.attrib.get("s", "0"))
                  style_id = scaffold_style_for(base_style)
                  if style_id == base_style:
                      continue
                  cell.attrib["s"] = str(style_id)
                  filled += 1
          mutable[part] = _xml(prompt_root)
          changed.add(part)
          prompts.append({"sheet": sheet_name, "range": range_str, "top_nav_row": top_nav, "bottom_nav_row": bottom_nav, "columns": columns, "cells_filled": filled, "cells_materialized": materialized})
          '''
          source, apply_count = apply_pattern.subn(new_apply, source, count=1)
          if apply_count != 1:
              raise SystemExit(f'apply scaffold replacement count was {apply_count}, expected 1')

          validate_pattern = re.compile(
              r'''        for row_number in range\(top_nav, bottom_nav \+ 1\):\n'''
              r'''            row = rows\.get\(row_number\)\n'''
              r'''            if row is None:\n'''
              r'''                continue\n'''
              r'''            for col in columns:\n'''
              r'''                ref = f"\{col\}\{row_number\}"\n'''
              r'''                cell = next\(\(c for c in row\.findall\("m:c", NS\) if c\.attrib\.get\("r"\) == ref\), None\)\n'''
              r'''                if cell is None:\n'''
              r'''                    continue\n'''
              r'''                style_id = int\(cell\.attrib\.get\("s", "0"\)\)\n'''
          )
          new_validate = '''        for row_number in range(top_nav, bottom_nav + 1):
              row = rows.get(row_number)
              if row is None:
                  uncovered.extend(f"{col}{row_number}" for col in columns)
                  continue
              for col in columns:
                  ref = f"{col}{row_number}"
                  cell = next((c for c in row.findall("m:c", NS) if c.attrib.get("r") == ref), None)
                  if cell is None:
                      uncovered.append(ref)
                      continue
                  style_id = int(cell.attrib.get("s", "0"))
          '''
          source, validate_count = validate_pattern.subn(new_validate, source, count=1)
          if validate_count != 1:
              raise SystemExit(f'validate scaffold replacement count was {validate_count}, expected 1')
          source_path.write_text(source, encoding='utf-8')

          test_path = Path('tests/test_prompt_kit_v39_visual_coordination.py')
          tests = test_path.read_text(encoding='utf-8')
          marker = '    def test_scaffold_preserves_formulas_and_text(self):\n'
          regression = '''    def test_scaffold_materializes_blank_cells_across_claimed_range(self):
              prompts = [("P00", "P00 Test", "Cream", _medium_prompt())]
              parts = _multi_prompt_parts(prompts)
              before = ooxml._root(parts["xl/worksheets/sheet2.xml"], "prompt")
              before_cells = ooxml._cells(before)
              assert before_cells.get("B2") is None
              assert before_cells.get("C4") is None

              _, report = ooxml._apply_prompt_body_scaffold(parts)

              after = ooxml._root(parts["xl/worksheets/sheet2.xml"], "prompt")
              after_cells = ooxml._cells(after)
              for row_number in range(1, 6):
                  for column in ("A", "B", "C"):
                      assert after_cells.get(f"{column}{row_number}") is not None
              assert report["prompts"][0]["cells_materialized"] == 6
              assert ooxml._validate_prompt_body_scaffold(parts) == ()

          '''
          if marker not in tests:
              raise SystemExit('scaffold regression insertion marker not found')
          tests = tests.replace(marker, regression + marker, 1)
          test_path.write_text(tests, encoding='utf-8')
          PY

      - name: Validate focused and full V39 contracts
        run: |
          python -m pytest tests/test_prompt_kit_v39_visual_coordination.py -q
          python -m pytest tests/test_prompt_kit_v39_*.py tests/test_prompt_kit_visual_contract.py -q
          python -m triage.prompt_kit_visual_contract --json
          git diff --check

      - name: Commit repair and remove trigger
        shell: bash
        run: |
          rm .github/workflows/repair-v39-scaffold-materialization.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add triage/prompt_kit_v39_ooxml_base.py tests/test_prompt_kit_v39_visual_coordination.py .github/workflows/repair-v39-scaffold-materialization.yml
          git commit -m "fix(visual): materialize scaffold cells across prompt ranges"
          git push origin HEAD:repair/v39-structural-visual-contract
