name: Skill prompt registry and generator UX

on:
  pull_request:
    paths:
      - docs/prompts.json
      - registry/prompts/skill-development-prompts.v1.json
      - registry/prompts/actionable-next-step-policy.v1.json
      - .ai/skills/skill-factoring/SKILL.md
      - configs/prompt_kit/generators.v1.json
      - scripts/build_prompt_kit_registry.py
      - scripts/prompt_kit_generator_gui.py
      - Run-PromptKitGenerator.cmd
      - Build-PromptKitWebsite.cmd
      - tests/test_skill_prompt_registry.py
      - tests/test_actionable_prompt_registry.py
      - web/prompt-kit/index.html
      - docs/PROMPT_KIT_GENERATOR_OPERATOR_GUIDE.md
      - .github/workflows/skill-prompt-registry.yml
  push:
    branches: [main]
    paths:
      - docs/prompts.json
      - registry/prompts/skill-development-prompts.v1.json
      - registry/prompts/actionable-next-step-policy.v1.json
      - .ai/skills/skill-factoring/SKILL.md
      - configs/prompt_kit/generators.v1.json
      - scripts/build_prompt_kit_registry.py
      - scripts/prompt_kit_generator_gui.py
      - Run-PromptKitGenerator.cmd
      - Build-PromptKitWebsite.cmd
      - tests/test_skill_prompt_registry.py
      - tests/test_actionable_prompt_registry.py
      - web/prompt-kit/index.html
      - docs/PROMPT_KIT_GENERATOR_OPERATOR_GUIDE.md
      - .github/workflows/skill-prompt-registry.yml

permissions:
  contents: write

jobs:
  skill-prompts-and-generators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate tracked Prompt Kit website on the owned branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          python scripts/build_prompt_kit_registry.py --output web/prompt-kit/index.html
          if ! git diff --quiet -- web/prompt-kit/index.html; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add web/prompt-kit/index.html
            git commit -m "chore(prompt-kit): regenerate skill eval prompt website"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi
      - name: Compile registry builder, GUI, and tests
        run: |
          python -m py_compile \
            scripts/build_prompt_kit_registry.py \
            scripts/prompt_kit_generator_gui.py \
            tests/test_skill_prompt_registry.py \
            tests/test_actionable_prompt_registry.py
      - name: Run skill prompt and launcher contracts
        run: |
          python -m unittest tests.test_skill_prompt_registry -v
          python -m unittest tests.test_actionable_prompt_registry -v
      - name: Validate checked-in combined Prompt Kit website
        run: |
          python scripts/build_prompt_kit_registry.py --output web/prompt-kit/index.html --check
          grep -F '"id": "P61"' web/prompt-kit/index.html
          grep -F '"id": "P62"' web/prompt-kit/index.html
          grep -F 'Skill Correctness and Efficiency Eval Implementer' web/prompt-kit/index.html
          grep -F 'ACTIONABLE NEXT COMMAND AND NEXT STEPS CONTRACT' web/prompt-kit/index.html
      - name: Check patch hygiene
        run: git diff --check origin/main...HEAD
