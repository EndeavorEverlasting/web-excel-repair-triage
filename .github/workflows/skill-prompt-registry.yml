name: Skill prompt registry and generator UX

on:
  pull_request:
    paths:
      - registry/prompts/skill-development-prompts.v1.json
      - .ai/skills/skill-factoring/SKILL.md
      - configs/prompt_kit/generators.v1.json
      - scripts/build_prompt_kit_registry.py
      - scripts/prompt_kit_generator_gui.py
      - Run-PromptKitGenerator.cmd
      - Build-PromptKitWebsite.cmd
      - tests/test_skill_prompt_registry.py
      - web/prompt-kit/index.html
      - docs/PROMPT_KIT_GENERATOR_OPERATOR_GUIDE.md
      - .github/workflows/skill-prompt-registry.yml

permissions:
  contents: write

jobs:
  skill-prompts-and-generators:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile registry builder, GUI, and tests
        run: |
          python -m py_compile \
            scripts/build_prompt_kit_registry.py \
            scripts/prompt_kit_generator_gui.py \
            tests/test_skill_prompt_registry.py
      - name: Build combined Prompt Kit website
        run: python scripts/build_prompt_kit_registry.py --output web/prompt-kit/index.html
      - name: Validate combined Prompt Kit website
        run: |
          python scripts/build_prompt_kit_registry.py --output web/prompt-kit/index.html --check
          python -m unittest tests.test_skill_prompt_registry -v
          grep -F '"id": "P61"' web/prompt-kit/index.html
          grep -F '"id": "P62"' web/prompt-kit/index.html
      - name: Check patch hygiene
        run: git diff --check
      - name: Commit deterministic operator site
        run: |
          if git diff --quiet -- web/prompt-kit/index.html; then
            echo "Operator site already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/prompt-kit/index.html
          git commit -m "build(prompt-kit): regenerate combined operator site"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
