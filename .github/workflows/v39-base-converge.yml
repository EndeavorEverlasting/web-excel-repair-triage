name: V39 one-shot base convergence

on:
  push:
    branches:
      - feat/prompt-kit-v39-segmented

permissions:
  contents: write

jobs:
  converge-current-v38-base:
    if: ${{ !startsWith(github.event.head_commit.message, 'merge(prompt-kit): converge current V38 base') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Merge current V38 base and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin feat/prompt-kit-v33-self-service-generator

          set +e
          git merge --no-commit --no-ff origin/feat/prompt-kit-v33-self-service-generator
          merge_status=$?
          set -e

          unmerged="$(git diff --name-only --diff-filter=U)"
          unexpected="$(printf '%s\n' "$unmerged" | sed '/^$/d' | grep -v '^\.github/workflows/prompt-kit-v21\.yml$' || true)"
          if [[ -n "$unexpected" ]]; then
            echo "Unexpected merge conflicts:" >&2
            printf '%s\n' "$unexpected" >&2
            exit 1
          fi

          if printf '%s\n' "$unmerged" | grep -qx '.github/workflows/prompt-kit-v21.yml'; then
            git checkout --ours .github/workflows/prompt-kit-v21.yml
            git add .github/workflows/prompt-kit-v21.yml
          fi

          rm .github/workflows/v39-base-converge.yml
          git add -A

          if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            git commit -m "merge(prompt-kit): converge current V38 base"
          elif ! git diff --cached --quiet; then
            git commit -m "chore(prompt-kit): remove completed convergence workflow"
          else
            echo "No convergence commit required."
            exit 0
          fi

          git push origin HEAD:feat/prompt-kit-v39-segmented
