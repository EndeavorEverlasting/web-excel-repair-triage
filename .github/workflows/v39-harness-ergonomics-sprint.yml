name: V39 harness ergonomics and tab colors

on:
  pull_request:
    types: [synchronize, opened, reopened]

permissions:
  contents: write

jobs:
  apply-validate-commit:
    if: github.event.pull_request.number == 68 && github.event.pull_request.head.ref == 'feat/prompt-kit-v39-segmented'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/prompt-kit-v39-segmented
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Reconstruct, validate, commit, and push owned harness changes
        id: sprint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          (
            set -euxo pipefail
            git fetch origin tmp/v39-harness-payload:refs/remotes/origin/tmp/v39-harness-payload
            : > /tmp/v39-harness-patch.b64
            for part in \
              v39-harness-patch.part01 v39-harness-patch.part02 v39-harness-patch.part03 \
              v39-harness-patch.part04a v39-harness-patch.part04b \
              v39-harness-patch.part05 v39-harness-patch.part06 v39-harness-patch.part07 \
              v39-harness-patch.part08 v39-harness-patch.part09 \
              v39-harness-patch.part10a v39-harness-patch.part10b \
              v39-harness-patch.part11a v39-harness-patch.part11b \
              v39-harness-patch.part12a v39-harness-patch.part12b \
              v39-harness-patch.part13a v39-harness-patch.part13b
            do
              git show "origin/tmp/v39-harness-payload:.harness-payload/$part" >> /tmp/v39-harness-patch.b64
            done
            base64 -d /tmp/v39-harness-patch.b64 > /tmp/v39-harness-patch.tar.xz
            echo '6d16a9910e8c64dab26603087534f2fab815ad8c52992211e54e2784f4dfa79b  /tmp/v39-harness-patch.tar.xz' | sha256sum -c -
            tar -xJf /tmp/v39-harness-patch.tar.xz -C .

            python -m json.tool configs/harness/harness_manifest_v1.json >/dev/null
            python -m json.tool configs/harness/workflows_v1.json >/dev/null
            python -m json.tool configs/harness/run_context.schema.json >/dev/null
            python -m json.tool configs/harness/artifact_registry_v1.json >/dev/null
            python -m json.tool configs/harness/code_intelligence_v1.json >/dev/null
            python -m json.tool configs/harness/handoff_contract_v1.json >/dev/null
            python -m json.tool configs/harness/operational_discipline_v1.json >/dev/null
            python -m json.tool configs/harness/prompt_library_visual_policy_v1.json >/dev/null
            python -m json.tool configs/prompt_kit/v39_standard_ai_extensions.json >/dev/null
            python -m json.tool configs/prompt_kit/v39_gnhf_harness_prompts.json >/dev/null

            python -m pytest \
              tests/test_prompt_kit_v39_generator.py \
              tests/test_prompt_kit_v39_action_commitment.py \
              tests/test_prompt_kit_v39_generated_navigation.py \
              tests/test_prompt_kit_v39_generated_row_links.py \
              tests/test_prompt_kit_v39_library_footer.py \
              tests/test_prompt_kit_v39_library_navigation.py \
              tests/test_prompt_kit_v39_library_row_links.py \
              tests/test_prompt_kit_v39_namespace_prefixes.py \
              tests/test_prompt_kit_v39_public_surface.py \
              tests/test_prompt_kit_visual_contract.py \
              tests/test_prompt_kit_v39_visual_coordination.py \
              tests/test_harness_operational_discipline.py \
              tests/test_repo_harness_manifest.py \
              tests/test_prompt_kit_v38_cmd_launchers.py \
              tests/test_prompt_kit_copy_range_links.py \
              tests/test_prompt_kit_v38_prompt_assets.py \
              tests/test_prompt_kit_v38_generator.py \
              tests/test_prompt_kit_v33_generator.py \
              tests/test_workbook_package_hygiene.py \
              tests/test_copy_surface_bounds.py \
              tests/test_prompt_kit_contract.py \
              tests/test_prompt_kit_operability_contract.py \
              tests/test_worksheet_cell_integrity.py \
              tests/test_web_excel_compatibility_rules.py \
              tests/test_prompt_kit_v21.py \
              tests/test_prompt_kit_v21_generator.py \
              tests/test_prompt_kit_v21_repair_regressions.py \
              -q --junitxml=/tmp/v39-harness-junit.xml

            python -m triage.harness_operational_discipline --repo-root . --json > /tmp/harness-operational-report.json
            python -m triage.harness_operator_report --repo-root . --json > /tmp/harness-operator-report.json
            python -m triage.prompt_kit_visual_contract --json > /tmp/prompt-visual-report.json
            git diff --check

            tar -cJf /tmp/v39-harness-validated-source.tar.xz \
              AGENTS.md HARNESS.md configs/harness configs/prompt_kit/v39_gnhf_harness_prompts.json \
              configs/prompt_kit/v39_standard_ai_extensions.json triage docs/HARNESS_OPERATIONAL_DISCIPLINE.md \
              docs/AI_PROMPT_KIT_V39_SEGMENTATION.md docs/harness skills .githooks scripts/Install-HarnessHooks.ps1 tests

            rm -f .github/V39_HARNESS_ERGONOMICS_TRIGGER.md .github/V39_HARNESS_PAYLOAD_DIAGNOSTIC_TRIGGER.md
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add \
              AGENTS.md HARNESS.md configs/harness \
              configs/prompt_kit/v39_gnhf_harness_prompts.json \
              configs/prompt_kit/v39_standard_ai_extensions.json \
              triage/prompt_kit_visual_contract.py \
              triage/harness_operational_discipline.py \
              triage/harness_operator_report.py \
              triage/harness_handoff.py \
              triage/prompt_kit_v39_ooxml_base.py \
              triage/_prompt_kit_v39_package_primitives_impl.py \
              triage/_prompt_kit_v39_generator_legacy.py \
              triage/prompt_kit_v39_generator.py \
              docs/HARNESS_OPERATIONAL_DISCIPLINE.md \
              docs/AI_PROMPT_KIT_V39_SEGMENTATION.md docs/harness skills \
              .githooks/pre-commit scripts/Install-HarnessHooks.ps1 \
              tests/test_prompt_kit_visual_contract.py \
              tests/test_repo_harness_manifest.py \
              tests/test_prompt_kit_v39_visual_coordination.py \
              tests/test_harness_operational_discipline.py \
              .github/V39_HARNESS_ERGONOMICS_TRIGGER.md \
              .github/V39_HARNESS_PAYLOAD_DIAGNOSTIC_TRIGGER.md
            git commit -m 'feat(harness): enforce prompt ergonomics and semantic tab colors'
            git push origin HEAD:feat/prompt-kit-v39-segmented
          ) > /tmp/v39-harness-sprint.log 2>&1
          status=$?
          cat /tmp/v39-harness-sprint.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v39-harness-ergonomics-evidence
          path: |
            /tmp/v39-harness-sprint.log
            /tmp/v39-harness-junit.xml
            /tmp/harness-operational-report.json
            /tmp/harness-operator-report.json
            /tmp/prompt-visual-report.json
            /tmp/v39-harness-validated-source.tar.xz
          if-no-files-found: error
      - name: Fail when sprint failed
        if: steps.sprint.outputs.status != '0'
        run: exit 1
