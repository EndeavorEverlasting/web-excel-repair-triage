name: V39 harness payload diagnostic

on:
  pull_request:
    types: [synchronize, opened, reopened]

jobs:
  diagnose-payload:
    if: github.event.pull_request.number == 68 && github.event.pull_request.head.ref == 'feat/prompt-kit-v39-segmented'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/prompt-kit-v39-segmented
          fetch-depth: 0
      - name: Diagnose staged payload
        id: diagnostic
        continue-on-error: true
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            git fetch origin tmp/v39-harness-payload:refs/remotes/origin/tmp/v39-harness-payload
            : > /tmp/v39-harness-patch.b64
            for part in \
              v39-harness-patch.part01 v39-harness-patch.part02 v39-harness-patch.part03 \
              v39-harness-patch.part04a v39-harness-patch.part04b \
              v39-harness-patch.part05 v39-harness-patch.part06 v39-harness-patch.part07 \
              v39-harness-patch.part08 v39-harness-patch.part09 \
              v39-harness-patch.part10a v39-harness-patch.part10b \
              v39-harness-patch.part11a v39-harness-patch.part11b \
              v39-harness-patch.part12a v39-harness-patch.part12b \
              v39-harness-patch.part13a v39-harness-patch.part13b
            do
              bytes=$(git show "origin/tmp/v39-harness-payload:.harness-payload/$part" | wc -c)
              printf '%s %s\n' "$part" "$bytes"
              git show "origin/tmp/v39-harness-payload:.harness-payload/$part" >> /tmp/v39-harness-patch.b64
            done
            printf 'assembled-base64-bytes '
            wc -c < /tmp/v39-harness-patch.b64
            base64 -d /tmp/v39-harness-patch.b64 > /tmp/v39-harness-patch.tar.xz
            sha256sum /tmp/v39-harness-patch.tar.xz
            echo '6d16a9910e8c64dab26603087534f2fab815ad8c52992211e54e2784f4dfa79b  /tmp/v39-harness-patch.tar.xz' | sha256sum -c -
            xz -t /tmp/v39-harness-patch.tar.xz
            tar -tJf /tmp/v39-harness-patch.tar.xz
          ) > /tmp/v39-harness-payload-diagnostic.log 2>&1
          status=$?
          cat /tmp/v39-harness-payload-diagnostic.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v39-harness-payload-diagnostic
          path: /tmp/v39-harness-payload-diagnostic.log
          if-no-files-found: error
      - name: Fail when payload is invalid
        if: steps.diagnostic.outputs.status != '0'
        run: exit 1
