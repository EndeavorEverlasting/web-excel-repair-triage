name: V39 row links sprint diagnostic

on:
  pull_request:
    types: [synchronize, opened, reopened]

jobs:
  diagnose:
    if: github.event.pull_request.number == 68 && github.event.pull_request.head.ref == 'feat/prompt-kit-v39-segmented'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/prompt-kit-v39-segmented
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Reuse staged patch and capture actionable log
        id: diagnostic
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/v39-row-links-harness-sprint.yml').read_text(encoding='utf-8')
          marker = '      PATCH_B64: >-\n        '
          start = text.index(marker) + len(marker)
          payload = text[start:text.index('\n    steps:', start)].strip()
          Path('/tmp/patch.b64').write_text(payload, encoding='ascii')
          PY
          {
            set -x
            base64 -d /tmp/patch.b64 | gzip -d > /tmp/apply_v39_sprint.py
            python /tmp/apply_v39_sprint.py
            python -m json.tool configs/prompt_kit/v39_standard_ai_extensions.json >/dev/null
            python -m json.tool configs/harness/operational_discipline_v1.json >/dev/null
            python -m pytest \
              tests/test_prompt_kit_v39_generator.py \
              tests/test_prompt_kit_v39_action_commitment.py \
              tests/test_prompt_kit_v39_generated_navigation.py \
              tests/test_prompt_kit_v39_generated_row_links.py \
              tests/test_prompt_kit_v39_library_footer.py \
              tests/test_prompt_kit_v39_library_navigation.py \
              tests/test_prompt_kit_v39_library_row_links.py \
              tests/test_prompt_kit_v39_namespace_prefixes.py \
              tests/test_prompt_kit_v39_public_surface.py \
              tests/test_harness_operational_discipline.py \
              -q
            python -m triage.harness_operational_discipline --json
            git diff --check
          } > /tmp/v39-diagnostic.log 2>&1
          status=$?
          cat /tmp/v39-diagnostic.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v39-row-links-diagnostic-log
          path: /tmp/v39-diagnostic.log
          if-no-files-found: error
      - name: Fail when diagnostic found errors
        if: steps.diagnostic.outputs.status != '0'
        run: exit 1
