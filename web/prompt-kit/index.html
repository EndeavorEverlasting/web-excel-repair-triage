 5 passed / 1 skipped / 0 failed\nValidator should:\n1. detect repo root\n2. print branch and commit\n3. run safe offline validators\n4. detect optional components\n5. emit JSON result\n6. emit English matrix\n7. never claim runtime proof\n8. fail clearly when a required validator is broken\nTests must prove:\n- validator exists and parses\n- prints matrix\n- emits JSON\n- does not launch app/game/browser unless explicitly runtime lane\n- does not mutate targets/data\n- skips optional missing dependencies honestly\nFinal response:\nmatrix behavior, dependencies detected, tests run, skipped checks and why, generated artifacts, git state, exact next command, PR URL if opened.", "keywords": ["validator", "gate", "pass skip fail", "validation matrix", "aggregate proof", "harness validator", "acceptance"]}, {"id": "P12", "seq": "12", "name": "Final Handoff Compressor", "type": "CLOSEOUT", "class": "CLOSEOUT / HANDOFF", "sprintRole": "Compress exact sprint state", "progress": "Mandatory close", "useWhen": "A serious sprint is complete or blocked and the next chat must continue cleanly.", "inspectFirst": "Git state, PR state, changed files, artifacts, validation, gaps.", "expectedOutput": "Concise next-agent handoff and exact next command.", "nextStep": "Start next sprint.", "proofGate": "No archaeology is required.", "color": "Gray", "copySheet": "P12_COPY_SAFE", "category": "standard", "copyContent": "COMPRESS THIS SPRINT INTO A NEXT-AGENT HANDOFF.\nInclude:\n- repo\n- branch\n- PR/sprint\n- lane\n- owned scope\n- forbidden scope\n- what changed\n- files changed\n- artifacts produced\n- validation run\n- skipped checks\n- known gaps\n- risks\n- important paths\n- git state\n- next command\n- copy-paste prompt for the next agent\nAlso classify the proof level reached:\n- contract proof\n- harness proof\n- static test proof\n- build proof\n- launcher/browser proof\n- command ACK proof\n- behavior observed proof\n- live runtime proof\nDo not include narrative fluff. Preserve only context that prevents rework. If parallel work is safe, name separate lanes and collision risks.", "keywords": ["closeout", "handoff", "compress", "next agent", "sprint state", "final handoff", "next command"]}, {"id": "P13", "seq": "13", "name": "Self-Improving Rules Review", "type": "IMPROVE", "class": "IMPROVE / RULES", "sprintRole": "Turn repeated pain into repo doctrine", "progress": "Support", "useWhen": "A mistake, explanation, or setup problem repeats.", "inspectFirst": "Sprint evidence, rules, validators, hooks, skills.", "expectedOutput": "Small proposed rule/validator/hook changes.", "nextStep": "Operator approves or P07 implements.", "proofGate": "Rules remain bounded and useful.", "color": "Lavender", "copySheet": "P13_COPY_SAFE", "category": "standard", "copyContent": "Review this sprint for reusable harness-rule updates.\nDo not rewrite project rules automatically unless explicitly authorized.\nOutput:\n1. WHAT REPEATED\n- What mistake, explanation, setup, command, or safety issue came up again?\n2. MISSING RULE\n- What rule would have prevented rework?\n3. TARGET FILE\n- Which repo-local rule file should receive it?\n- root rules, path-scoped rules, workflow contract, validator, hook, codebase map, or handoff template?\n4. EXACT WORDING\n- Provide concise text that could be pasted into the target file.\n5. VALIDATION GAP\n- What validator, test, hook, or artifact check should be added?\n6. DELETE / PRUNE\n- Name any stale rule that should be removed or simplified.\n7. OPERATOR DECISION\n- automatic / advisory / operator-approved\n- reason\nKeep the update small. The goal is repo memory, not a rule landfill.", "keywords": ["improve rules", "self improving", "repeated pain", "lesson learned", "rule change", "validator change", "hook change"]}, {"id": "P14", "seq": "14", "name": "Pull Request Review + Repair Executor", "type": "REVIEW + REPAIR", "class": "PR / REVIEW REPAIR", "sprintRole": "Fix a specific PR and respond to review/CI", "progress": "YES", "useWhen": "One PR has requested changes, failing checks, drift, or scope defects.", "inspectFirst": "PR metadata, comments, threads, diff, checks, branch state.", "expectedOutput": "Applied repairs, pushed commits, updated PR and review state.", "nextStep": "Use P15 when merge-ready.", "proofGate": "Exact-head repair and PR-update evidence.", "color": "Cyan", "copySheet": "P14_COPY_SAFE", "category": "standard", "copyContent": "REVIEW AND REPAIR THE PULL REQUEST. APPLY THE FIXES, PUSH THEM, AND UPDATE THE PR.\nRepo: xyz_repo_or_path\nPR: xyz_pr_number\nSprint: xyz_sprint_name\nOwned scope: xyz_owned_scope\nForbidden scope: xyz_forbidden_scope\nValidation order: xyz_validation_order\nMISSION\nResolve the PR's concrete review, CI, mergeability, scope, documentation, and hygiene defects.\nDo not merely summarize comments or checks.\nInspect the exact PR head, reproduce the failure when practical, make bounded changes, validate them, push them, and update the PR.\nREVIEW INTAKE\nInspect:\n- PR title, body, base, head, draft state, labels, reviewers, comments, and review threads\n- changed files and diff\n- failing, pending, skipped, or missing checks\n- requested changes\n- branch divergence and merge conflicts\n- unrelated changes or accidental generated artifacts\n- repository rules and expected proof\nREPAIR RULES\n- address actionable review comments in code or docs\n- reply to or resolve review threads only after the change exists\n- preserve unrelated valid work\n- remove accidental scope drift\n- update tests and validators with behavior\n- update the PR body when the actual file list, proof, risk, or rollout changed\n- push to the existing PR branch unless a safer replacement branch is required\n- do not rewrite the whole feature to satisfy one comment\n- do not mark ready or request merge while required checks remain unresolved\nVALIDATION\nRun targeted checks first, then broader checks in the declared order.\nInspect final:\ngit diff --check\ngit status --short\ngit diff <base>...HEAD\ngh pr checks xyz_pr_number\ngh pr view xyz_pr_number\nFINAL RESPONSE\n- repo:\n- PR:\n- head branch and SHA:\n- review findings addressed:\n- files changed:\n- commits pushed:\n- PR metadata/comments/review threads updated:\n- validation:\n- remaining blockers:\n- merge readiness:\n- exact next command:\nA response without applied repairs, push/PR-update evidence, an exact blocker, or proof that the PR was already clean is invalid.", "keywords": ["pr review", "review repair", "pull request", "requested changes", "failing checks", "ci fix", "drift"]}, {"id": "P15", "seq": "15", "name": "Merge + Release Executor", "type": "INTEGRATE", "class": "MERGE / RELEASE", "sprintRole": "Merge ready work and release from a clean base", "progress": "YES", "useWhen": "Validated PRs or branches are ready to integrate, tag, or publish.", "inspectFirst": "PR heads, checks, approvals, dependency order, release policy.", "expectedOutput": "Merges, closures, tags, releases, refreshed canonical base.", "nextStep": "Use P12.", "proofGate": "Merge/release artifacts and SHAs exist.", "color": "Indigo", "copySheet": "P15_COPY_SAFE", "category": "standard", "copyContent": "INTEGRATE THE READY WORK. MERGE IN DEPENDENCY ORDER, RELEASE WHEN IN SCOPE, AND LEAVE A CLEAN BASE.\nRepo: xyz_repo_or_path\nTarget base: xyz_target_base\nPRs or branches: xyz_pr_numbers\nRelease version if applicable: xyz_release_version\nForbidden scope: xyz_forbidden_scope\nMISSION\nIntegrate approved, validated work without losing unique commits or creating unnecessary branch stacks.\nMerge green predecessors first, refresh the canonical base, and continue in dependency order.\nWhen release work is in scope, update versioning, release notes, tags, and published artifacts only after validation supports them.\nMERGE / RELEASE RULES\n- verify exact PR heads have not moved\n- confirm required checks, approvals, and mergeability\n- inspect unique commits and cross-PR dependencies\n- cherry-pick useful isolated commits when merging an entire branch would import unwanted scope\n- do not merge a dependent PR before its predecessor unless explicit stacking policy allows it\n- do not squash away required provenance when repo policy requires commit preservation\n- close or retarget superseded PRs after preservation\n- refresh the canonical base after every merge wave\n- do not tag or publish from a dirty, stale, or unverified base\n- do not claim release success without tag/artifact/publish evidence\nVALIDATION\nRun merge-gate and release-gate checks in repo order.\nRecord exact merge SHAs, tag, release URL, artifacts, and skipped checks.\nFINAL RESPONSE\n- repo and canonical base:\n- PRs merged:\n- commits cherry-picked:\n- PRs closed or retargeted:\n- release version/tag:\n- release artifacts:\n- validation:\n- final base SHA:\n- remaining blocked work:\n- exact next command:\nPerform the integration. Do not stop at a readiness report.", "keywords": ["merge", "release", "integrate", "tag", "publish", "land pr", "merge ready"]}, {"id": "P16", "seq": "16", "name": "Cross-Repo Contribution Router", "type": "INTEROP", "class": "CROSS-REPO / CONTRIBUTE", "sprintRole": "Factor portable insight into the correct repos", "progress": "YES", "useWhen": "A donor repo contains reusable harness, skills, schemas, or adapters.", "inspectFirst": "Donor authority, pinned commits, consumer contracts, boundaries.", "expectedOutput": "Versioned contribution manifest/schema/adapter and repo changes.", "nextStep": "Use P11 or P12.", "proofGate": "No duplicated or circular authority.", "color": "Blue-Green", "copySheet": "P16_COPY_SAFE", "category": "standard", "copyContent": "FACTOR THE REUSABLE INSIGHT INTO THE CORRECT REPOSITORIES. DO NOT DUPLICATE AUTHORITY.\nDonor repo: xyz_repo_or_path\nConsumer repo or repos: xyz_consumer_repos\nSprint: xyz_sprint_name\nOwned scope: xyz_owned_scope\nForbidden scope: xyz_forbidden_scope\nMISSION\nIdentify what is portable, what remains domain-specific, and which repository owns each contract.\nImplement the smallest useful cross-repository contribution with explicit source authority, versioning, validation, and collision boundaries.\nCONTRIBUTION BOUNDARY\nFor each candidate classify:\n- portable harness\n- reusable skill\n- shared schema or evidence packet\n- adapter\n- reference-only doctrine\n- domain-specific and rejected from extraction\nRecord:\n- donor repository and pinned commit\n- authoritative source paths\n- target repository and target layer\n- capabilities donated\n- proof ceiling\n- compatibility/version contract\n- what must not be copied or reimplemented\nWORK RULES\n- donor repo remains authoritative for domain behavior\n- consumer repo must implement its own tests and validators\n- contribution manifests are adoption proposals, not runtime proof\n- prefer adapters and schemas over source duplication\n- do not create circular authority\n- update both sides only when their contracts genuinely change\nVALIDATION\nValidate donor references, schemas, adapters, tests, and stale-reference handling.\nFINAL RESPONSE\n- donor and consumer repos:\n- ownership map:\n- files changed in each repo:\n- contribution manifest/schema/adapter:\n- commits and PRs:\n- validation:\n- rejected or reference-only items:\n- collision risks:\n- exact next command:\nProduce repository changes, not merely an architecture essay.", "keywords": ["cross repo", "interop", "contribute", "portable", "donor repo", "consumer repo", "harness contribution"]}, {"id": "P17", "seq": "17", "name": "Dependency + Toolchain Upgrade Executor", "type": "MAINTENANCE", "class": "DEPENDENCY / UPGRADE", "sprintRole": "Upgrade dependencies and repair compatibility", "progress": "YES", "useWhen": "Packages, runtimes, actions, SDKs, images, or toolchains need updating.", "inspectFirst": "Manifests, lockfiles, support policy, primary upgrade docs.", "expectedOutput": "Resolved upgrade with repaired code/config/tests/docs.", "nextStep": "Use P11 or P12.", "proofGate": "Reproducible lockfiles and compatibility proof.", "color": "Gold", "copySheet": "P17_COPY_SAFE", "category": "standard", "copyContent": "UPGRADE THE DEPENDENCIES SAFELY. UPDATE MANIFESTS AND LOCKFILES, REPAIR BREAKAGE, AND PROVE COMPATIBILITY.\nRepo: xyz_repo_or_path\nDependency scope: xyz_dependency_scope\nTarget versions or advisory: xyz_target_versions\nOwned scope: xyz_owned_scope\nForbidden scope: xyz_forbidden_scope\nMISSION\nApply the bounded dependency, runtime, SDK, action, image, or toolchain upgrade.\nUse current repository manifests and lockfiles as authority.\nDo not edit version numbers without resolving the resulting build, test, API, or migration changes.\nUPGRADE RULES\n- inspect existing constraints, lockfiles, update policy, and supported runtimes\n- prefer the smallest compatible upgrade set\n- preserve reproducibility\n- update generated lockfiles through the canonical package manager\n- inspect breaking changes from primary documentation\n- repair source, configuration, CI, fixtures, and docs affected by the upgrade\n- do not weaken tests or pin insecure versions merely to obtain green checks\n- record migrations, rollback notes, and unsupported environments\nVALIDATION\nRun dependency resolution, lint/type/build/test, security or advisory checks, and package-specific smoke tests.\nFINAL RESPONSE\n- dependencies changed:\n- manifests/lockfiles changed:\n- compatibility repairs:\n- migrations:\n- validation:\n- security findings:\n- commit/push/PR:\n- rollback risk:\n- exact next command:\nComplete the upgrade or return the exact incompatibility and smallest viable patch.", "keywords": ["dependency", "upgrade", "packages", "toolchain", "lockfile", "runtime update", "version bump"]}, {"id": "P18", "seq": "18", "name": "Documentation + Tutorial Executor", "type": "ENABLEMENT", "class": "DOCS / TUTORIAL", "sprintRole": "Build operator-ready documentation from current behavior", "progress": "YES", "useWhen": "Users or technicians need executable instructions, not hidden snippets.", "inspectFirst": "Current scripts, flags, launchers, output paths, failure modes.", "expectedOutput": "Repo docs, help, examples, validators, and navigation updates.", "nextStep": "Use P12.", "proofGate": "Docs match implemented behavior and examples validate.", "color": "Sand", "copySheet": "P18_COPY_SAFE", "category": "standard", "copyContent": "BUILD THE OPERATOR DOCUMENTATION AND TUTORIALS FROM CURRENT REPO BEHAVIOR.\nRepo: xyz_repo_or_path\nAudience: xyz_audience\nWorkflow or feature: xyz_workflow\nOwned scope: xyz_owned_scope\nForbidden scope: xyz_forbidden_scope\nMISSION\nCreate documentation that a real operator, technician, developer, or administrator can follow without memorizing hidden commands.\nInspect current implementation, scripts, launchers, flags, output paths, safety rules, and failure modes first.\nDocumentation must describe behavior that exists or clearly label planned behavior.\nDOCUMENTATION RULES\n- prefer repo-owned launchers and one-command workflows\n- include prerequisites, safe defaults, examples, expected output, troubleshooting, rollback, and proof\n- distinguish Windows, Linux, browser, server, admin-box, and target-machine steps\n- do not expose secrets, private data, or machine-specific paths as universal instructions\n- update navigation/index pages and command help where useful\n- add doc tests, examples, fixtures, or validators when the repo supports them\n- do not claim runtime success from documentation alone\nVALIDATION\nRun markdown/link/help/example validators and any targeted command smoke checks that are safe.\nFINAL RESPONSE\n- audience and workflow:\n- documents/help changed:\n- commands/examples verified:\n- screenshots or artifacts:\n- validation:\n- unproven runtime steps:\n- commit/push/PR:\n- exact next command:\nWrite the documentation in the repository. Do not return an outline only.", "keywords": ["documentation", "docs", "tutorial", "help", "examples", "readme", "operator guide", "instructions"]}, {"id": "P19", "seq": "19", "name": "Installation + Deployment Executor", "type": "OPERATE", "class": "DEPLOY / INSTALL", "sprintRole": "Install or deploy idempotently with proof", "progress": "YES", "useWhen": "Software, services, agents, or packages must be installed, configured, or deployed.", "inspectFirst": "Installers, manifests, current state, targets, rollback rules.", "expectedOutput": "Applied deployment, health proof, cleanup, and rollback record.", "nextStep": "Use P08 for live behavior or P12.", "proofGate": "State/version/health evidence supports the claim.", "color": "Orange", "copySheet": "P19_COPY_SAFE", "category": "standard", "copyContent": "EXECUTE THE INSTALLATION OR DEPLOYMENT WORKFLOW SAFELY AND CAPTURE PROOF.\nRepo: xyz_repo_or_path\nEnvironment: xyz_environment\nTargets: xyz_targets\nPackage or service: xyz_package\nOwned scope: xyz_owned_scope\nForbidden scope: xyz_forbidden_scope\nMISSION\nUse repo-owned installers, launchers, deployment scripts, manifests, and rollback procedures to install, configure, upgrade, or deploy the requested software or service.\nMake the workflow idempotent: existing directories, packages, services, credentials, and prior partial state must be handled gracefully.\nDEPLOYMENT SAFETY\n- inspect current state before mutation\n- use approved sources and verified packages\n- preserve existing configuration unless migration is intended\n- bound waits and retries\n- avoid terminal-focus automation when a direct command or API exists\n- do not mutate personal data, saves, or accounts\n- do not leave staging payloads, secrets, or temporary artifacts behind\n- record rollback or uninstall steps\n- distinguish package copied, command accepted, service started, health passed, and behavior observed\nVALIDATION\nValidate package/version, service/process state, configuration, health endpoint or smoke behavior, logs, cleanup, and rollback readiness.\nFINAL RESPONSE\n- environment and targets:\n- installer/deployer used:\n- state detected before:\n- changes applied:\n- resulting versions/services:\n- proof artifacts/logs:\n- validation:\n- cleanup:\n- rollback:\n- exact next command:\nPerform the deployment when the environment permits. Otherwise produce the exact blocker and repo patch required.", "keywords": ["deploy", "install", "installation", "deployment", "setup", "environment", "launch"]}, {"id": "P20", "seq": "20", "name": "Opportunity-to-Sprint Executor", "type": "OPPORTUNITY", "class": "OPPORTUNITY / EXECUTE", "sprintRole": "Execute a selected Opportunity_Discovery row", "progress": "YES", "useWhen": "An opportunity row is selected and should become repo progress without rewriting another prompt.", "inspectFirst": "Opportunity fields, repo evidence, owner, dependencies, recommended prompt.", "expectedOutput": "Repo/PR mutations plus exact status/evidence updates for the row.", "nextStep": "Use P11/P12.", "proofGate": "Opportunity disposition is grounded in repo evidence.", "color": "Emerald", "copySheet": "P20_COPY_SAFE", "category": "standard", "copyContent": "EXECUTE THE SELECTED OPPORTUNITY. DO NOT JUST REFORMAT THE ROW OR WRITE ANOTHER PROMPT.\nOpportunity ID: xyz_opportunity_id\nOpportunity status: xyz_opportunity_status\nPrimary owner: xyz_primary_owner\nRepo or repos: xyz_repo_or_path\nRecommended prompt: xyz_recommended_prompt\nNext sprint: xyz_sprint_name\nEvidence or PR: xyz_evidence\nForbidden scope: xyz_forbidden_scope\nOPPORTUNITY INTAKE\nRead the selected Opportunity_Discovery row as an operational request.\nInspect current repository evidence to determine whether the opportunity is still current, already implemented, superseded, blocked, or safe to execute.\nUse the recommended prompt semantics, but perform the repo work in this chat.\nWORK RULES\n- update the repository, PRs, branches, contracts, code, doctrine, docs, validators, or deployment surfaces required by the opportunity\n- preserve cross-repo ownership boundaries\n- do not return a prompt pack instead of implementation\n- if the opportunity spans Foundry and Continuum, implement one bounded side or a versioned shared contract without duplicating authority\n- if already implemented, prove it with current files, commits, PRs, and validation\n- report the exact Opportunity_Discovery status and evidence fields that should be updated\nVALIDATION\nRun the strongest practical checks for the selected work type.\nFINAL RESPONSE\n- opportunity ID:\n- disposition: implemented / validated / merged / blocked / superseded\n- repo or PR mutations:\n- files and artifacts:\n- commits/push/PR:\n- validation:\n- remaining dependency:\n- Opportunity_Discovery field updates:\n- exact next command:\nExecute the opportunity. The final answer must contain repository evidence, not merely rewritten opportunity text.", "keywords": ["opportunity", "sprint from opportunity", "opportunity to sprint", "backlog", "actionable gap"]}, {"id": "P21", "seq": "21", "name": "Many-to-One Prompt Consolidator", "type": "CONSOLIDATE + EXECUTE", "class": "PLAN + BUILD / CONSOLIDATE", "sprintRole": "Consolidate many prompts into one bounded executable mission", "progress": "YES", "useWhen": "Several prompts, handoffs, sprint candidates, or artifact requirements must become one executable mission.", "inspectFirst": "Source requirements, repo evidence, conflicts, dependencies, branch conventions, proof gates.", "expectedOutput": "Disposition ledger, one bounded execution prompt, and immediate execution when safe.", "nextStep": "Use P11/P12 after execution.", "proofGate": "Every source requirement is dispositioned and the immediate mission is evidence-backed.", "color": "Amber", "copySheet": "P21_COPY_SAFE", "category": "standard", "copyContent": "CONSOLIDATE THE SOURCE PROMPTS INTO ONE BOUNDED EXECUTION PROMPT AND EXECUTE THE IMMEDIATE MISSION WHEN THE ENVIRONMENT ALLOWS. DO NOT CONCATENATE OR STOP AT A PLAN.\nTarget repo: xyz_repo_or_path\nBranch / PR / sprint if known: xyz_branch_pr_sprint\nSource prompts, instructions, handoffs, or candidates: xyz_source_material\nContext or plan path if available: xyz_context_path\nTarget artifact or deliverable if applicable: xyz_target_artifact\nOwned scope: xyz_owned_scope\nForbidden scope: xyz_forbidden_scope\nMISSION\nAnalyze the source material and current repository evidence, then produce one strong, bounded, actionable execution prompt.\nThis is synthesis, conflict resolution, and execution planning, not concatenation.\nIdentify the immediate executable mission and keep unrelated future work out of the immediate sprint.\nWhen the environment permits safe bounded work, execute the consolidated mission in the same chat rather than returning only another prompt.\nSOURCE PROMPT DISPOSITION\nCreate a source-requirement ledger before writing the consolidated prompt.\nAssign every source requirement exactly one disposition:\n- included\n- merged\n- deferred-to-docs\n- superseded\n- rejected-with-reason\n- unresolved-blocker\nNo source requirement may disappear silently.\nFor merged or superseded requirements, name the surviving requirement.\nFor rejected or blocked requirements, state the evidence-backed reason.\nCONFLICT RESOLUTION\nIdentify direct conflicts, hidden scope collisions, incompatible acceptance rules, and stale assumptions.\nPrefer current repository evidence over remembered chat context.\nApply the strongest compatible safety, proof, source-immutability, rollback, and acceptance rules.\nPreserve explicit user constraints unless they are impossible, unsafe, or contradicted by newer authoritative evidence.\nDo not solve conflicts by duplicating both instructions into a giant prompt.\nIMMEDIATE OWNED SCOPE\nSelect the smallest coherent mission that produces real progress now.\nName repo, branch or worktree, PR or sprint, lane, owned scope, forbidden scope, expected artifacts, and validation order.\nPreserve dependencies and prerequisites.\nSeparate the immediate feature or artifact sprint from documentation or cleanup that can safely wait.\nFORBIDDEN SCOPE\nCarry forward every compatible forbidden-scope rule.\nAdd collision boundaries discovered from repository evidence.\nDo not broaden authority merely because several prompts were supplied.\nREPOSITORY EVIDENCE REQUIRED\nInspect current branch, status, recent commits, open PRs, changed files, repo rules, plans, validators, tests, logs, and generated artifacts as applicable.\nReuse existing contracts, helpers, naming patterns, branch conventions, output layouts, and proof formats before inventing new ones.\nEvidence must precede confidence.\nEXECUTION CONTRACT\nThe consolidated prompt must require action, artifacts, validation, reporting, and a final next decision.\nAvoid permission theater when a safe bounded sprint is available.\nDo not stop at a plan, outline, prompt rewrite, or repo summary when implementation is possible.\nDo not create another multi-sprint mega-prompt.\nKeep deferred work in a separate documentation lane.\nARTIFACT EXECUTION MODE\nWhen the source material describes a workbook, document, slide deck, archive, report, image, or other artifact, the immediate mission must require generation of the actual artifact now.\nExtract and preserve source fixture names, hashes, required outputs, exact filenames, package constraints, compatibility gates, previews, field acceptance, and artifact links.\nDo not answer with an artifact-generation prompt instead of the artifact when the current chat has the required tools and source material.\nDo not regenerate from a blank artifact when an accepted structural fixture is authoritative.\nVALIDATION\nPreserve all compatible static, runtime, package, field, CI, and acceptance gates.\nOrder checks from cheapest and safest to strongest and most environment-dependent.\nDo not report skipped checks as passes or static checks as field acceptance.\nRequire final diff, artifact, log, report, git-state, and remote-state evidence appropriate to the mission.\nDEFERRED DOCUMENTATION BRANCH\nFor useful documentation that should not enter the immediate sprint, define a separate feature or PR lane.\nDerive the branch name from the target repository existing conventions; do not hard-code one universal naming pattern.\nThe deferred lane must include proposed branch or PR lane, mission, owned scope, forbidden scope, target files, evidence sources, expected artifacts, validation, dependency on the immediate feature sprint, and parallel-safety statement.\nDo not use deferred documentation as a dumping ground for unresolved feature requirements.\nFINAL HANDOFF\nThe generated consolidated prompt must contain these headings exactly:\nMISSION\nSOURCE PROMPT DISPOSITION\nCONFLICT RESOLUTION\nIMMEDIATE OWNED SCOPE\nFORBIDDEN SCOPE\nREPOSITORY EVIDENCE REQUIRED\nEXECUTION CONTRACT\nVALIDATION\nDEFERRED DOCUMENTATION BRANCH\nFINAL HANDOFF\nEnd with completed work, files and artifacts, validation, skipped checks, gaps and risks, git state, remote or PR state, exact next command, and a copy-paste next-agent handoff.\nReturn one bounded execution prompt plus the source-requirement disposition ledger. If execution is available, perform the immediate mission and report the evidence instead of stopping at the prompt.", "keywords": ["consolidate", "many to one", "merge prompts", "simplify", "combine"]}, {"id": "P22", "seq": "22", "name": "Cross-Repo Gap Priority Planner", "type": "PORTFOLIO PLAN", "class": "PORTFOLIO / GAP PRIORITY", "sprintRole": "Rank repositories by actionable gap and leverage", "progress": "No", "useWhen": "The same insight could improve several repos and the first target should be chosen by missing contracts, proof, harness, or product capability.", "inspectFirst": "Repo inventory, current gaps, shared contracts, recent PRs, tests, validators, roadmaps.", "expectedOutput": "Ranked repo portfolio, evidence-backed first target, exact launch order, and one self-contained panel per selected repo.", "nextStep": "Launch top-ranked panel or use P16/P07.", "proofGate": "Ranking distinguishes the largest gap from the best first move and cites repo evidence.", "color": "Coral", "copySheet": "P22_COPY_SAFE", "category": "standard", "copyContent": "PRIORITIZE WHICH REPOSITORY SHOULD RECEIVE THE ACTIONABLE INSIGHTS FIRST BY COMPARING VERIFIED GAPS.\nDo not choose the repository with the biggest-sounding problem by intuition alone.\nUse repository evidence, connected GitHub state when available, and current chat context.\nCandidate repositories:\n`xyz_candidate_repositories_or_org`\nActionable insights to route:\n`xyz_actionable_insights`\nKnown constraints or excluded repositories:\n`xyz_constraints`\nMISSION\nRank the candidate repositories by where the supplied insights can close the most important verified gap with the strongest bounded payoff.\nDistinguish the largest gap from the best first move.\nPrefer evidence-backed, tractable, reusable work over vague strategic importance.\nREPOSITORY INTAKE\nFor each candidate repository inspect when access exists:\n- purpose and domain authority\n- current main branch and recent commits\n- open PRs, reviews, checks, and stale branches\n- plans, handoffs, roadmaps, issue queues, and release posture\n- run context, artifact registry, schemas, validators, fixtures, workflows, and proof gates\n- skills, capabilities, triggers, routing, manifests, MCP/tools, and hooks\n- conventional application services, state machines, adapters, persistence, UI, launchers, and deployment logic\n- documentation, operator surfaces, runtime proof, and known blockers\nDo not infer repository health from stars, age, filenames, or prose alone.\nGAP FACTORING\nClassify every relevant gap into one primary surface:\n- harness spine gap\n- agent harness gap\n- conventional application logic gap\n- integration seam gap\n- validation or proof gap\n- documentation or operator gap\n- runtime acceptance gap\n- cleanup or release-hygiene gap\n- research or design gap\nFor skills, capabilities, and triggers record the missing owner, activation condition, inputs, outputs, guardrails, tests, and proof ceiling.\nSCORING MODEL\nScore each repository from 0 to 5 on:\n- gap severity\n- user or product impact\n- leverage across future work\n- fit of the supplied insight\n- implementation tractability\n- evidence readiness\n- reusable contract value\n- collision and duplication risk\n- dependency readiness\n- proof attainability\nExplain the weights used.\nApply penalties for:\n- unclear authority\n- duplicate implementation risk\n- blocked environment\n- stale or conflicted branch floor\n- missing source evidence\n- unsafe runtime dependency\n- work already owned by another active lane\nOUTPUT ORDER — LAUNCH ORDER FIRST\n1. LAUNCH ORDER\nPut the recommended repository order at the very top.\nName the first repository, why it wins, the proof gate that unlocks the next repository, and any parallel-safe repository group.\nNumber the repo-specific panels exactly as they will appear.\nDisplay all panels in this exact order.\nDo not output a different panel order.\n2. COMPACT PORTFOLIO PREAMBLE\nSummarize the insight being routed, candidate repositories, excluded scope, scoring basis, and proof ceiling.\nDo not output a shared prompt fragment that must be copied separately.\n3. REPOSITORY PANELS\nCreate one self-contained copyable writing panel per selected repository.\nEach panel must have its own copy control.\nEach panel must include:\n- repository and local path if known\n- branch or proposed branch\n- priority rank and gap being closed\n- why this repository is now\n- owned and forbidden scope\n- read-first files\n- exact expected artifacts\n- harness, agent-harness, application-logic, and integration ownership\n- numbered tasks\n- safety and proof boundary\n- targeted validation\n- commit, push, and PR contract when implementation is intended\n- final response contract\n- exact next command\nPanels must appear in the same order as LAUNCH ORDER.\nDo not combine repositories into one implementation panel unless one cross-repo contract requires synchronized changes.\n4. PORTFOLIO RANKING TABLE\nAfter the panels, provide every candidate repository, scores, weighted total, confidence, blocker, best-fit insight, and disposition.\nUse dispositions:\n- launch first\n- launch after gate\n- parallel safe\n- defer\n- reject for this insight\n- insufficient evidence\n5. DECISION EXPLANATION\nState:\n- why the top repository outranks the largest raw gap when those differ\n- which evidence could change the ranking\n- which insight should not be copied across repositories\n- canonical donor and consumer ownership\n- collision risks and shared surfaces\nQUALITY RULES\nPrefer a defensible first move over a broad portfolio essay.\nDo not fabricate repository facts.\nDo not let prompts become the only implementation of product logic.\nDo not claim implementation or runtime proof from portfolio analysis.", "keywords": ["portfolio", "gap priority", "cross repo priority", "structural gap", "which repo first"]}, {"id": "P23", "seq": "23", "name": "Circumstance-Aware Repo Priority Planner", "type": "PORTFOLIO PLAN", "class": "PORTFOLIO / CIRCUMSTANCE PRIORITY", "sprintRole": "Rank repositories by current operating circumstances", "progress": "No", "useWhen": "Urgency, access, active PRs, environment, risk, deadlines, or readiness should determine which repo moves first.", "inspectFirst": "Current commitments, blockers, environment, branch/PR state, time windows, dependencies, risk.", "expectedOutput": "Circumstance-ranked repo order, changed-ranking explanation, exact launch order, and self-contained repo panels.", "nextStep": "Launch the first panel or reassess when circumstances change.", "proofGate": "Ranking is timestamped, evidence-backed, and separate from gap severity.", "color": "Ocean", "copySheet": "P23_COPY_SAFE", "category": "standard", "copyContent": "PRIORITIZE WHICH REPOSITORY SHOULD MOVE FIRST GIVEN THE CURRENT CIRCUMSTANCES.\nUse this prompt when timing, access, urgency, active work, environment, or risk should outweigh the largest structural gap.\nCandidate repositories:\n`xyz_candidate_repositories_or_org`\nCurrent circumstances:\n`xyz_current_circumstances`\nActionable insights or work themes:\n`xyz_actionable_insights`\nKnown constraints or excluded repositories:\n`xyz_constraints`\nMISSION\nChoose the repository order that best fits the present operating situation.\nKeep circumstance priority separate from gap severity.\nA repository may rank first because its window is open, its dependency is ready, its PR is active, its environment is available, or delay is costly.\nCIRCUMSTANCE INTAKE\nVerify when evidence is available:\n- deadlines, client or operator commitments, incidents, field windows, and release windows\n- available time, hardware, credentials, admin access, VM access, connected tools, and target environments\n- active PRs, pending reviews, CI windows, branch freshness, mergeability, and expiring momentum\n- blocked dependencies, external vendors, missing packages, unavailable targets, and safety gates\n- current user energy, desired mode, interruption cost, and whether work must be local, remote, static, or live\n- strategic dependencies between repositories\n- whether one repository can unblock several others\n- consequence of delay\nDo not treat urgency language as evidence when repository or calendar state contradicts it.\nCIRCUMSTANCE FACTORING\nClassify each circumstance as:\n- deadline or time-window pressure\n- incident or operational risk\n- environment availability\n- dependency readiness\n- PR or review opportunity\n- momentum and context preservation\n- safety or authorization constraint\n- resource limitation\n- strategic unblocker\n- low-cost quick win\n- external blocker\nSCORING MODEL\nScore each repository from 0 to 5 on:\n- urgency\n- consequence of delay\n- environment availability\n- dependency readiness\n- active-PR leverage\n- ability to unblock other work\n- boundedness\n- validation availability\n- safety readiness\n- context-switch cost\nAlso record a separate gap score without allowing it to dominate the circumstance score.\nExplain the weights and timestamp the assessment.\nApply penalties for:\n- unavailable environment\n- missing authorization\n- destructive or live-risk work without proof gates\n- stale/conflicted branch floor\n- another lane already owning the shared surface\n- high interruption cost with little near-term payoff\nOUTPUT ORDER — LAUNCH ORDER FIRST\n1. LAUNCH ORDER\nPut the circumstance-ranked repository order at the very top.\nName the first repository, the circumstance that makes it first, the trigger for reassessment, the proof gate for the next repository, and parallel-safe groups.\nNumber and title panels exactly as they will appear.\nDisplay panels in this exact order.\nDo not output a different panel order.\n2. COMPACT CIRCUMSTANCE PREAMBLE\nSummarize the timestamp, operating situation, constraints, available environments, top blockers, and proof ceiling.\nDo not output a shared prompt fragment that must be copied separately.\n3. REPOSITORY PANELS\nCreate one self-contained copyable writing panel per selected repository.\nEach panel must include:\n- repo and local path if known\n- current branch, active PR, or proposed branch\n- circumstance rank\n- reason to act now\n- reassessment trigger\n- dependencies and parallel safety\n- owned and forbidden scope\n- read-first files\n- exact tasks and artifacts\n- safety\n- validation\n- commit, push, and PR contract when implementation is intended\n- proof level and proof ceiling\n- exact final response contract\n- exact next command\nPanels must appear in the same order as LAUNCH ORDER.\n4. CIRCUMSTANCE MATRIX\nAfter the panels, show every candidate repository with circumstance score, separate gap score, confidence, time horizon, blocker, opportunity window, and disposition.\nUse dispositions:\n- act now\n- act after named gate\n- parallel safe\n- preserve context only\n- defer until circumstance changes\n- blocked\n- insufficient evidence\n5. WHAT CHANGED THE RANKING\nState:\n- which current circumstance changed the order\n- what future event would reorder the repositories\n- where the circumstance choice differs from the gap-priority choice\n- what work should be preserved now even when implementation waits\n- collision and ownership risks\nQUALITY RULES\nMake a time-aware operational decision, not a generic roadmap.\nDo not invent deadlines, access, approvals, or environment readiness.\nDo not claim a higher proof level than the evidence supports.\nDo not bury the launch order below the analysis.", "keywords": ["circumstance", "circumstance priority", "urgency", "access", "which repo now"]}, {"id": "P24", "seq": "24", "name": "App-at-Hand Usage Coach", "type": "ENABLEMENT", "class": "ENABLEMENT / APP USAGE", "sprintRole": "Teach the user how to operate the app at hand", "progress": "Support", "useWhen": "The user has an app, screen, file, or workflow in front of them and needs grounded operating instructions.", "inspectFirst": "Current screen or screenshots, app/version, OS, built-in help, official docs, and implemented repo behavior when available.", "expectedOutput": "Exact first action, quick start, interface map, task recipes, safety boundaries, troubleshooting, shortcuts, and next step.", "nextStep": "Use the app; use P18 when durable repository documentation should be created or repaired.", "proofGate": "Instructions use current evidence, exact visible terminology, explicit uncertainty, and no invented controls or shortcuts.", "color": "Sand", "copySheet": "P24_COPY_SAFE", "category": "standard", "copyContent": "TEACH ME HOW TO USE THE APP AT HAND.\nGround the guide in the actual app, version, screen, files, help text, documentation, or repository evidence available.\nApp or product:\n`xyz_app_name`\nWhat I am trying to accomplish:\n`xyz_user_goal`\nDevice, operating system, and access level if known:\n`xyz_device_os_access`\nAvailable evidence such as screenshots, files, docs, links, or repo:\n`xyz_available_evidence`\nExperience level or preferred depth:\n`xyz_experience_level`\nMISSION\nHelp me perform useful work in the app now.\nProduce practical operating instructions, not a product description, marketing summary, or speculative feature list.\nStart from the screen, file, project, or workflow currently in front of me when that evidence is available.\nDo not redesign the app or modify its repository unless I explicitly ask for implementation work.\nSOURCE OF TRUTH\nUse evidence in this order when available:\n- the current screen or screenshot\n- the installed app version and visible labels\n- uploaded files, built-in help, tooltips, menus, and settings\n- official current documentation\n- repository help strings, commands, routes, tests, examples, and implemented behavior\n- clearly labeled inference\nDo not invent buttons, menu names, keyboard shortcuts, settings, permissions, or workflows.\nWhen sources conflict, prefer the behavior matching the current version and operating environment.\nMark version-specific differences and uncertainty explicitly.\nCLARIFICATION RULE\nAsk no more than three focused questions, and only when the missing answer blocks safe or useful guidance.\nOtherwise state reasonable assumptions briefly and proceed.\nDo not make me restate information already visible in the conversation or supplied evidence.\nOUTPUT ORDER\n1. DO THIS FIRST\nGive the exact first action I should take from the current state.\n2. QUICK START\nGive the shortest safe path to the first useful result.\nUse numbered steps with exact clicks, menu paths, fields, commands, or gestures.\nInclude prerequisites immediately before the step that needs them.\n3. INTERFACE MAP\nExplain the important visible regions, controls, navigation areas, status indicators, and terminology.\nDescribe where each item is and what it is for.\nSkip areas unrelated to my goal.\n4. TASK RECIPES\nProvide compact recipes for the main task and the most likely adjacent tasks.\nFor each recipe include:\n- starting state\n- exact actions\n- expected result\n- how to confirm success\n- how to undo or recover when applicable\n5. USER, ADMIN, AND DEVELOPER BOUNDARIES\nSeparate ordinary user actions from administrator, developer, or repository-maintainer actions.\nCall out steps that change files, accounts, permissions, services, devices, network state, billing, publishing, or shared data.\nDo not recommend elevated or destructive actions when a normal user path exists.\n6. SAFETY AND DATA HANDLING\nIdentify destructive, irreversible, privacy-sensitive, security-sensitive, or externally visible actions before the relevant step.\nExplain what will be changed, saved, uploaded, shared, overwritten, deleted, installed, or sent.\nUse preview, duplicate, export, backup, dry-run, or confirmation paths when the app supports them.\n7. TROUBLESHOOTING\nList the most likely failure symptoms for this workflow.\nFor each symptom provide:\n- what it usually means\n- the safest first check\n- the next bounded fix\n- when to stop and seek administrator, vendor, or developer help\nDo not treat restarting, reinstalling, clearing data, or resetting settings as the default first step.\n8. SHORTCUTS AND SPEED\nInclude only verified keyboard shortcuts, gestures, templates, automations, or faster paths relevant to my goal.\nState platform differences.\nDo not invent shortcuts.\n9. WHAT TO DO NEXT\nRecommend the next useful workflow after I complete the immediate task.\nKeep it to one or two options.\n10. EVIDENCE AND CONFIDENCE\nName the evidence used.\nSeparate verified instructions from inference.\nState any missing version, permission, environment, or runtime evidence that could change the guide.\nGUIDANCE QUALITY RULES\nWrite for the user operating the app, not for a developer reading architecture notes.\nUse the app's exact visible terminology.\nPrefer short numbered procedures over long prose.\nKeep each step independently checkable.\nExplain why only when it prevents an error or improves judgment.\nDo not claim that an action succeeded unless I report or show the result.\nWhen the app is inaccessible, give the exact evidence I should capture next, such as a screenshot, version number, error text, menu path, or sample file.\nWHEN REPOSITORY ACCESS EXISTS\nInspect current implemented behavior before relying on stale documentation.\nUse command help, launchers, UI routes, tests, schemas, fixtures, and examples to verify user-facing instructions.\nDo not expose secrets, private identifiers, internal endpoints, or unsafe developer-only commands.\nDistinguish current implementation from planned or unmerged behavior.\nFINAL RESPONSE\nEnd with:\n- Do this now: one exact action\n- Expected result\n- Tell me or show me: the smallest result needed to guide the next step", "keywords": ["app coach", "usage coach", "learn app", "how to use", "app at hand"]}, {"id": "P25", "seq": "25", "name": "Repo Tutorial Opportunity Planner", "type": "TUTORIAL PLAN", "class": "TUTORIAL / OPPORTUNITY", "sprintRole": "Rank repository tutorial paths worth sprinting", "progress": "No", "useWhen": "The repository contains workflows or features, but the highest-value tutorial paths and prerequisites are unclear.", "inspectFirst": "Current UI, launchers, commands, docs, help, tests, fixtures, releases, support friction, and runtime evidence.", "expectedOutput": "Ranked tutorial portfolio, readiness and disposition ledger, exact launch order, and one self-contained panel per selected tutorial or prerequisite sprint.", "nextStep": "Launch the first P18/P07/P08 panel.", "proofGate": "The first tutorial is evidence-backed, teachable, verifiable, and distinguished from reference-only documentation.", "color": "Mint", "copySheet": "P25_COPY_SAFE", "category": "standard", "copyContent": "ANALYZE THE REPOSITORY AND RANK TUTORIAL PATHS WORTH SPRINTING.\nDo not write every tutorial yet. First determine which user journeys deserve tutorial investment and which are not ready.\nRepo:\n`xyz_repo_or_path`\nPrimary local path if known:\n`xyz_local_path`\nKnown app, product, or workflow context:\n`xyz_app_context`\nPrimary audiences if known:\n`xyz_audiences`\nMISSION\nRecover the current user-facing truth from the repository, identify tutorial opportunities, rank them, and produce bounded tutorial sprint panels in the exact recommended launch order.\nPrefer tutorial paths that reduce real user friction, prevent expensive mistakes, improve adoption, or make implemented workflows independently usable.\nDo not confuse a documentation gap with a tutorial opportunity.\nDo not recommend a tutorial for behavior that is unimplemented, unstable, unsafe to demonstrate, or unsupported by current evidence.\nSOURCE OF TRUTH\nTreat the current repository, shipped UI, help text, launchers, commands, tests, fixtures, screenshots, release state, and current PRs as the source of truth.\nPrefer implemented behavior over roadmap prose, stale handoffs, mockups, or remembered chat context.\nMark planned, partial, deprecated, hidden, admin-only, and live-runtime-only behavior explicitly.\nCOMPACT PREFLIGHT\nRun what is available and record exact skips:\ngit rev-parse --show-toplevel\ngit status --short\ngit branch --show-current\ngit log --oneline --decorate -12\ngit worktree list\ngit remote -v\ngit fetch --all --prune\ngh pr list --state open --limit 50\ngh pr status\nInspect current releases, launchers, docs indexes, help surfaces, screenshots, examples, tests, fixtures, schemas, validators, support notes, issue patterns, and known runtime evidence.\nWHAT COUNTS AS A TUTORIAL CANDIDATE\nA tutorial candidate is a repeatable user journey that can be taught from a clear starting state to a verifiable useful result.\nExamples include:\n- first-run or onboarding path\n- core task walkthrough\n- technician or operator workflow\n- administrator configuration path\n- troubleshooting and recovery path\n- import, export, migration, or upgrade path\n- deployment or acceptance workflow\n- developer or contributor setup\n- integration path between two implemented features\n- safe live-proof or field-validation procedure\nA static reference page, field dictionary, architecture note, release note, or API inventory is not automatically a tutorial.\nTUTORIAL READINESS CLASSIFICATIONS\nClassify every candidate as one of:\n- READY_NOW: implemented, evidenced, safe to teach, and independently verifiable\n- READY_AFTER_DOC_FIX: behavior is stable but help, naming, examples, or navigation must be repaired first\n- READY_AFTER_PRODUCT_FIX: the user path has a product or app-logic defect that should be fixed before teaching it\n- READY_AFTER_HARNESS_FIX: tests, fixtures, launchers, sample data, or evidence contracts are missing\n- READY_AFTER_RUNTIME_PROOF: static evidence exists but the real workflow has not been observed\n- BLOCKED_BY_ACCESS_OR_ENVIRONMENT: the required target, credentials, package, device, or service is unavailable\n- REFERENCE_ONLY: useful documentation, but not a step-by-step tutorial\n- REJECTED: too speculative, unsafe, obsolete, duplicate, or low value\nREPOSITORY TUTORIAL INVENTORY\nInspect and map:\n- product entry points and launchers\n- visible UI routes, menus, panels, commands, and settings\n- user roles and permission boundaries\n- common task sequences\n- examples, sample data, fixtures, and demo environments\n- errors, support burden, failure modes, and recovery paths\n- current docs, tutorials, READMEs, help text, tooltips, and screenshots\n- tests that prove the steps and expected results\n- gaps between implemented behavior and current instructions\n- workflows implemented across several files or repos that users cannot currently discover\nFACTOR THE CANDIDATES\nFor each candidate identify:\n- audience\n- starting state\n- desired useful result\n- exact implemented path\n- required environment, data, permissions, and prerequisites\n- risk and destructive actions\n- existing evidence\n- missing product, harness, runtime, or documentation work\n- likely tutorial format\n- canonical owner\n- files and surfaces likely to change\nKeep tutorial planning separate from:\n- product implementation\n- harness or fixture creation\n- runtime proof\n- app-at-hand coaching\n- reference documentation\nWhen those are prerequisites, create separate prerequisite sprints and name the dependency.\nRANKING MODEL\nRank candidates using evidence, not enthusiasm.\nConsider:\n- user value and frequency\n- severity and cost of common mistakes\n- current support or rediscovery burden\n- adoption and onboarding leverage\n- workflow completeness\n- evidence and test maturity\n- availability of a safe reproducible demo path\n- audience size and clarity\n- dependency readiness\n- maintenance cost and likely drift\n- ability to verify success\n- ability to unblock later tutorials or product work\nDo not use false numerical precision when evidence is weak.\nExplain why the top tutorial is the best first sprint, not merely the largest documentation gap.\nTUTORIAL ARTIFACT EXPECTATIONS\nA serious tutorial sprint may include:\n- concise tutorial or walkthrough\n- verified quick start\n- sample or sanitized fixture\n- runnable commands or launcher path\n- screenshots or diagrams when they materially help\n- expected-result and failure-state examples\n- troubleshooting and recovery section\n- safety and permission boundaries\n- help or navigation links from the app and docs index\n- executable validation for commands, links, examples, and fixtures\n- proof ceiling and field-acceptance notes\nDo not commit private screenshots, credentials, live hostnames, client data, proprietary installers, raw runtime logs, or unsafe example values.\nOUTPUT ORDER\n1. LAUNCH ORDER\nPut the recommended tutorial sprint order at the very top.\nDisplay every later sprint panel in exactly this order.\nKeep safe parallel candidates together as one clearly labeled group.\nDo not provide an alternate ordering.\n2. IMMEDIATE MOVE\nName the first tutorial path worth sprinting and the exact evidence supporting that choice.\nState any prerequisite sprint that must occur before tutorial writing.\n3. RANKED TUTORIAL PORTFOLIO\nFor each candidate include:\n- rank\n- tutorial path\n- audience\n- readiness classification\n- user value\n- evidence maturity\n- principal gap\n- dependencies\n- risk\n- recommended tutorial format\n- recommended executor prompt\n- proof ceiling\n4. CANDIDATE DISPOSITION LEDGER\nDisposition every meaningful candidate as ready, prerequisite-first, deferred, reference-only, merged with another path, or rejected-with-reason.\nNo candidate may disappear silently.\n5. COPYABLE TUTORIAL SPRINT PANELS\nImmediately after the ranking, emit one complete self-contained writing panel for each selected sprint.\nOne panel goes into one new AI chat.\nEach panel must have its own copy control.\nPanels must appear in the exact launch order stated at the top.\nDo not use one giant code fence.\nDo not require a separately copied shared preamble.\nEach panel must include:\n- banner and sprint name\n- repo, path, branch, PR, wave, and lane\n- audience and tutorial path\n- dependencies and safe parallel work\n- owned scope and forbidden scope\n- expected artifacts\n- mission\n- read-first files and user-facing surfaces\n- compact preflight\n- numbered tasks\n- safety and data handling\n- tutorial validation\n- commit, push, and PR contract\n- proof level and proof ceiling\n- final response contract\n- exact next command\nUse P18 when the sprint primarily creates durable tutorials and repo help.\nUse P07 when product or harness implementation must precede the tutorial.\nUse P08 when live behavior must be observed before instructions can be trusted.\nUse P24 only for immediate coaching of the app currently in front of the user; it does not replace durable tutorial work.\nTUTORIAL VALIDATION\nRequire applicable evidence:\n- every step matches current implemented behavior\n- commands and examples execute against sanitized fixtures\n- links and navigation routes resolve\n- screenshots match the current version\n- prerequisites and permissions are accurate\n- success and failure outcomes are independently checkable\n- destructive steps include backup, preview, confirmation, or recovery guidance\n- planned or unmerged behavior is not presented as current\n- skipped checks are named with exact later commands\nQUALITY RULES\nBe practical, audience-specific, and repository-grounded.\nPrefer a smaller number of high-value tutorial sprints over a large backlog of vague documentation ideas.\nDo not recommend tutorials merely because a feature exists.\nDo not create tutorial theater around unstable, unsafe, or unverified behavior.\nDo not claim operator acceptance from static tests or screenshots.\nFINAL RESPONSE\nEnd with:\n- first tutorial sprint to launch\n- safe parallel tutorial or prerequisite sprints\n- blocked candidates\n- exact repository evidence used\n- proof ceiling\n- one exact next command", "keywords": ["tutorial plan", "repo tutorial", "tutorial opportunity", "what to document", "tutorial priority"]}, {"id": "P26", "seq": "26", "name": "GNHF Proof Floor Reproducer", "type": "AUTONOMY + VALIDATE", "class": "GNHF / PROOF FLOOR", "sprintRole": "Reproduce the canonical proof floor and repair at most one required failure", "progress": "YES", "useWhen": "The validation floor must be established before a larger autonomous lane.", "inspectFirst": "Canonical proof, repo rules, directly controlling plan and validator.", "expectedOutput": "Current matrix plus one focused repair commit when necessary.", "nextStep": "Use P28/P30/P32/P33 next.", "proofGate": "Proof is reproduced; required failures are repaired or explained.", "color": "Night", "copySheet": "P26_COPY_SAFE", "category": "gnhf", "copyContent": "gnhf `\n--agent opencode `\n--w \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "keywords": ["dependency maintenance", "upgrade dependency", "named upgrade", "reproducible upgrade"]}, {"id": "P36", "seq": "36", "name": "GNHF PR Branch Repair", "type": "REVIEW + BUILD", "class": "GNHF / PR REPAIR", "sprintRole": "Repair one exact PR branch locally", "progress": "YES", "useWhen": "An exact branch has review, CI, drift, regression, or scope defects.", "inspectFirst": "Branch and HEAD, target-base diff, review and failing-check evidence.", "expectedOutput": "Scoped local repair commits and a review-ready final diff.", "nextStep": "Human push/review, then P15 or P12.", "proofGate": "Exact-head repair queue is empty and local proof passes.", "color": "Indigo", "copySheet": "P36_COPY_SAFE", "category": "gnhf", "copyContent": "gnhf `\n--agent opencode `\n--worktree `\n--max-iterations 5 `\n--max-tokens 450000 `\n--prevent-sleep on `\n--stop-when \"The exact branch repair queue is empty, all reproducible owned failures pass, and the final diff is coherent, scoped, and ready for human review.\" `\n\"Repo: xyz_repo_or_path\n\nSprint: PR branch repair\nLane: review, CI, drift, regression\n\nPull request or branch:\n- xyz_pr_number\n\nTarget base:\n- xyz_target_base\n\nObjective:\nRepair the exact branch locally. Address evidence-backed review, CI, drift, regression, or scope defects one coherent commit at a time.\n\nOwned scope:\n- xyz_owned_scope\n\nRules:\n- Confirm branch, HEAD, and base diff before mutation.\n- Keep at most five exact-head repairs.\n- Preserve unrelated contributor work.\n- Run the narrow failing check and xyz_canonical_proof after shared changes.\n- Do not merge, close, approve, push, alter PR metadata, or claim remote checks passed without evidence.\n- Stop if the exact branch cannot be identified safely.\n\nReport:\n- starting HEAD and repair queue\n- commits and files\n- validation\n- final diff\n- pending remote actions\n- proof ceiling\n- git status\"\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "keywords": ["pr branch repair", "branch repair", "review ready", "local repair"]}, {"id": "P37", "seq": "37", "name": "GNHF Agent Spawn Readiness Preflight", "type": "AUTONOMY + PREFLIGHT", "class": "GNHF / SPAWN PREFLIGHT", "sprintRole": "Prove the selected agent can be spawned before a long run", "progress": "Support", "useWhen": "Before using a new agent, shell domain, workstation, or GNHF adapter overnight.", "inspectFirst": "Repo cleanliness, gnhf command, exact agent command path, native versus ACP form, bounded child-process probe.", "expectedOutput": "A spawnability result with exact command path, exit code, and actionable blocker before GNHF opens.", "nextStep": "Use P38 only after PASS; repair the adapter or choose another proven agent after FAIL.", "proofGate": "The same shell can spawn the exact command without timeout; command presence alone is not treated as readiness.", "color": "Peach", "copySheet": "P37_COPY_SAFE", "category": "gnhf", "copyContent": "& {\nSet-StrictMode -Version Latest\n$ErrorActionPreference = \"Stop\"\n$Repo = xyz_repo_or_path\n$AgentSpec = xyz_gnhf_agent_spec\n$AgentCommand = xyz_agent_command\n$AgentProbeArgs = @(xyz_agent_probe_args)\n$TimeoutSeconds = 20\n\nif (-not (Test-Path -LiteralPath \"$Repo\\.git\")) {\nthrow \"Git repository not found: $Repo\"\n}\n\n$Dirty = @(git -C $Repo status --porcelain)\nif ($Dirty.Count -gt 0) {\n$Dirty\nthrow \"Repository must be clean before an unattended run.\"\n}\n\n$Gnhf = Get-Command gnhf -ErrorAction SilentlyContinue\nif (-not $Gnhf) { throw \"gnhf is not available on PATH.\" }\n\n$Resolved = Get-Command $AgentCommand -ErrorAction SilentlyContinue\nif (-not $Resolved) { throw \"Agent command not found: $AgentCommand\" }\n\nif ($AgentSpec -notmatch \"^acp:\" -and $Resolved.Source -match \"\\.(cmd|bat)$\") {\nthrow \"Native GNHF agent resolves to a CMD/BAT shim. Prove an agentPathOverride or use a proven ACP/native executable before running overnight.\"\n}\n\n$Psi = [Diagnostics.ProcessStartInfo]::new()\n$Psi.FileName = $Resolved.Source\n$Psi.UseShellExecute = $false\n$Psi.RedirectStandardOutput = $true\n$Psi.RedirectStandardError = $true\n$Psi.CreateNoWindow = $true\nforeach ($Arg in $AgentProbeArgs) { [void]$Psi.ArgumentList.Add($Arg) }\n\n$Process = [Diagnostics.Process]::new()\n$Process.StartInfo = $Psi\n[void]$Process.Start()\nif (-not $Process.WaitForExit($TimeoutSeconds * 1000)) {\ntry { $Process.Kill($true) } catch {}\nthrow \"Agent probe timed out after $TimeoutSeconds seconds.\"\n}\n\n$Stdout = $Process.StandardOutput.ReadToEnd().Trim()\n$Stderr = $Process.StandardError.ReadToEnd().Trim()\nif ($Process.ExitCode -ne 0) {\nthrow \"Agent spawn probe failed with exit code $($Process.ExitCode): $Stderr\"\n}\n\n[pscustomobject]@{\nRepo = (Resolve-Path $Repo).Path\nAgentSpec = $AgentSpec\nAgentCommand = $AgentCommand\nResolvedPath = $Resolved.Source\nExitCode = $Process.ExitCode\nOutput = $Stdout\nReadyForP38 = $true\n} | Format-List\n}", "keywords": ["spawn", "agent spawn", "preflight", "spawn readiness", "child process", "adapter probe"]}, {"id": "P38", "seq": "38", "name": "GNHF Night Queue Compiler", "type": "AUTONOMY + PLAN", "class": "GNHF / NIGHT QUEUE", "sprintRole": "Compile and commit a finite overnight repair queue", "progress": "YES", "useWhen": "A repo such as AxTask or BlacksmithGuild has many issues and the next repair set must be bounded before sleep.", "inspectFirst": "Repo rules, canonical tests, issue sources, TODOs, recent commits, existing plans, and owned paths.", "expectedOutput": "Committed queue and baseline report containing no more than five evidence-backed repair items.", "nextStep": "Use P39 for general items, P40 for a failure cluster, or P41 for a stateful app/game.", "proofGate": "Every item has evidence, owned paths, dependencies, an exact validation command, and a ready or blocked state.", "color": "Sky", "copySheet": "P38_COPY_SAFE", "category": "gnhf", "copyContent": "gnhf `\n--agent xyz_gnhf_agent_spec `\n--worktree `\n--max-iterations 2 `\n--max-tokens 180000 `\n--prevent-sleep on `\n--stop-when \"The finite night queue and baseline report are committed, every item has an exact acceptance command, and the worktree is clean.\" `\n\"Repo: xyz_repo_or_path\n\nSprint: Night queue compiler\nLane: issue-heavy repo planning with a committed local deliverable\n\nPrerequisite:\n- P37 passed for this exact agent specification and shell domain.\n\nIssue sources:\n- xyz_issue_sources\n\nTracked outputs:\n- Queue: xyz_night_queue_path\n- Report: xyz_night_report_path\n\nObjective:\nInspect current repository evidence and compile a finite queue of no more than five repair items. Commit the queue and baseline report. Do not repair product code in this run.\n\nEach item must include:\n- stable ID and concise title\n- evidence path, issue, failing command, or reproducible symptom\n- root-cause hypothesis labeled as hypothesis\n- owned files or directories\n- forbidden surfaces\n- dependency order\n- exact targeted validation command\n- estimated risk and size\n- state: ready or blocked\n\nRules:\n- Read AGENTS.md and applicable repo rules first.\n- Prefer current code, tests, and recent history over stale plans.\n- Use read-only GitHub issue queries only when authenticated and useful.\n- Do not add speculative ideas merely to fill the queue.\n- No remote mutation, branch deletion, push, merge, release, credential work, or live personal-state mutation.\n- A queue/report commit is mandatory even when every candidate is blocked.\n\nCommit:\n- Commit only the queue, report, and directly required parent directories.\n- Suggested message: docs(ops): compile bounded night repair queue\n\nReport:\n- repo floor and canonical validation\n- candidate ledger and why each item was selected or rejected\n- ready queue in dependency order\n- blocked items\n- exact next prompt: P39, P40, or P41\n- commit SHA\n- git status\"", "keywords": ["night queue", "queue compiler", "night shift queue", "compile queue", "overnight plan"]}, {"id": "P39", "seq": "39", "name": "GNHF Overnight Repair Batch", "type": "AUTONOMY + BUILD", "class": "GNHF / NIGHT REPAIR", "sprintRole": "Execute a committed queue with checkpoint commits", "progress": "YES", "useWhen": "P37 passed and P38 committed a finite queue with ready local code repairs.", "inspectFirst": "Committed queue, repo rules, exact acceptance commands, current branch/worktree, and canonical proof.", "expectedOutput": "Up to three repaired queue items, one coherent commit per item, and an updated committed night report.", "nextStep": "Use P42 to refill, P43 after interruption, or P44 in the morning.", "proofGate": "No repeated identical failure, no remote-only work, every attempted item is committed or blocked with evidence.", "color": "Night", "copySheet": "P39_COPY_SAFE", "category": "gnhf", "copyContent": "gnhf `\n--agent xyz_gnhf_agent_spec `\n--worktree `\n--max-iterations 8 `\n--max-tokens 800000 `\n--prevent-sleep on `\n--stop-when \"Up to three ready queue items are committed or blocked with evidence, the queue and night report are current, and the worktree is clean.\" `\n\"Repo: xyz_repo_or_path\n\nSprint: Overnight repair batch\nLane: checkpointed local code repair\n\nPrerequisites:\n- P37 passed for this exact agent.\n- xyz_night_queue_path exists in the starting commit.\n- The repository is clean and on an attached non-GNHF base branch.\n\nInputs:\n- Queue: xyz_night_queue_path\n- Report: xyz_night_report_path\n- Canonical proof: xyz_canonical_proof\n\nObjective:\nSelect at most three ready queue items in dependency order. Work on one item at a time. Produce one coherent commit per completed item and update the queue and report inside that same commit.\n\nPer-item loop:\n1. Reconfirm evidence, owned scope, and exact acceptance command.\n2. Reproduce the defect or prove the missing contract.\n3. Implement the smallest correct repair.\n4. Run targeted validation.\n5. Run xyz_canonical_proof after shared contract changes.\n6. Update the item disposition and checkpoint report.\n7. Commit before starting another item.\n\nNo-progress rules:\n- Do not retry an identical command failure more than once without a code, configuration, or evidence change.\n- Stop an item after two bounded repair attempts.\n- Stop the whole run after two consecutive iterations with no tracked diff.\n- Authentication, quota, spawn, network, and unknown partial-state failures stop the run; they do not authorize blind failover.\n- Bound every wait and test command.\n\nForbidden:\n- remote-only PR cleanup or comment work\n- adding unrelated backlog\n- push, merge, release, force-push, credentials, deployment, live targets, destructive Git\n- hiding failures with skips, log suppression, or inflated timeouts\n\nFinal report:\n- items attempted and dispositions\n- commits in order\n- tests and exact results\n- blockers and preserved state\n- remaining ready queue\n- next prompt: P42, P43, or P44\n- proof ceiling\n- git status\"", "keywords": ["overnight repair", "night repair batch", "repair batch", "gnhf overnight"]}, {"id": "P40", "seq": "40", "name": "GNHF Failure Cluster Repair", "type": "REPAIR + AUTONOMY", "class": "GNHF / FAILURE CLUSTER", "sprintRole": "Repair one shared root-cause cluster from a noisy test suite", "progress": "YES", "useWhen": "AxTask or another issue-heavy repo has many failures that likely share a root cause.", "inspectFirst": "One exact failing command, failure output, related tests, implementation seam, fixtures, and recent changes.", "expectedOutput": "One repaired failure cluster with regression proof, or a committed diagnosis report when repair is unsafe.", "nextStep": "Use P39 for remaining queued items or P42 to refresh the queue.", "proofGate": "At most five related failures are clustered; required failures are not hidden, skipped, or timeout-inflated.", "color": "Cyan", "copySheet": "P40_COPY_SAFE", "category": "gnhf", "copyContent": "gnhf `\n--agent xyz_gnhf_agent_spec `\n--worktree `\n--max-iterations 7 `\n--max-tokens 700000 `\n--prevent-sleep on `\n--stop-when \"One bounded root-cause failure cluster is repaired with regression proof or a diagnosis report is committed with the exact blocker, and the worktree is clean.\" `\n\"Repo: xyz_repo_or_path\n\nSprint: Failure cluster repair\nLane: one shared root cause from a noisy suite\n\nPrerequisite:\n- P37 passed for this agent.\n\nFailing command:\n- xyz_failure_command\n\nRequired checks:\n- xyz_required_checks\n\nObjective:\nRun the exact failing command once, group failures by evidence-backed shared root cause, select one cluster of no more than five related failures, and repair only that cluster.\n\nRules:\n- Capture the initial failure count and representative errors.\n- Distinguish product, fixture, schema, test, environment, and workflow defects.\n- Do not chase unrelated failures after choosing the cluster.\n- Keep required failures as failures until the root cause is fixed.\n- Add regression proof at the narrowest stable layer.\n- Rerun the cluster command after each material repair.\n- Run xyz_canonical_proof only when the repaired surface requires it.\n- Do not convert failures to skips, delete assertions, suppress logs, or raise timeouts to conceal hangs.\n- Stop after two bounded repair attempts when the evidence does not improve.\n\nFallback deliverable:\n- If a safe repair is not possible, create and commit xyz_night_report_path with the cluster, evidence, attempted repairs, and exact next command.\n\nForbidden:\n- broad backlog work\n- push, merge, release, credentials, live targets, destructive Git\n\nReport:\n- initial cluster matrix\n- selected root cause\n- files and commits\n- regression proof\n- remaining unrelated failures\n- proof ceiling\n- git status\"", "keywords": ["failure cluster", "cluster repair", "root cause cluster", "related failures"]}, {"id": "P41", "seq": "41", "name": "GNHF Stateful App / Game Safe Repair", "type": "BUILD + SAFETY", "class": "GNHF / STATEFUL SAFE REPAIR", "sprintRole": "Repair code in a stateful app or game without mutating personal state", "progress": "YES", "useWhen": "BlacksmithGuild or another app/game needs overnight fixes but saves, accounts, or live state are sensitive.", "inspectFirst": "Repo safety doctrine, deterministic fixtures, tests, issue evidence, runtime boundaries, and save/account paths.", "expectedOutput": "Up to three code-level repairs with deterministic tests and a committed runtime-proof handoff when live proof is still needed.", "nextStep": "Use P08 later for disposable live proof; use P42 or P44 after the code lane.", "proofGate": "No personal save, account, free-resource, production, or irreversible runtime mutation occurs.", "color": "Rose", "copySheet": "P41_COPY_SAFE", "category": "gnhf", "copyContent": "gnhf `\n--agent xyz_gnhf_agent_spec `\n--worktree `\n--max-iterations 7 `\n--max-tokens 650000 `\n--prevent-sleep on `\n--stop-when \"Up to three safe code-level issues are committed or blocked, deterministic tests pass, personal and live state remain untouched, and the worktree is clean.\" `\n\"Repo: xyz_repo_or_path\n\nSprint: Stateful app or game safe repair\nLane: code, tests, fixtures, and disposable-state boundaries\n\nPrerequisites:\n- P37 passed for this exact agent.\n- Queue: xyz_night_queue_path\n\nStateful boundary:\n- xyz_stateful_runtime_boundary\n\nObjective:\nRepair up to three ready code-level issues without mutating personal saves, accounts, inventories, currencies, free resources, production services, or other non-disposable state.\n\nRules:\n- Read repo runtime and save/account safety doctrine before mutation.\n- Prefer unit tests, integration tests, deterministic fixtures, simulators, and disposable temporary state.\n- Do not launch the real app or game merely to obtain a stronger proof label.\n- Do not use personal accounts, saves, cloud state, multiplayer services, purchases, or free-resource grants.\n- Stop and write a runtime-proof handoff when live behavior cannot be proven safely offline.\n- Work on one queue item at a time and commit after each completed item.\n- Update xyz_night_queue_path and xyz_night_report_path in each commit.\n- Bound all waits and test processes.\n- Stop after two bounded repair attempts on one item.\n\nAllowed runtime proof:\n- only when the repo provides an explicitly disposable fixture, test profile, save, account, VM, container, or sandbox\n- record the exact disposable-state evidence\n\nForbidden:\n- personal or production data mutation\n- remote PR cleanup, push, merge, release, credentials, destructive Git\n- claiming behavior-observed proof from tests or process startup\n\nReport:\n- issues attempted and commits\n- safety boundary observed\n- tests and results\n- runtime proof achieved or deferred\n- exact P08 handoff when live proof remains\n- git status\"", "keywords": ["stateful app", "game safe", "personal saves", "disposable state", "safe repair"]}, {"id": "P42", "seq": "42", "name": "GNHF Night Queue Refill", "type": "AUTONOMY + PLAN", "class": "GNHF / QUEUE REFILL", "sprintRole": "Refill an exhausted or blocked night queue without starting repairs", "progress": "YES", "useWhen": "The current committed queue is exhausted, blocked, or no longer matches repo truth.", "inspectFirst": "Completed dispositions, blocked items, current issue sources, canonical tests, and recent commits.", "expectedOutput": "A refreshed committed queue of no more than five new ready items plus preserved history.", "nextStep": "Return to P39, P40, or P41.", "proofGate": "Completed work is preserved, blocked items remain explained, and no product code changes occur.", "color": "Amber", "copySheet": "P42_COPY_SAFE", "category": "gnhf", "copyContent": "gnhf `\n--agent xyz_gnhf_agent_spec `\n--worktree `\n--max-iterations 2 `\n--max-tokens 220000 `\n--prevent-sleep on `\n--stop-when \"The queue preserves all prior dispositions, contains no more than five current ready items, is committed with the refreshed report, and the worktree is clean.\" `\n\"Repo: xyz_repo_or_path\n\nSprint: Night queue refill\nLane: planning only after queue exhaustion or drift\n\nInputs:\n- Queue: xyz_night_queue_path\n- Report: xyz_night_report_path\n- Issue sources: xyz_issue_sources\n\nObjective:\nPreserve completed and blocked history, remove no evidence, refresh stale facts, and add no more than five new ready repair items.\n\nRules:\n- Do not change product code, tests, build files, or runtime behavior.\n- Do not reopen completed work unless current evidence proves regression.\n- Keep blocked items with exact blocker and next condition.\n- Every new item requires evidence, owned scope, dependencies, risk, and an exact validation command.\n- Prefer current failing tests and reproducible issues over broad TODO discovery.\n- No remote mutation, push, merge, release, branch deletion, credentials, or live targets.\n\nCommit:\n- Commit the refreshed queue and report.\n- Suggested message: docs(ops): refill bounded night repair queue\n\nReport:\n- prior dispositions preserved\n- stale items changed and why\n- new ready order\n- blocked items\n- exact next prompt: P39, P40, or P41\n- commit SHA\n- git status\"", "keywords": ["queue refill", "night refill", "refill queue", "stale queue"]}, {"id": "P43", "seq": "43", "name": "GNHF Night Run Recovery", "type": "RECOVER + BUILD", "class": "GNHF / NO-PROGRESS RECOVERY", "sprintRole": "Recover a failed or interrupted night run without repeating the same failure", "progress": "YES", "useWhen": "A run stopped on spawn ENOENT, quota, authentication, timeout, no-diff iterations, failed validation, or commit finalization.", "inspectFirst": "Exact worktree, gnhf.log, notes, launcher summary, branch refs, diff, queue, report, and agent command evidence.", "expectedOutput": "A committed recovery report and at most one safe continuation or finalization commit.", "nextStep": "Resume with a proven agent or use P44 to close the preserved state.", "proofGate": "No reset, clean, branch deletion, or blind rerun; the original failure is classified before continuation.", "color": "Violet", "copySheet": "P43_COPY_SAFE", "category": "gnhf", "copyContent": "gnhf `\n--agent xyz_gnhf_agent_spec `\n--current-branch `\n--max-iterations 4 `\n--max-tokens 320000 `\n--prevent-sleep on `\n--stop-when \"The failed night run is classified and preserved, a recovery report is committed, at most one safe continuation or finalization commit is made, and the worktree reaches a known state.\" `\n\"Run from: xyz_gnhf_worktree_or_branch\n\nSprint: Night run recovery\nLane: spawn, quota, auth, timeout, no-diff, validation, or finalization failure\n\nRun evidence:\n- xyz_run_evidence\n\nKnown symptom:\n- xyz_run_symptom\n\nObjective:\nInspect the exact preserved worktree and classify the failure before any retry. Preserve useful changes, commit a recovery report, and make at most one safe continuation or commit-finalization repair.\n\nInspect first:\n- git status, branch, log, diff, and worktree registry\n- .gnhf run notes and gnhf.log\n- launcher summary and route evidence when present\n- queue and night report\n- exact agent command and spawn evidence\n\nFailure classes:\n- agent command ENOENT or unsupported shim\n- authentication required\n- explicit quota exhaustion\n- rate limit or network failure\n- bounded timeout or test hang\n- no tracked diff or no commit\n- validation failure\n- commit finalization failure\n- unknown partial mutation\n\nRules:\n- Do not rerun the same agent after ENOENT without new spawn proof.\n- Do not treat quota, auth, rate limit, or network failure as code failure.\n- Do not reset, clean, delete branches, remove worktrees, or discard changes.\n- Do not start a new feature.\n- If code is safe and nearly complete, make one continuation or finalization commit.\n- Otherwise commit only xyz_night_report_path with exact evidence and next command.\n\nReport:\n- timeline and failure class\n- preserved diff and commits\n- action taken\n- remaining blocker\n- exact next agent and prompt\n- proof ceiling\n- git status\"", "keywords": ["night recovery", "recover night run", "overnight recovery", "morning recovery"]}, {"id": "P44", "seq": "44", "name": "GNHF Morning Closeout", "type": "CLOSEOUT + VALIDATE", "class": "GNHF / MORNING CLOSEOUT", "sprintRole": "Reconcile overnight commits, queue state, proof, and the exact next command", "progress": "YES", "useWhen": "An overnight worktree has commits, blockers, or partial progress that must be made reviewable.", "inspectFirst": "Git log and diff, queue and night report, canonical validation, worktree status, artifacts, and proof ceiling.", "expectedOutput": "Committed closeout report, final validation state, clean worktree, and exact next human command.", "nextStep": "Review, push, open/update a PR, or launch the next bounded queue.", "proofGate": "No new feature begins; all overnight work is dispositioned and process exit code is not used as success proof.", "color": "Gray", "copySheet": "P44_COPY_SAFE", "category": "gnhf", "copyContent": "gnhf `\n--agent xyz_gnhf_agent_spec `\n--current-branch `\n--max-iterations 3 `\n--max-tokens 240000 `\n--prevent-sleep on `\n--stop-when \"All overnight commits and queue items are dispositioned, the required validation state is recorded, the closeout report is committed, and the worktree is clean.\" `\n\"Run from: xyz_gnhf_worktree_or_branch\n\nSprint: Morning closeout\nLane: existing overnight work only\n\nInputs:\n- Queue: xyz_night_queue_path\n- Night report: xyz_night_report_path\n- Closeout: xyz_night_closeout_path\n- Canonical proof: xyz_canonical_proof\n\nObjective:\nReconcile existing overnight work into a reviewable state. Do not begin another feature.\n\nTasks:\n1. Inspect git log, diff, status, queue, night report, and run evidence.\n2. Map every queue item to completed, blocked,
