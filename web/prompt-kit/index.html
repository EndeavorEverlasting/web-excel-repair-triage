 superseded, rejected, or not attempted.\n3. Run targeted validation for changed surfaces.\n4. Run xyz_canonical_proof when required and record PASS, SKIP, or FAIL honestly.\n5. Confirm generated artifacts and secrets are not staged.\n6. Create or update xyz_night_closeout_path.\n7. Commit the closeout report and any required final queue/report corrections.\n8. End with a clean worktree.\n\nRules:\n- No new feature or broad repair begins.\n- Do not push, merge, close PRs, delete branches, release, deploy, authenticate, or mutate live targets.\n- Do not report process exit code as delivery proof.\n- Do not report skipped or unavailable checks as passes.\n- Preserve exact worktree and branch paths for human review.\n\nCloseout report:\n- starting and final HEAD\n- ordered overnight commits\n- files and queue dispositions\n- validation commands and exact results\n- artifacts and logs\n- blockers and proof ceiling\n- recommended push or PR action\n- exact next command\n- git status\"", "keywords": ["morning closeout", "closeout morning", "overnight closeout", "final report"]}, {"id": "P50", "seq": "50", "name": "Directory-First Repository Command Guard", "type": "ANALYZE + DIRECTORY", "class": "STANDARD AI / LOCAL-FIRST REPOSITORY INTAKE", "sprintRole": "Resolve and verify the local repository directory before emitting repository commands", "progress": "Support", "useWhen": "The repository is known but the exact local checkout is unknown, stale, or easy to confuse with another worktree.", "inspectFirst": "Repository URL or name, current shell and directory, Git worktrees, candidate remotes, and any operator-supplied path.", "expectedOutput": "One verified root, a shell-matched directory change, root and remote verification, branch or worktree evidence, then bounded commands.", "nextStep": "Use P51 for local tests, P52 for factoring analysis, or the task-specific sequential prompt after the directory gate passes.", "proofGate": "The first repository command enters the verified root and git rev-parse --show-toplevel resolves to the same directory.", "color": "Blue", "copySheet": "P50_COPY_SAFE", "category": "standard", "copyContent": "PROMPT SURFACE: STANDARD AI. THIS IS NOT A GOODNIGHT, HAVE FUN (GNHF) PROMPT.\n\nANALYZE THE LOCAL REPOSITORY LOCATION BEFORE GIVING THE USER ANY REPOSITORY COMMANDS.\n\nRepository: xyz_repo_url_or_name\nKnown local path, if any: xyz_known_or_unknown\nRequested task: xyz_task\n\nDIRECTORY GATE\n1. Do not assume the current directory, remembered path, repository name, Desktop path, or newest checkout is correct.\n2. Resolve the intended checkout by matching its remote to the requested repository and inspecting git worktree list when available.\n3. When the root is reachable, verify it with git rev-parse --show-toplevel and git remote get-url origin.\n4. When the root cannot be proven, return bounded discovery commands only. Do not return tests, builds, mutations, commits, cleanup, or deployment commands.\n5. After resolution, make the first executable task command Set-Location -LiteralPath \"<verified-root>\" in PowerShell or cd -- \"<verified-root>\" in Bash.\n6. Verify the active root immediately before every later command block.\n\nHARNESS CONTEXT\nName repo, branch or worktree, PR or sprint, lane, owned scope, forbidden scope, expected artifacts, validation order, proof level, and proof ceiling.\nSearch existing contracts, helpers, validators, scripts, manifests, and output patterns before inventing.\n\nFINAL RESPONSE\nReturn root evidence, the directory-change command, root and remote verification, branch or worktree state, then bounded task commands in execution order.", "keywords": ["directory", "command guard", "directory first", "repo command"]}, {"id": "P51", "seq": "51", "name": "Zero-Token Local Test Planner", "type": "ANALYZE + TEST", "class": "STANDARD AI / ZERO-TOKEN LOCAL VALIDATION", "sprintRole": "Analyze the repository and return exact local tests requiring no model or provider tokens", "progress": "YES", "useWhen": "The operator has no model, API, provider, or coding-agent tokens but can run local repository tools.", "inspectFirst": "Verified root, repository rules, manifests, test runners, validators, scripts, workflows, fixtures, changed files, and generated-output policy.", "expectedOutput": "Directory-safe syntax, focused-test, validator, broader-test, artifact, and Git commands that consume no agent tokens.", "nextStep": "Run the commands locally and use P54 to interpret the evidence and choose the next bounded action.", "proofGate": "Every command is repository-backed, follows the verified directory change, and requires no model or coding-agent execution.", "color": "Green", "copySheet": "P51_COPY_SAFE", "category": "standard", "copyContent": "PROMPT SURFACE: STANDARD AI. THIS IS NOT A GOODNIGHT, HAVE FUN (GNHF) PROMPT.\n\nANALYZE THE REPOSITORY AND GIVE THE USER LOCAL TESTS FOR A ZERO-TOKEN SITUATION.\n\nRepository: xyz_repo_url_or_name\nVerified root or directory evidence: xyz_path_or_evidence\nChanged surface or intended task: xyz_scope\n\nDIRECTORY GATE\nResolve, enter, and verify the repository root before returning any test, validator, build, Git, or artifact command.\n\nZERO-TOKEN BOUNDARY\nDo not launch GNHF, Codex, OpenCode, Cursor agents, Goose, AGY, hosted models, local models, or any command that consumes model, API, provider, or coding-agent tokens.\n\nANALYSIS\n1. Read repository instructions and identify the actual language, package manager, test runner, validator CLIs, build scripts, workflows, and changed-file scope.\n2. Reuse repository-owned commands and run narrow checks before broad checks.\n3. Mark network, credentials, Office UI, browser, hardware, deployment, and production checks as separate blocked or operator gates.\n4. Never invent a test target, script, command, or path unsupported by repository evidence.\n\nOUTPUT ORDER\n1. directory change and root verification\n2. non-installing environment checks\n3. parse or syntax checks\n4. focused unit or contract tests\n5. repository validators and artifact checks\n6. broader tests only when justified\n7. git diff --check, git status --short, and generated-output or secret hygiene\n8. expected success evidence and common failure interpretation\n\nReport context, exact commands, skipped checks, locally achievable proof, proof ceiling, and one next decision.", "keywords": ["test planner", "zero token", "local test", "test plan"]}, {"id": "P52", "seq": "52", "name": "Repository Factoring Analyzer", "type": "ANALYZE + FACTOR", "class": "STANDARD AI / REPOSITORY FACTORING ANALYSIS", "sprintRole": "Analyze repository factoring before implementation ownership is assigned", "progress": "Support", "useWhen": "Harness, agent routing, application logic, seams, validation, runtime proof, or docs may be mixed or incompletely owned.", "inspectFirst": "Verified root, rules, maps, manifests, workflows, skills, capabilities, triggers, domain code, validators, tests, reports, PRs, and recent diffs.", "expectedOutput": "Evidence-backed factoring map, collision ledger, keep/create/split/merge/retire/rewire decisions, and bounded owners for every real gap.", "nextStep": "Use P53 for the selected implementation; analysis without build ownership is incomplete.", "proofGate": "Every claim names repository evidence and every buildable gap has one owner and collision boundary.", "color": "Amber", "copySheet": "P52_COPY_SAFE", "category": "standard", "copyContent": "PROMPT SURFACE: STANDARD AI. THIS IS NOT A GOODNIGHT, HAVE FUN (GNHF) PROMPT.\n\nANALYZE AND FACTOR THE REPOSITORY. DO NOT ASSUME THE REQUIRED FACTORING SURFACES EXIST.\n\nRepository: xyz_repo_url_or_name\nVerified root or directory evidence: xyz_path_or_evidence\nRequested concern: xyz_concern\n\nDIRECTORY GATE\nVerify the repository root before returning repository commands or file-path conclusions.\n\nFACTORING SURFACES\nClassify each responsibility into one primary surface: harness spine; agent harness; conventional application logic; integration seam; docs/reporting; validation; runtime proof; research/design.\nFor every skill, capability, and trigger decide KEEP, CREATE, SPLIT, MERGE, RETIRE, or REWIRE.\nSkills contain reusable guidance. Capabilities expose reusable operations. Triggers route deterministic conditions. Product behavior remains in code and domain contracts.\n\nEVIDENCE LOOP\n1. Inspect rules, Git state, worktrees, commits, PRs, maps, manifests, scripts, validators, tests, generated-output policy, and artifacts.\n2. Search existing owners and names before inventing.\n3. Record owner, activation, inputs, outputs, preconditions, forbidden conditions, guardrails, tests, proof level, and likely files.\n4. Identify duplicate owners, hidden prompt-only behavior, stale registries, unassigned gaps, oversized modules, cross-layer imports, and validation blind spots.\n5. Separate real research blockers from buildable gaps.\n6. Assign each buildable gap to one bounded sprint and identify safe parallel lanes and collision files.\n\nOUTPUT\nReturn current state, factoring map, decisions, collision ledger, missing surfaces, exact files, local tests, dependency order, owners, proof ceiling, and one next decision.", "keywords": ["factoring analyzer", "analyze factoring", "repo factoring"]}, {"id": "P53", "seq": "53", "name": "Repository Factoring Builder", "type": "BUILD + FACTOR", "class": "STANDARD AI / REPOSITORY FACTORING IMPLEMENTATION", "sprintRole": "Implement one bounded factoring gap after evidence selects it", "progress": "YES", "useWhen": "P52 or equivalent evidence has selected one bounded harness, agent-harness, application, seam, validation, or docs gap.", "inspectFirst": "Verified root, selected ledger row, rules, current owners, tests, validators, dependent PRs, and collision boundaries.", "expectedOutput": "Tracked implementation, updated contracts and tests, local validation evidence, coherent commit, push, and opened or updated PR when available.", "nextStep": "Use P54 for evidence-based closeout, then route to cleanup, broken-PR, merge/release, or final closeout as appropriate.", "proofGate": "The selected gap is implemented in repository files and contracts; a plan-only response is failure.", "color": "Purple", "copySheet": "P53_COPY_SAFE", "category": "standard", "copyContent": "PROMPT SURFACE: STANDARD AI. THIS IS NOT A GOODNIGHT, HAVE FUN (GNHF) PROMPT.\n\nIMPLEMENT THE SELECTED REPOSITORY FACTORING SPRINT. DO NOT RETURN A FACTORING MAP OR PLAN ONLY.\n\nRepository: xyz_repo_url_or_name\nVerified root or directory evidence: xyz_path_or_evidence\nSelected gap: xyz_selected_gap\nBranch or worktree: xyz_branch_or_worktree\nPR or sprint: xyz_pr_or_sprint\nLane: xyz_lane\nOwned scope: xyz_owned_scope\nForbidden scope: xyz_forbidden_scope\nExpected artifacts: xyz_expected_artifacts\nValidation order: xyz_validation_order\n\nDIRECTORY GATE\nResolve, enter, and verify the exact repository root before any test, mutation, Git, or GitHub command.\n\nEXECUTION\n1. Inspect existing owners, contracts, helpers, validators, scripts, manifests, tests, logs, reports, branch conventions, and generated-output policy.\n2. Preserve useful work and use an isolated worktree when unrelated changes exist.\n3. Implement the smallest coherent change in the correct surface. Keep product behavior in code and contracts.\n4. Update connected schemas, fixtures, skills, capabilities, triggers, workflows, scripts, validators, docs, reports, and manifests as required.\n5. Add focused executable tests.\n6. Run the specified validation order, git diff --check, hygiene checks, and git status --short.\n7. Commit coherent changes, push normally, and open or update the intended PR when available.\n8. Do not merge, deploy, force-push, delete unknown worktrees, weaken validators, or broaden scope.\n\nFINAL RESPONSE\nReport context, files, artifacts, validation, commit SHA, push and PR state, skips, gaps, proof, final Git state, and one exact next command.", "keywords": ["factoring builder", "build factoring", "implement factoring"]}, {"id": "P54", "seq": "54", "name": "Local-Only Validation and Closeout", "type": "VALIDATE + CLOSE", "class": "STANDARD AI / LOCAL-FIRST CLOSEOUT", "sprintRole": "Interpret local evidence and choose the next bounded action without launching another agent", "progress": "YES", "useWhen": "Local commands have run and the operator needs an evidence-based closeout, blocker report, or next command without model-backed execution.", "inspectFirst": "Verified root, command output, logs, validator reports, artifacts, Git diff/status/log, worktree state, push state, and PR state.", "expectedOutput": "Evidence classification, completed work, exact failures, proof and ceiling, Git state, and one safe local command or prompt route.", "nextStep": "Use P06 for cleanup, P14 for broken PR repair, P15 for merge/release, or P12 for final closeout only when entry conditions pass.", "proofGate": "No completion claim is made without passing checks or exact artifact and Git evidence.", "color": "Teal", "copySheet": "P54_COPY_SAFE", "category": "standard", "copyContent": "PROMPT SURFACE: STANDARD AI. THIS IS NOT A GOODNIGHT, HAVE FUN (GNHF) PROMPT.\n\nANALYZE THE LOCAL RESULTS AND CLOSE OUT THE BOUNDED SPRINT WITHOUT LAUNCHING A TOKEN-CONSUMING AGENT.\n\nRepository: xyz_repo_url_or_name\nVerified root or directory evidence: xyz_path_or_evidence\nCommands and outputs: xyz_local_evidence\nIntended sprint: xyz_sprint\n\nDIRECTORY GATE\nBefore any follow-up command, verify it will run from the same proven root and put Set-Location or cd first when needed.\n\nEVIDENCE REVIEW\n1. Separate PASS, FAIL, BLOCKED, NOT RUN, and NOT APPLICABLE.\n2. Map each result to the exact test, validator, artifact, file, commit, branch, worktree, push, PR, release, deployment, or runtime claim it supports.\n3. Distinguish static, build, CI, local runtime, browser, Office, deployment, and operator-acceptance proof.\n4. Inspect git diff --check, git status --short, git log --oneline --decorate -5, and hygiene evidence when available.\n5. Route to P03, P06, P07, P14, P15, P20, or P12 only when its entry condition is satisfied.\n\nOUTPUT\nReturn completed work, evidence, artifacts, failures, skipped checks, risks, proof, ceiling, Git and PR state, and one exact directory-safe next command.", "keywords": ["local validation", "local closeout", "validate locally"]}, {"id": "P55", "seq": "55", "name": "GitHub CLI Repository Bootstrapper", "type": "BUILD + BOOTSTRAP", "class": "STANDARD AI / GITHUB CLI REPOSITORY CREATION", "sprintRole": "Safely create and verify a new GitHub repository and local checkout through Git and GitHub CLI", "progress": "YES", "useWhen": "The operator wants to create a new GitHub repository and clone it locally or publish one explicitly selected existing local repository.", "inspectFirst": "Requested owner/name, explicit visibility, description, verified parent or source directory, Git and gh availability, active account, remote policy, bootstrap choices, collision checks, and mutation authority.", "expectedOutput": "Verified GitHub repository, verified local root and origin, optional initial files or pushed history exactly as requested, command evidence, repository URL, branch state, and next command.", "nextStep": "Enter the verified new root and use P03 or P07 for the first bounded repository sprint.", "proofGate": "Parent or source is verified, owner/name and visibility are explicit, authentication is healthy without token exposure, no collision exists, gh repo create succeeds, and remote/local evidence matches.", "color": "Ocean", "copySheet": "P55_COPY_SAFE", "category": "standard", "copyContent": "PROMPT SURFACE: STANDARD AI. THIS IS NOT A GOODNIGHT, HAVE FUN (GNHF) PROMPT.\n\nCREATE AND VERIFY A NEW GITHUB REPOSITORY THROUGH GIT AND GITHUB CLI. DO NOT RETURN A PLAN ONLY WHEN CREATION IS EXPLICITLY AUTHORIZED.\n\nRequested repository: xyz_owner/xyz_repo_name\nVisibility: xyz_private_public_or_internal\nDescription: xyz_description\nLocal mode: xyz_clone_new_remote_or_publish_existing_local_repo\nLocal parent or source directory: xyz_verified_path_or_unknown\nBootstrap options: xyz_readme_license_gitignore_template_or_none\n\nDIRECTORY GATE\n1. Resolve and verify the intended parent directory for clone mode or the exact existing Git root for publish-existing mode before any creation command.\n2. Enter that path first with Set-Location -LiteralPath or cd --.\n3. In publish-existing mode run git rev-parse --show-toplevel, git status --short, git branch --show-current, git log --oneline --decorate -5, and git remote -v. Refuse the wrong root, ambiguous history, unowned dirty work, or conflicting origin.\n4. In clone mode verify the intended child path does not contain unknown work and never delete or overwrite it automatically.\n\nPRECONDITIONS\n1. Run git --version and gh --version.\n2. Run gh auth status --active --hostname github.com. Never use --show-token, print token-bearing environment variables, request credentials in chat, or automate gh auth login.\n3. Confirm the active account can create under xyz_owner. Authentication, permission, network, and policy failures are blockers.\n4. Require explicit owner/name and exactly one visibility choice. Never default to public.\n5. Check gh repo view xyz_owner/xyz_repo_name and distinguish existing, confirmed not-found, authentication, permission, and network outcomes.\n6. Validate optional license, gitignore, and template values before using them.\n\nMODE A — NEW REMOTE AND LOCAL CLONE\nUse a reviewed command shaped as gh repo create xyz_owner/xyz_repo_name --private --description xyz_description --clone, replacing visibility only with the explicit choice and adding optional flags only when selected.\nAfter creation, enter the child directory and verify root, origin, branch, recent log, and status.\n\nMODE B — PUBLISH AN EXISTING LOCAL REPOSITORY\nUse only when the operator selected the verified existing repository and approved publishing its history.\nUse a reviewed command shaped as gh repo create xyz_owner/xyz_repo_name --private --description xyz_description --source \"<verified-root>\" --remote origin --push.\nOmit --push without explicit approval. Refuse unexpected remotes, secret or private generated artifacts, detached HEAD, unreviewed history, or dirty work outside scope.\n\nVERIFICATION\n1. Run gh repo view xyz_owner/xyz_repo_name --json nameWithOwner,url,visibility,defaultBranchRef.\n2. Run git remote get-url origin, git branch --show-current, git log --oneline --decorate -5, and git status --short from the verified new root.\n3. Confirm owner/name, visibility, and origin exactly match the request.\n4. When push was requested, confirm the remote branch contains the expected commit.\n\nFINAL RESPONSE\nReport repo, verified parent and root, active account without token material, creation mode and command, visibility and bootstrap flags, remote and origin URLs, branch and commit evidence, files, validation, skips, blockers, proof, ceiling, final Git state, and one exact next command.", "keywords": ["bootstrap", "github cli", "repo bootstrap", "create repo"]}, {"id": "P56", "seq": "56", "name": "Context-to-Artifact Generator", "type": "BUILD + ARTIFACT", "class": "STANDARD AI / CONTEXT-TO-ARTIFACT GENERATION", "sprintRole": "Generate the actual requested artifact from supplied context and repository evidence", "progress": "YES", "useWhen": "The user supplies context, requirements, examples, or source files and expects a real document, spreadsheet, slide deck, archive, report, manifest, or other deliverable.", "inspectFirst": "Provided context and files, repository rules, artifact registry, templates, schemas, prior accepted artifacts, generators, validators, output policy, and field-acceptance requirements.", "expectedOutput": "The actual requested artifact plus repository-backed manifests, registry updates, validation evidence, path, hash, proof level, and proof ceiling when those surfaces apply.", "nextStep": "Open or field-test the artifact, then use the task-specific implementation, repair, merge, or closeout prompt only when its entry conditions pass.", "proofGate": "A real output file exists and passes the strongest practical artifact-specific, package, formula, structural, visual, or runtime checks; a plan or sample-only response is failure.", "color": "Cream", "copySheet": "P56_COPY_SAFE", "category": "standard", "copyContent": "PROMPT SURFACE: STANDARD AI. THIS IS NOT A GOODNIGHT, HAVE FUN (GNHF) PROMPT.\n\nGENERATE THE ACTUAL ARTIFACT FROM THE PROVIDED CONTEXT. DO NOT STOP AT AN OUTLINE, PLAN, SAMPLE, OR HANDOFF.\n\nRepository or artifact family: xyz_repo_or_artifact_family\nSource context and files: xyz_context_and_sources\nRequested artifact: xyz_artifact\nOutput format and destination: xyz_format_and_destination\nAcceptance requirements: xyz_acceptance_requirements\n\nDIRECTORY GATE\nWhen the artifact is repository-backed, resolve, enter, and verify the exact repository root before running generators, validators, Git, or GitHub commands. When no repository applies, state the bounded output directory and source authority.\n\nHARNESS CONTEXT\nName repo or artifact family, branch or worktree, PR or sprint, lane, owned scope, forbidden scope, expected artifacts, validation order when specified, proof level, and proof ceiling.\nInspect existing templates, artifact registries, generators, schemas, validators, manifests, accepted examples, naming rules, output folders, and generated-output policy before inventing.\n\nARTIFACT EXECUTION CONTRACT\n1. Convert the supplied context into concrete acceptance criteria and identify the authoritative source material.\n2. Reuse the repository or artifact family's existing generator and formatting patterns. Do not substitute a different serializer merely because it is convenient.\n3. Create the actual requested file or files. Include manifests, sidecars, registry entries, or bundles when the artifact family already requires them.\n4. Preserve source files and never commit secrets, personal data, machine-local junk, huge logs, or disposable runtime evidence.\n5. Run focused artifact validators first, then package, formula, structural, visual, build, or runtime checks as practical.\n6. Inspect the generated artifact itself, not only the generator's exit code. Record exact skipped field gates.\n7. For repository-backed work, commit coherent tracked changes, push normally, and open or update the intended PR when available.\n8. Do not claim completion without an output path, hash when practical, validator evidence, Git proof when applicable, and an explicit proof ceiling.\n\nFINAL RESPONSE\nReport context, actual artifact links or paths, supporting files, validation commands and results, commit SHA and PR state when applicable, skipped checks, gaps, risk, proof ceiling, and one exact next command.", "keywords": ["artifact", "generate artifact", "build artifact", "context to artifact", "create artifact", "output file"]}, {"id": "P57", "seq": "57", "name": "Portable Harness Discipline Executor", "type": "INSTALL + ENFORCE", "class": "STANDARD AI / PORTABLE HARNESS DISCIPLINE", "sprintRole": "Install and enforce portable operational harness discipline across repositories, apps, agents, and artifact families", "progress": "YES", "useWhen": "A repository or app must codify reusable execution, evidence, artifact, Git, GitHub, and agent guardrails that external agents can discover and carry into other repositories.", "inspectFirst": "Verified repo root or connected GitHub branch, existing agent rules, harness maps, workflows, artifact registries, validators, scripts, prompt routing, generated-output policy, branches, PRs, and accepted artifacts.", "expectedOutput": "Tracked portable doctrine, machine-readable policy, validator or test enforcement, updated artifact contracts, passing checks, coherent commit, push, and opened or updated PR evidence.", "nextStep": "Use P03, P06, P07, P14, P15, P20, or P12 according to the codified sequential routing and the current repository state.", "proofGate": "External agents can discover the policy from repository-owned surfaces; validators fail policy drift; repository mutation, checks, commit SHA, push, and PR evidence are present.", "color": "Cream", "copySheet": "P57_COPY_SAFE", "category": "standard", "copyContent": "PROMPT SURFACE: STANDARD AI. THIS IS NOT A GOODNIGHT, HAVE FUN (GNHF) PROMPT.\n\nINSTALL AND ENFORCE PORTABLE HARNESS DISCIPLINE IN THE REPOSITORY NOW. DO NOT RETURN DOCTRINE, A PLAN, OR A HANDOFF WITHOUT REPOSITORY MUTATION.\n\nRepository: xyz_repo_or_path\nBranch or worktree: xyz_branch_or_worktree\nPR or sprint: xyz_pr_or_sprint\nLane: xyz_lane\nOwned scope: xyz_owned_scope\nForbidden scope: xyz_forbidden_scope\nExpected artifacts: xyz_expected_artifacts\nValidation order: xyz_validation_order\n\nDIRECTORY GATE\nResolve, enter, and verify the exact repository root before tests, mutations, Git, or GitHub commands.\nWhen the repository is not network-clonable from the execution container, use the connected GitHub branch as the mutation surface and reconstruct only the relevant generator, validator, and test files locally for bounded validation. Record that proof ceiling explicitly.\n\nREQUIRED HARNESS CONTEXT\nAlways name repo, branch or worktree, PR or sprint, lane, owned scope, forbidden scope, expected artifacts, and validation order when the user specifies one.\nTreat plans, docs, prompts, manifests, scripts, validators, logs, reports, branches, PRs, releases, deployments, and generated artifacts as one connected operational system.\nPrefer the executable loop: request -> evidence review -> bounded decision -> repo/Git/GitHub mutation -> artifacts -> validation -> report -> next decision.\nEvidence before confidence. Do not claim completion without passing checks, validator output, logs or generated artifacts, commit SHA, branch or worktree state, push confirmation, PR mutation, merge, closure, tag, release, deployment, or runtime evidence appropriate to scope.\n\nREPOSITORY AND ARTIFACT RULES\nRepository work may include code, doctrine, docs, comments, review replies, branches, worktrees, cherry-picks, reverts, restores, merges, conflict repair, PR metadata, releases, installs, and deployments when explicitly in scope.\nPreserve useful work before destructive cleanup. Search existing contracts, helpers, validators, scripts, names, artifact registries, generators, and output patterns before inventing. Keep changes bounded and avoid unrelated rewrites.\nAcross artifact families, generate the actual artifact, inspect it, validate it, record its path and hash when practical, and keep proof ceilings explicit.\nFor Prompt Library artifacts, columns B:O of every prompt row link to the associated prompt tab and exact copy range while preserving displayed values. Columns A and P remain reserved for sparse top/bottom navigation.\nChoose sparse navigation deterministically using the largest divisor among 10, 5, and 2 that evenly divides the prompt count. Fail closed when no allowed cadence divides the count.\n\nSEQUENTIAL PROMPT SUITE\nUse P03 for unknown repository intake and first action; P06 for repository and PR cleanup; P07 for general implementation; P14 for a broken PR; P15 for merge or release; P20 for a selected Opportunity_Discovery row; and P12 for closeout.\nTask-specific prompt rules override generic closeout behavior. Do not substitute a rewritten prompt, plan, or handoff for requested repository work.\n\nIMPLEMENTATION\n1. Inspect existing repository-native authority surfaces before adding new ones.\n2. Write portable human-readable doctrine and a machine-readable policy under stable repository paths.\n3. Add validators and focused tests that fail when required context, execution loop, evidence rules, connected-GitHub fallback, artifact row links, sparse cadence, or sequential routing drifts.\n4. Connect the policy to relevant generators, workflows, manifests, reports, and agent entry surfaces.\n5. Run focused tests, validators, broader checks when practical, git diff --check, and hygiene checks.\n6. Commit coherent changes, push normally, and open or update the intended PR. Acknowledgment-only completion is invalid.\n\nFINAL RESPONSE\nReport context, tracked doctrine and policy paths, enforced guardrails, generated artifacts, validation, commit SHA, push and PR state, skips, gaps, proof ceiling, final Git state, and one exact next command.", "keywords": ["portable discipline", "harness discipline", "install discipline", "enforce rules"]}, {"id": "P45", "seq": "45", "name": "AI-to-GNHF Prompt Compiler", "type": "COMPILE ONLY", "class": "AI / GNHF PROMPT COMPILER", "sprintRole": "Compile operator intent into one versioned GNHF prompt result", "progress": "Support", "useWhen": "A repo-aware AI has a regular request and must produce one bounded GNHF prompt without starting the sprint.", "inspectFirst": "AgentSwitchboard regular-sprint-request v1, compiled-gnhf-prompt-result v1, repo rules, Git evidence, validators, artifacts, agent spawn evidence, and operator constraints.", "expectedOutput": "Exactly one compiled-gnhf-prompt-result v1 JSON document containing one self-contained GNHF prompt.", "nextStep": "Validate the JSON with AgentSwitchboard, then choose a separate launch surface if execution is intended.", "proofGate": "The v1 result validates, selects exactly one Git mode, contains all bounds and proof fields, and no execution begins.", "color": "Sand", "copySheet": "P45_COPY_SAFE", "category": "gnhf", "copyContent": "COMPILE ONLY. DO NOT EXECUTE THE SPRINT, START GNHF, MODIFY FILES, OR CLAIM RUNTIME PROOF.\n\nINPUT\nAccept one AgentSwitchboard regular-sprint-request v1 object with kind regular-sprint-request, schemaVersion 1, objective, repository, ownedScope, forbiddenScope, expectedArtifacts, safetyConstraints, desiredProofLevel, executionIntent, readFirst, and validators.\nexecutionIntent must be exactly one of compile_only, local_execute, environment_configure, or registered_workflow_execute. Compile-only requests must not authorize -Run.\nInspect repository evidence when available: AGENTS.md, Git status and branch, recent commits, worktrees, open PRs, plans, manifests, validators, tests, artifacts, logs, CI, and exact agent spawn evidence.\nMark stale or unavailable evidence. Do not invent repository facts or depend on unprovided chat history.\n\nOUTPUT\nReturn exactly one JSON document conforming to AgentSwitchboard compiled-gnhf-prompt-result v1. Return no prose before or after it.\nSet kind to compiled-gnhf-prompt-result and schemaVersion to 1.\nInclude repository, prompt, gitExecution, agentRoute, bounds, ownedScope, forbiddenScope, expectedArtifacts, readFirst, validationOrder, commitContract, pushContract, stopCondition, proofLevel, proofCeiling, finalResponseContract, and nextCommand.\nChoose exactly one gitExecution.mode: worktree or current-branch. Never request both.\nBounds must include maxIterations, maxTokens, preventSleep, and timeoutSeconds.\nEach expected artifact must use a repository-relative path and state its proof.\ncommitContract.required must be true and require a commit ahead of the base.\npushContract.mode must be none or manual; merge and deploy must be false.\nThe embedded prompt must instruct GNHF to inspect, modify tracked files, validate, commit, and stop with evidence.\nA process exit, repeated stop text, unsupported adapter, authentication request, or quota exhaustion is not completion proof.\nReject secrets, credential-like values, automatic merge or deployment, default-branch writes, destructive cleanup, and personal or production data mutation.\nThe compiled prompt must be self-contained and paste-ready, but this compile-only prompt must not launch it.", "keywords": ["compiler", "ai to gnhf", "prompt compiler", "compile prompt"]}, {"id": "P46", "seq": "46", "name": "GNHF Repo Harness Builder", "type": "HARNESS + BUILD", "class": "GNHF / HARNESS BUILDER", "sprintRole": "Build or repair a repo-local AI harness and commit the implementation", "progress": "YES", "useWhen": "A repository needs executable agent rules, workflows, registries, validators, skills, capabilities, triggers, and proof gates.", "inspectFirst": "Existing repo rules, tests, scripts, manifests, hooks, generated-output policy, branch and PR conventions, and any partial harness.", "expectedOutput": "Committed harness spine and agent harness with deterministic routing, validators, fixtures, workflow contracts, documentation, and a clean handoff.", "nextStep": "Use P47 to execute one committed harness workflow against a bounded product sprint.", "proofGate": "A fresh agent can discover repo law, select a workflow, run validators, avoid known traps, register artifacts, and prove a commit ahead of base.", "color": "Cream", "copySheet": "P46_COPY_SAFE", "category": "gnhf", "copyContent": "gnhf `\n--agent xyz_proven_gnhf_agent_spec `\n--worktree `\n--max-iterations 8 `\n--max-tokens 800000 `\n--prevent-sleep on `\n--stop-when \"The repo-local harness is implemented and committed, required validators pass or exact blockers are committed, generated artifacts are registered, and the worktree is clean.\" `\n\"Repo: xyz_repo_or_path\n\nSprint: Build or repair the repo-local AI harness.\nLane: harness spine, agent harness, integration seams, validation, and operator reporting.\n\nDo not return a plan only. Inspect existing repository rules, tests, scripts, manifests, hooks, plans, validators, artifact policies, branch conventions, and partial harness files before inventing.\nBuild the smallest coherent harness that lets a fresh agent discover governing instructions, choose the correct workflow, call verified capabilities, respond to deterministic triggers, run validators, register outputs, avoid forbidden mutations, commit useful work, and hand off cleanly.\nImplement schemas, fixtures, validators, skills, capabilities, triggers, workflow and artifact registries, run context, proof gates, and explicit integration seams as required by current repository evidence.\nKeep product behavior in domain code and contracts rather than prompts. Reuse existing repo patterns and do not create a competing harness.\n\nValidation order:\n1. parse schemas, manifests, and scripts\n2. run focused harness contract tests\n3. run trigger and capability fixtures\n4. run existing repository validators\n5. run build or static checks\n6. run secret, generated-output, and git-diff hygiene checks\n\nCommit coherent tracked changes. Do not merge, force-push, write the default branch, expose secrets, delete unknown worktrees, or claim runtime proof from static checks.\nA plan-only response is failure.\nFinal response must include branch, commit SHA, files, harness factoring, validations, artifacts, blockers, proof achieved, proof ceiling, final Git status, and one exact next command.\"", "keywords": ["repo harness builder", "harness builder gnhf", "build harness gnhf"]}, {"id": "P47", "seq": "47", "name": "GNHF Harness Workflow Executor", "type": "HARNESS + EXECUTE", "class": "GNHF / HARNESS EXECUTOR", "sprintRole": "Execute one committed harness workflow with artifact and commit proof", "progress": "YES", "useWhen": "The repo-local harness exists and one registered workflow should perform a bounded product or repair sprint.", "inspectFirst": "Harness registries, selected workflow, run context, artifact contract, runtime-certification policy when required, owned files, validators, current Git floor, and prior run evidence.", "expectedOutput": "One bounded workflow execution with registered artifacts, checkpoint commits, validation evidence, updated run context, and an exact blocker when completion is unsafe.", "nextStep": "Review the artifact and commit proof, then push or update the PR only when authorized.", "proofGate": "The workflow is registered, every completed item has artifact or code proof, canonical validators run, live-runtime-certified workflows use a real provider-backed entrypoint, and the required commit exists ahead of base.", "color": "Night", "copySheet": "P47_COPY_SAFE", "category": "gnhf", "copyContent": "gnhf `\n--agent xyz_proven_gnhf_agent_spec `\n--worktree `\n--max-iterations 10 `\n--max-tokens 1000000 `\n--prevent-sleep on `\n--stop-when \"The selected registered workflow has completed its bounded queue or every remaining item has an exact committed blocker, required artifacts and validation evidence are registered, and the worktree is clean.\" `\n\"Repo: xyz_repo_or_path\n\nSprint: Execute one repo-local harness workflow.\nWorkflow ID: xyz_registered_workflow_id\nOwned scope: xyz_owned_scope\nForbidden scope: xyz_forbidden_scope\n\nDo not return a plan only. Read the repo law, run context schema, workflow registry, artifact registry, selected workflow, capability and trigger contracts, current branch and worktrees, recent commits, tests, validators, and prior evidence.\nRefuse unregistered workflows, missing inputs, unknown partial work, absent mutation authority, or a failed exact agent spawn preflight.\nExecute through repository code and contracts. Use checkpoint commits for coherent completed items and do not repeat an identical deterministic failure without a changed condition.\nWhen the selected workflow requires live_runtime_certified proof, invoke the registered real runtime entrypoint and perform the actual provider-backed action. Static, CI, spawn-only, process-exit, simulated, or disposable-harness evidence cannot satisfy that proof level.\nRegister every required artifact with run ID, inputs and hashes where allowed, producing workflow, validator profile, privacy class, proof level, and proof ceiling.\nRun workflow validation, repository validators, build checks, secret and generated-output hygiene, git diff --check, and final Git status.\nDo not merge, force-push, deploy, release, mutate personal or production state, weaken validators, or hide failures.\nA successful process exit without the required artifact and commit is failure.\nFinal response must include workflow ID, run ID, branch, checkpoint commits, files, artifacts, validations, blocked items, proof achieved, proof ceiling, final Git status, and one exact next command.\"", "keywords": ["harness executor", "workflow executor", "execute harness"]}, {"id": "P48", "seq": "48", "name": "Cursor Local GNHF Runtime Executor", "type": "CURSOR + LIVE CERT", "class": "CURSOR / LIVE GNHF RUNTIME CERTIFICATION", "sprintRole": "Execute and certify one live provider-backed GNHF runtime sprint with validated committed actions", "progress": "YES", "useWhen": "Cursor has repository and terminal access and the operator explicitly wants end-to-end live certification of the real agent route, GNHF runtime, repository action, validators, commit, and authorized push or PR update.", "inspectFirst": "Local repository and terminal access, live-runtime-certification policy, AgentSwitchboard v1 schemas, Cursor runtime entrypoint, clean non-default Git target, real provider and agent route readiness, validators, evidence root, and intended PR authority.", "expectedOutput": "A real provider-backed GNHF runtime certification: saved request and compiled prompt, visible prompt emission, actual bounded repository action, focused and repository validation, coherent commit ahead of floor, authorized push or PR evidence, and a machine-readable runtime-certification report.", "nextStep": "Review the runtime-certification report, committed action, validation evidence, and pushed or updated PR; route exact authentication, quota, network, spawn, validation, or commit blockers without claiming certification.", "proofGate": "A real provider-backed agent and GNHF runtime performed the bounded action in the intended repository, validators passed, a commit exists ahead of the recorded floor, and the runtime-certification report proves the route, action, commit, and proof ceiling.", "color": "Violet", "copySheet": "P48_COPY_SAFE", "category": "gnhf", "copyContent": "EXECUTE A LIVE RUNTIME CERTIFICATION IN CURSOR. DO NOT STOP AT PLAN MODE, DRY RUN, STATIC CHECKS, AGENT SPAWN, PROCESS EXIT, SIMULATION, OR A DISPOSABLE HARNESS.\n\nRepository: xyz_repo_or_path\nBranch or worktree: xyz_branch_or_worktree\nOwned runtime action: xyz_owned_runtime_action\nForbidden scope: xyz_forbidden_scope\nExpected committed result: xyz_expected_committed_result\nValidation order: xyz_validation_order\n\n1. Confirm this Cursor agent has the intended local repository and terminal access. Read AGENTS.md, HARNESS.md, configs/harness/runtime_certification_v1.json, AgentSwitchboard v1 contracts, current branch/worktrees, recent commits, PR evidence, validators, and prior runtime evidence.\n2. Record the Git floor. Use a clean non-default branch or isolated worktree. Refuse default-branch mutation, detached targets, unrelated dirty work, missing authority, or unknown partial work.\n3. Confirm a real provider-backed agent route is authenticated, available, quota-ready, and supported. Do not substitute a mock, simulated provider, disposable proof harness, or spawn-only check.\n4. Convert the request into regular-sprint-request v1 and compiled-gnhf-prompt-result v1 with executionIntent local_execute, exactly one Git mode, bounded iterations, tokens, timeout, sleep prevention, owned scope, forbidden scope, expected artifacts, validators, commit contract, and proof ceiling.\n5. Save both documents under approved ignored evidence paths. Do not commit credentials, private data, machine-local paths, or disposable runtime logs.\n6. Invoke AgentSwitchboard tooling/gnhf/Invoke-CursorGnhfSprint.ps1 with -RequestPath, -CompiledPromptPath, -TargetRepo, and explicit -Run. Require the entrypoint to print the complete compiled prompt visibly before GNHF begins.\n7. The live run must perform the stated bounded repository action through the real agent route. Starting GNHF, spawning an agent, or exiting successfully without the action is failure.\n8. Inspect the resulting files and artifacts. Run the specified focused validators, then repository validators, build or static checks, git diff --check, secret and generated-output hygiene, and final Git status.\n9. Commit the coherent validated action. The commit must be ahead of the recorded floor and must include required code, contract, test, validator, or documentation changes. Uncommitted runtime behavior is not certified.\n10. Push normally and open or update the intended PR only when authorized. Never force-push, merge, deploy, release, expose secrets, or write the default branch.\n11. Write .agent-evidence/runtime-certifications/xyz_run_id/runtime-certification.json with repository, branch or worktree, base SHA, agent route, provider, runtime entrypoint, timestamps, performed actions, validators, commit SHA, push or PR state, blockers, proof level, and proof ceiling.\n12. Authentication, quota, network, unsupported adapter, failed spawn, dirty target, missing action, failed validator, missing commit, or missing evidence report is an exact blocker and never a live-certification pass.\n\nFinal response must include run ID, request and compiled-prompt paths, certification-report path, evidence directory, provider and agent route, branch or worktree, base and commit SHA, performed actions, files, artifacts, validations, push or PR state, blockers, proof achieved, proof ceiling, final Git status, and one exact next command.", "keywords": ["cursor", "live cert", "cursor runtime", "cursor gnhf"]}, {"id": "P49", "seq": "49", "name": "GNHF and Development Agent Environment Auto-Configurator", "type": "ENVIRONMENT + CONFIGURE", "class": "LOCAL AGENT / ENVIRONMENT CONFIGURATION", "sprintRole": "Route workstation setup through AgentSwitchboard's Plan and Apply entrypoint", "progress": "Support", "useWhen": "A local coding agent must configure or repair the workstation environment before a GNHF runtime sprint.", "inspectFirst": "AgentSwitchboard workstation setup manifest and entrypoint, current installation inventory, unmanaged configuration, authentication state, reboot requirements, evidence root, and rollback paths.", "expectedOutput": "A reviewed Plan, an explicit idempotent Apply when authorized, preserved configuration, exact evidence and rollback paths, and honest authentication or reboot blockers.", "nextStep": "Run P48 only after the environment Plan or authorized Apply and focused workstation contracts pass.", "proofGate": "AgentSwitchboard repository-owned setup code produced Plan or Apply evidence; no prompt-embedded installer or automatic authentication was used.", "color": "Teal", "copySheet": "P49_COPY_SAFE", "category": "gnhf", "copyContent": "CONFIGURE THE LOCAL GNHF AND DEVELOPMENT AGENT ENVIRONMENT THROUGH AGENTSWITCHBOARD. DO NOT EMBED OR REIMPLEMENT INSTALLATION LOGIC IN THIS PROMPT.\n\n1. Confirm local repository and terminal access and inspect AgentSwitchboard instructions, workstation manifest, setup scripts, tests, and installation evidence.\n2. Invoke tooling/wsl/Start-TmuxGnhfWorkspaceSetup.ps1 in -Mode Plan first and save the exact Plan evidence path.\n3. Inventory PowerShell 7, WSL Ubuntu, WezTerm, tmux, Node, GNHF, OpenCode, AGY, Goose, and other approved agents represented by AgentSwitchboard.\n4. Reuse healthy installations and preserve unmanaged or user-owned configuration.\n5. Do not automate provider authentication, OAuth, API keys, credential entry, or secret capture.\n6. Identify reboot and resume checkpoints before Apply and record evidence, backup, rollback, and resume paths.\n7. Run -Mode Apply only after explicit operator authorization. Apply must be idempotent and bounded.\n8. Run AgentSwitchboard workstation contracts and classify unsupported tools, authentication, reboot, quota, and network conditions honestly.\n9. Do not create a second installer, use focus-dependent automation, modify unrelated repositories, merge, deploy, or expose credentials.\n10. Report mode, reused and changed components, evidence, backups, rollback, checkpoints, validation, blockers, proof, ceiling, and one next command.", "keywords": ["auto config", "environment config", "agent config", "dev environment"]}, {"id": "P58", "seq": "58", "name": "Context-Aware Troubleshooter", "type": "ANALYZE + TEST", "class": "DIAGNOSTIC / REPO AND CHAT TROUBLESHOOT", "sprintRole": "Diagnose failures from repo state or conversation context and produce a bounded repair plan", "progress": "YES", "useWhen": "Something is broken, failing, or behaving unexpectedly and you need to identify the root cause from repo evidence, CI output, error logs, or chat context before attempting repair.", "inspectFirst": "Repository state, recent commits, CI/test output, error messages, open PRs, relevant validators, and conversation context if the issue was discussed in chat.", "expectedOutput": "A structured diagnosis with: (1) symptoms observed, (2) evidence cited, (3) root cause identified or narrowed, (4) bounded repair plan with owned scope, (5) validation steps to confirm the fix.", "nextStep": "Execute the repair plan using the appropriate sprint prompt (P07 for code changes, P32 for CI repair, etc.).", "proofGate": "Diagnosis references specific file paths, line numbers, error output, or commit SHAs. Repair plan is bounded and names forbidden scope. Validation commands are specified.", "color": "Amber", "copySheet": "P58_COPY_SAFE", "category": "standard", "copyContent": "TROUBLESHOOT FROM CONTEXT NOW. DO NOT GUESS, ASSUME, OR SKIP EVIDENCE.\n\nRepo: resolve the current repository from the environment when no explicit repo is supplied.\nSource of symptoms: describe whether the issue comes from repo state (files, tests, CI), runtime behavior, or conversation context.\n\nSTEP 1: COLLECT EVIDENCE\n- If repo-based: run git status, git log --oneline -5, relevant test/validator commands, check CI output\n- If chat-based: review the conversation for error messages, screenshots, failing commands, and user-reported symptoms\n- Capture exact error text, file paths, line numbers, and command output\n\nSTEP 2: NARROW THE CAUSE\n- Map symptoms to likely causes\n- Identify which files, functions, configs, or workflows are involved\n- Check for recent changes that correlate with the failure\n- Rule out environment issues (missing deps, wrong branch, stale build)\n\nSTEP 3: STRUCTURE THE DIAGNOSIS\nReport:\n- Symptoms: what is observed\n- Evidence: exact errors, file paths, commit SHAs, test names\n- Root cause: most likely explanation with supporting evidence\n- Confidence: high / medium / low (and what would increase it)\n\nSTEP 4: BOUNDED REPAIR PLAN\n- Name the specific files to change\n- Describe the minimal fix\n- State forbidden scope (what NOT to touch)\n- Specify validation commands to run after the fix\n- If the fix requires a different prompt (e.g., P07 for code sprint, P32 for CI repair), cite it\n\nSTEP 5: VALIDATE\n- Run the validators, tests, or checks that confirm the diagnosis\n- If validation passes, commit and report\n- If validation fails, revisit step 2\n\nFINAL REPORT\nRepo, branch, symptoms, evidence, root cause, confidence, repair plan, validation results, commit SHA if applicable, and next command.", "keywords": ["troubleshoot", "diagnose", "debug", "failure", "error", "broken", "failing", "root cause", "investigate", "symptoms", "repair plan"]}, {"id": "P59", "seq": "59", "name": "[PARALLEL] Multi-Agent Sprint Planner", "type": "PLAN", "class": "PLAN / PARALLEL SPRINT ORCHESTRATION", "sprintRole": "Plan a sprint that distributes work across parallel agent lanes with isolated worktrees", "progress": "YES", "useWhen": "You need to execute a large sprint by splitting work into independent parallel tracks that multiple agents can work on simultaneously without collision. Each track gets its own branch, worktree, and commit sequence.", "inspectFirst": "Repository structure, file ownership, dependency graph between changes, existing branches, open PRs, and collision risks between proposed work items.", "expectedOutput": "A parallel sprint plan with: (1) list of independent work lanes, (2) files owned by each lane, (3) branch names for each lane, (4) dependency order (what must merge first), (5) integration strategy, (6) validation per lane and at integration.", "nextStep": "Spawn one agent per lane with the lane-specific bounded sprint prompt (P07). Coordinate integration after all lanes complete.", "proofGate": "Each lane has isolated branch, owned files listed, no cross-lane uncommitted state, integration plan specified, validators pass per lane.", "color": "Indigo", "copySheet": "P59_COPY_SAFE", "category": "standard", "copyContent": "PLAN A PARALLEL MULTI-AGENT SPRINT NOW. EACH LANE MUST BE FULLY ISOLATED.\n\nRepo: resolve the current repository from the environment when no explicit repo is supplied.\nScope: the set of changes that need to happen, described by the user or extracted from context.\n\nSTEP 1: ANALYZE THE WORK\n- List every file that needs to change\n- Group changes by dependency: which changes are independent of each other?\n- Identify collision points: files or modules that multiple changes touch\n- Determine the minimum number of independent lanes\n\nSTEP 2: DEFINE PARALLEL LANES\nFor each lane, specify:\n- Lane name and mission\n- Branch name (format: sprint/<lane-name>)\n- Owned files (exact paths, no ambiguity)\n- Forbidden files (files owned by other lanes)\n- Expected commits and their messages\n- Validation commands for this lane\n\nSTEP 3: ESTABLISH DEPENDENCY ORDER\n- Which lanes can start immediately?\n- Which lanes must wait for others to merge first?\n- What is the integration sequence?\n\nSTEP 4: INTEGRATION STRATEGY\n- How will lanes be merged? (order, conflict resolution)\n- What validation runs after each merge?\n- What is the final integration validation?\n\nSTEP 5: OUTPUT FORMAT\nFor each lane, output a self-contained sprint card:\n  LANE: <name>\n  BRANCH: <branch>\n  MISSION: <one-line goal>\n  OWNED: <file list>\n  FORBIDDEN: <file list>\n  COMMITS: <ordered list>\n  VALIDATE: <commands>\n  DEPENDS ON: <other lanes or NONE>\n\nThen output the integration sequence.\n\nCONSTRAINTS:\n- No two lanes may own the same file\n- Each lane must be independently committable\n- Lanes must not share uncommitted state\n- If a dependency exists, it must be explicit and ordered\n- Use isolated worktrees for each lane when possible\n\nFINAL REPORT\nLane count, branch list, file ownership matrix, dependency graph, integration sequence, validation per lane, and one exact next command to start the first lane.", "keywords": ["parallel", "multi-agent", "sprint plan", "parallel lanes", "isolated worktrees", "distributed work", "concurrent"]}, {"id": "P60", "seq": "60", "name": "[SERIALIZED] Sequential Chat Sprint Planner", "type": "PLAN", "class": "PLAN / SEQUENTIAL CHAT EXECUTION", "sprintRole": "Plan a sprint as a sequence of dependent steps, each executed in a separate chat session", "progress": "YES", "useWhen": "You need to execute a sprint as a strict sequence of dependent steps where each step builds on the previous one. Each step runs in its own chat session with a handoff between steps.", "inspectFirst": "Repository state, current branch, open PRs, existing validators, and the logical dependency chain between changes.", "expectedOutput": "A serialized sprint plan with: (1) ordered step list, (2) input/output for each step, (3) handoff format between steps, (4) validation per step, (5) rollback strategy if any step fails.", "nextStep": "Execute step 1 in the current chat. At completion, hand off the output (commit SHA, branch state, validation results) to the next chat session running step 2.", "proofGate": "Each step has explicit input requirements, output artifacts, validation commands, and handoff content. Steps are strictly ordered with no parallel execution.", "color": "Teal", "copySheet": "P60_COPY_SAFE", "category": "standard", "copyContent": "PLAN A SEQUENTIAL CHAT SPRINT NOW. EACH STEP IS DEPENDENT ON THE PREVIOUS.\n\nRepo: resolve the current repository from the environment when no explicit repo is supplied.\nScope: the set of changes that need to happen, described by the user or extracted from context.\n\nSTEP 1: ANALYZE THE DEPENDENCY CHAIN\n- List every change that needs to happen\n- Order them by dependency: what must exist before the next change can start?\n- Identify which changes are truly dependent vs which could theoretically be parallel\n- For this plan, treat ALL changes as sequential (one at a time)\n\nSTEP 2: DEFINE THE SEQUENCE\nFor each step, specify:\n- Step number and name\n- Chat session purpose (one sentence)\n- Input requirements (what must be true before this step starts)\n- Exact changes to make (files, functions, configs)\n- Output artifacts (commit SHA, changed files, validation results)\n- Validation commands to run before handoff\n- Handoff content: what the next chat session needs to know\n\nSTEP 3: HANDOFF FORMAT\nBetween each step, define the handoff:\n  FROM: step N\n  TO: step N+1\n  BRANCH: current branch state\n  COMMIT: SHA of last commit\n  FILES CHANGED: list\n  VALIDATION: pass/fail\n  CONTEXT: anything the next step needs to know\n\nSTEP 4: ROLLBACK STRATEGY\nIf any step fails:\n- What is the rollback command?\n- Can subsequent steps still proceed?\n- What evidence is needed to diagnose the failure?\n\nSTEP 5: OUTPUT FORMAT\nFor each step, output a step card:\n  STEP <N>: <name>\n  CHAT: <purpose>\n  INPUT: <requirements>\n  DO: <exact changes>\n  VALIDATE: <commands>\n  HANDOFF: <content for next step>\n\nThen output the full sequence as an ordered list.\n\nCONSTRAINTS:\n- Steps are strictly sequential, never parallel\n- Each step must produce a commit before the next step starts\n- Each step must validate before handoff\n- Handoff content must be self-contained (next chat needs no prior context)\n- If a step fails, the sprint stops and rollback is executed\n\nFINAL REPORT\nStep count, sequence list, input/output per step, handoff chain, validation per step, rollback strategy, and one exact next command to start step 1.", "keywords": ["sequential", "serialized", "chat sprint", "handoff", "step by step", "dependent steps", "separate chats"]}];

var COLORS={"slate": "#64748b", "gray": "#6b7280", "sky": "#0ea5e9", "amber": "#f59e0b", "blue": "#3b82f6", "green": "#22c55e", "rose": "#f43f5e", "purple": "#a855f7", "peach": "#fb923c", "teal": "#14b8a6", "lavender": "#8b5cf6", "cyan": "#06b6d4", "indigo": "#6366f1", "blue-green": "#2dd4bf", "gold": "#eab308", "sand": "#d4a574", "orange": "#f97316", "emerald": "#10b981", "coral": "#f87171", "ocean": "#0284c7", "mint": "#34d399", "night": "#1e293b", "violet": "#7c3aed", "cream": "#fef3c7"};
var SECTIONS=[{"name": "Foundation", "glow": "#64748b", "types": ["SETUP", "HARVEST", "CLOSEOUT", "CLOSEOUT + VALIDATE"]}, {"name": "Discover & Plan", "glow": "#f59e0b", "types": ["DISCOVERY + BUILD", "PLAN", "PORTFOLIO PLAN", "TUTORIAL PLAN", "CONSOLIDATE + EXECUTE", "ANALYZE + DIRECTORY", "ANALYZE + FACTOR", "ANALYZE + TEST"]}, {"name": "Build & Repair", "glow": "#22c55e", "types": ["BUILD", "CLEANUP", "REPAIR", "REVIEW + REPAIR", "REVIEW + BUILD", "BUILD + FACTOR", "BUILD + ARTIFACT", "BUILD + BOOTSTRAP", "BUILD + SAFETY"]}, {"name": "Validate & Protect", "glow": "#14b8a6", "types": ["VALIDATE", "VALIDATE + CLOSE", "SAFETY", "RUNTIME PROOF", "IMPROVE"]}, {"name": "Integrate & Ship", "glow": "#6366f1", "types": ["INTEGRATE", "INTEROP", "MAINTENANCE", "MAINTENANCE + BUILD", "ENABLEMENT", "ENABLEMENT + BUILD", "OPERATE", "OPPORTUNITY", "COMPILE ONLY", "INSTALL + ENFORCE", "ENVIRONMENT + CONFIGURE"]}, {"name": "Autonomy & Night Shift", "glow": "#7c3aed", "types": ["AUTONOMY + VALIDATE", "AUTONOMY + BUILD", "AUTONOMY + PLAN", "AUTONOMY + PREFLIGHT", "AUTONOMY + QUEUE", "RECOVER + BUILD", "RECOVER + COMMIT", "HARNESS + BUILD", "HARNESS + EXECUTE", "CURSOR + LIVE CERT"]}];
var DOCTRINE={"agents": {"title": "Agent Operating Contract", "subtitle": "Universal entry point for all coding agents", "sections": [{"heading": "Required Reading Order", "content": "1. `AGENTS.md`\n2. Nearest nested `AGENTS.md` governing the files in scope\n3. `CODEBASE_MAP.md` to load the smallest relevant control-plane or harness surface\n4. `README.md`, `CONTRIBUTING.md`, and repository-specific operating docs\n5. The tool adapter when applicable, such as `CLAUDE.md`\n6. `SKILLS.md`\n7. `CAPABILITIES.md`\n8. `TRIGGERS.md`\n9. The specific skill under `.ai/skills/` selected by the trigger\n10. Current plans, handoffs, tests, validators, open PRs, and recent Git history"}, {"heading": "Instruction Precedence", "content": "1. Platform, security, legal, and repository-owner instructions always win\n2. A child repository's current tracked product and safety law controls work inside that child\n3. A nested `AGENTS.md` may add or strengthen rules for its subtree\n4. A tool adapter such as `CLAUDE.md` may explain tool-specific behavior but may not weaken this contract\n5. A task prompt selects work; it does not silently grant capabilities forbidden by repository policy\n6. When instructions conflict, stop the conflicting action, preserve evidence, and name the conflict"}, {"heading": "Mandatory Operating Discipline", "content": "- **Evidence before action.** Inspect the repository, current Git state, relevant contracts, and existing patterns before inventing.\n- **Floor before furniture.** Repair unsafe repository state and shared contract gaps before dependent features.\n- **Bound the sprint.** State owned scope, forbidden scope, expected artifacts, validation, and proof ceiling.\n- **Isolate writers.** One branch and worktree per active writing lane. Never share uncommitted state between agents.\n- **Reuse before replacing.** Existing healthy tools, directories, helpers, contracts, and artifacts should be used.\n- **Separate skills from code.** Skills describe procedures and judgment. Deterministic behavior belongs in scripts, modules, validators, schemas, registries, and workflows.\n- **Treat prompts as artifacts.** Prompts may orchestrate harness operations; they are not the harness.\n- **Checkpoint before expansion.** Commit coherent progress before broad validation, expensive runtime proof, or scope growth.\n- **Route failures with evidence.** Return exact command output, structured errors, and artifact paths.\n- **Do not inflate proof.** Static checks do not prove runtime behavior; synthetic proof does not prove live-target behavior.\n- **Protect sensitive data.** Never commit secrets, credentials, personal data, private hostnames, raw customer evidence.\n- **Deliver tracked progress.** When safe and authorized, modify tracked files, validate, commit, push, and open or update a PR."}, {"heading": "Required Sprint Declaration", "content": "Every writing sprint must establish:\n- repository and branch\n- lane and mission\n- owned scope\n- forbidden scope\n- dependencies and collision risks\n- expected tracked artifacts\n- validation commands\n- proof ceiling\n- commit and PR expectation"}, {"heading": "Capability and Authority Rule", "content": "A tool may perform an action only when all four are true:\n1. The environment exposes the capability\n2. The capability has been verified in the current environment\n3. The task authorizes the action\n4. Repository policy does not forbid it\n\nCapability presence is not authority."}, {"heading": "Completion Standard", "content": "A task is complete only when the final response and repository state agree about:\n- files changed\n- generated artifacts and their tracked/untracked policy\n- validation actually run\n- skipped checks and exact follow-up commands\n- commit SHA\n- push and PR state\n- remaining blockers and risks\n- proof level and proof ceiling\n- final Git status\n- one exact next command"}]}, "skills": {"title": "Skills Catalog", "subtitle": "Versioned procedural knowledge for agents", "sections": [{"heading": "Skill Contract", "content": "Every canonical skill must define:\n- skill ID, version, and status\n- trigger conditions\n- required inputs\n- bounded procedure\n- expected outputs and artifacts\n- deterministic validation\n- stop and escalation conditions\n- forbidden scope"}, {"heading": "Lifecycle", "content": "- `proposed` - design exists but is not approved for routine use\n- `experimental` - bounded use is allowed with explicit review\n- `canonical` - approved baseline workflow\n- `deprecated` - retained for migration only\n- `retired` - must not be selected"}, {"heading": "Canonical Skills", "content": "| Skill | Purpose |\n|---|---|\n| `repo-intake` | Recover repository truth and select safe work |\n| `bounded-sprint` | Execute one scoped tracked change through commit/PR |\n| `gnhf-prompt-compilation` | Compile one copy-ready bounded gnhf launch command |\n| `evidence-validation` | Build honest proof and repair validation gaps |\n| `pr-integration` | Reconcile stacked or parallel branches safely |\n| `runtime-proof` | Move from static confidence to observed behavior |"}, {"heading": "Authoring Rules", "content": "- Skills must be small enough to select unambiguously\n- Skills may reference scripts and validators but must not paste their logic\n- Inputs and outputs should be machine-readable where practical\n- A skill must state what it cannot prove\n- A skill that can mutate live targets, deploy, merge, or access secrets requires an explicit escalation boundary\n- Changes to canonical skills require a version change and validation"}]}, "capabilities": {"title": "Capability Contract", "subtitle": "What agents can technically do - not what they're allowed to do", "sections": [{"heading": "Capability States", "content": "- `available` - the interface or command exists\n- `verified` - a bounded probe succeeded in the current environment\n- `constrained` - usable only within named limits\n- `blocked` - unavailable, unsafe, unauthorized, or failing\n- `unknown` - not yet probed\n\nAgents must not infer `verified` from command presence, prior sessions, documentation, or another machine."}, {"heading": "Canonical Capability Classes", "content": "| Capability | Typical evidence | Default authority |\n|---|---|---|\n| `repository.read` | files and Git history can be inspected | allowed |\n| `repository.write` | tracked files can be modified | task-scoped |\n| `command.execute` | local deterministic commands run | task-scoped |\n| `network.read` | public or connected sources can be queried | task-scoped |\n| `dependency.install` | package manager or installer works | explicit setup/repair scope |\n| `git.commit` | commits can be created | allowed for bounded sprint |\n| `git.push` | branch can be pushed | explicit task or repo contract |\n| `pr.write` | PRs/comments can be created or updated | allowed when delivery requires it |\n| `merge` | PR can be merged | blocked unless explicitly authorized |\n| `release.deploy` | release or deployment interface exists | blocked unless explicitly authorized |\n| `target.mutate` | external target can change | blocked unless explicitly authorized |\n| `secrets.access` | credentials or secret stores are reachable | blocked by default |\n| `destructive.git` | force-push, reset, branch deletion | blocked unless explicit recovery authorization |"}, {"heading": "Authority Formula", "content": "An action is permitted only when:\n\n`verified capability + explicit task authority + repository policy + safe current state`\n\nIf any term is missing, the action is blocked or escalated."}, {"heading": "Degradation Behavior", "content": "When a capability is missing:\n- reuse a healthy alternative when the contract allows it\n- install or repair only inside explicit setup scope\n- record a precise skip or blocker\n- continue independent safe lanes\n- never claim success from a fallback that provides lower proof"}]}, "triggers": {"title": "Trigger and Routing Contract", "subtitle": "Converts evidence or requests into reviewed skills", "sections": [{"heading": "Trigger Precedence", "content": "1. Explicit owner instruction\n2. Repository safety state\n3. Active PR/review and failing validation\n4. Repository-local routing rules\n5. Canonical fallback mapping\n\nSafety triggers may narrow or stop work even when a feature trigger is present."}, {"heading": "Canonical Trigger Map", "content": "| Trigger | Evidence | Route |\n|---|---|---|\n| `repo.new-or-unknown` | unfamiliar repo, placeholder path, stale handoff | `repo-intake` |\n| `repo.dirty-or-conflicted` | unowned changes, conflict markers, unsafe state | preserve/isolate; then `repo-intake` |\n| `sprint.execute` | scoped request with safe owned files | `bounded-sprint` |\n| `gnhf.prompt-request` | explicit GNHF prompt request | `gnhf-prompt-compilation` |\n| `review.findings` | unresolved PR comments or failures | `evidence-validation` |\n| `validation.requested` | proof gap, skipped checks, contract drift | `evidence-validation` |\n| `integration.requested` | stacked PRs, consumed commits | `pr-integration` |\n| `runtime.requested` | launcher, installer, behavior proof | `runtime-proof` |\n| `docs.contract-change` | AGENTS, skills, capabilities, triggers, schemas | `bounded-sprint` + doc validator |\n| `scope.collision` | two writers own overlapping paths | stop one lane or isolate |\n| `secret-or-personal-data` | credentials, tokens, customer data | stop, sanitize, escalate |\n| `live-target-mutation` | external machine, service, deployment | require explicit authority |"}, {"heading": "Automatic Stop Triggers", "content": "Stop or escalate when:\n- the task would overwrite unowned dirty work\n- a required capability is unknown or blocked\n- a path crosses forbidden scope\n- a deterministic gate exposes a security or data-loss risk\n- the next step requires merge, deployment, secrets, destructive Git, or live mutation without explicit authority\n- repeated repair attempts exceed the workflow limit\n- evidence contradicts the plan"}, {"heading": "No Implicit Authority", "content": "A trigger selects procedure; it does not grant authority. The absence of a trigger does not block work that is already within scope and capability."}]}};

pt()">Add to Library</button>';el.innerHTML=html;document.getElementById('promptDetailOverlay').classList.add('open')}

function render(){var q=document.getElementById('search').value.toLowerCase().trim();var f=PROMPTS;if(activeCat!=='all'&&activeCat!=='doctrine')f=f.filter(function(p){return p.category===activeCat});if(activeSection){var secTypes=[];for(var i=0;i<SECTIONS.length;i++){if(SECTIONS[i].name===activeSection){secTypes=SECTIONS[i].types;break}}f=f.filter(function(p){return secTypes.indexOf(p.type)!==-1})}if(activeType)f=f.filter(function(p){return p.type===activeType});if(activeColor)f=f.filter(function(p){return p.color&&p.color.toLowerCase()===activeColor.toLowerCase()});if(q){var synIds={};var qWords=q.split(/\s+/);Object.keys(SYNONYMS).forEach(function(key){if(q.indexOf(key)!==-1){SYNONYMS[key].split(' ').forEach(function(id){synIds[id.toUpperCase()]=1})}else if(qWords.length<=3&&key.split(' ').length<=3){var allMatch=qWords.every(function(w){var kw=key.split(/\s+/);return kw.some(function(k){return k.indexOf(w)!==-1||w.indexOf(k)!==-1})});if(allMatch)SYNONYMS[key].split(' ').forEach(function(id){synIds[id.toUpperCase()]=1})}});f=f.filter(function(p){if(synIds[p.id])return true;if(p.keywords){for(var ki=0;ki<p.keywords.length;ki++){if(p.keywords[ki].indexOf(q)!==-1)return true}}return p.id.toLowerCase().indexOf(q)!==-1||p.name.toLowerCase().indexOf(q)!==-1||p.type.toLowerCase().indexOf(q)!==-1||p.class.toLowerCase().indexOf(q)!==-1||p.useWhen.toLowerCase().indexOf(q)!==-1||p.sprintRole.toLowerCase().indexOf(q)!==-1||p.proofGate.toLowerCase().indexOf(q)!==-1||p.copyContent.toLowerCase().indexOf(q)!==-1})}var grid=document.getElementById('grid');var dv=document.getElementById('doctrineView');if(activeCat==='doctrine'){grid.style.display='none';dv.classList.add('active');renderDoctrineList()}else{grid.style.display='grid';dv.classList.remove('active')}grid.innerHTML='';var lastSection='';f.forEach(function(p){var sectionName='';for(var i=0;i<SECTIONS.length;i++){if(SECTIONS[i].types.indexOf(p.type)!==-1){sectionName=SECTIONS[i].name;break}}if(sectionName&&sectionName!==lastSection&&!activeSection&&!activeType){lastSection=sectionName;var sec=SECTIONS.find(function(s){return s.name===sectionName});var secGlow=sec?sec.glow:'#64748b';var secCount=f.filter(function(pp){for(var j=0;j<SECTIONS.length;j++){if(SECTIONS[j].name===sectionName){return SECTIONS[j].types.indexOf(pp.type)!==-1}}return false}).length;var icons={'Foundation':'\u2692','Discover & Plan':'\u269B','Build & Repair':'\u2699','Validate & Protect':'\u2714','Integrate & Ship':'\u2708','Autonomy & Night Shift':'\u263E'};var divider=document.createElement('div');divider.className='section-divider';divider.innerHTML='<div class="sd-line" style="background:'+secGlow+'"></div><div class="sd-label" style="color:'+secGlow+'"><span class="sd-icon">'+(icons[sectionName]||'\u25C6')+'</span>'+sectionName+'<span class="sd-count">'+secCount+' prompts</span></div><div class="sd-line" style="background:'+secGlow+'"></div>';grid.appendChild(divider)}var hex=COLORS[p.color.toLowerCase()]||'#64748b';var isGnhf=p.category==='gnhf';var card=document.createElement('div');card.className='prompt-card'+(isGnhf?' gnhf':'');card.innerHTML='<div class="glow-bar" style="background:'+hex+'"></div><div class="prompt-header"><span class="prompt-id">'+p.id+'</span>'+(isGnhf?'<span class="gnhf-badge">&#9790; GNHF</span>':'')+'<span class="prompt-name">'+p.name+'</span></div><div class="prompt-type">'+p.type+' \u00b7 '+p.color+'</div><div class="prompt-desc">'+p.useWhen+'</div><div class="prompt-meta"><span class="prompt-badge">'+p.sprintRole+'</span><span class="prompt-badge">'+p.proofGate+'</span></div>';card.onclick=function(){showPromptDetail(p.id)};var btn=document.createElement('button');btn.className='prompt-copy-btn';btn.textContent='Copy';btn.onclick=function(e){e.stopPropagation();copyPrompt(p.id);btn.classList.add('copied');btn.textContent='Copied!';setTimeout(function(){btn.classList.remove('copied');btn.textContent='Copy'},1500)};card.appendChild(btn);grid.appendChild(card)});document.getElementById('showing').textContent=f.length;document.getElementById('total').textContent=PROMPTS.length}
function renderDoctrineList(){var el=document.getElementById('doctrineList');document.getElementById('doctrineDetail').classList.remove('active');el.style.display='grid';el.innerHTML='';Object.keys(DOCTRINE).forEach(function(key){var d=DOCTRINE[key];var card=document.createElement('div');card.className='doctrine-card';card.onclick=function(){document.getElementById('doctrineDetail').classList.add('active');el.style.display='none';var html='<h2 style="color:var(--accent);margin-bottom:0.25rem">'+d.title+'</h2><div style="color:var(--text-muted);margin-bottom:1.5rem">'+d.subtitle+'</div>';d.sections.forEach(function(s){html+='<div class="doctrine-section"><h4>'+s.heading+'</h4>';var lines=s.content.split('\n');var inTable=false;var tbl='';lines.forEach(function(line){if(line.match(/^\|.*\|$/)){if(!inTable){inTable=true;tbl='<table>'}if(line.match(/^\|[-\s|]+$/)){return}var cells=line.split('|').filter(function(c){return c.trim()!==''});var tag=tbl.indexOf('<th>')===-1?'th':'td';tbl+='<tr>'+cells.map(function(c){return '<'+tag+'>'+c.trim()+'</'+tag+'>'}).join('')+'</tr>'}else{if(inTable){tbl+='</table>';html+=tbl;inTable=false;tbl=''}html+='<p>'+line+'</p>'}});if(inTable){tbl+='</table>';html+=tbl}html+='<div style="margin-top:8px"><button class="pd-copy" onclick="copyToClipboard(this.closest(\'.doctrine-section\').querySelector(\'pre\').textContent);this.classList.add(\'copied\');this.textContent=\'Copied!\';setTimeout(function(){this.classList.remove(\'copied\');this.textContent=\'Copy Section\'}.bind(this),1500)">Copy Section</button></div>';html+='</div>'});document.getElementById('doctrineContent').innerHTML=html};card.innerHTML='<h3>'+d.title+'</h3><div class="subtitle">'+d.subtitle+'</div><div class="count">'+d.sections.length+' sections \u2192</div>';el.appendChild(card)})}
