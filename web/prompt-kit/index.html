<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Harness Prompt Kit v39</title>
<style>

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#0a0e17;--bg-secondary:#111827;--bg-card:#1a1f2e;--bg-card-hover:#232a3b;
  --bg-surface:#141a28;--border:#2a3148;--border-focus:#3b82f6;
  --text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;
  --accent:#3b82f6;--accent-hover:#2563eb;--accent-glow:rgba(59,130,246,0.15);
  --success:#22c55e;--warning:#f59e0b;--danger:#ef4444;
  --radius:8px;--radius-lg:12px;--shadow:0 4px 24px rgba(0,0,0,0.3)
}
html{scroll-behavior:smooth}
body{font-family:'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);border-bottom:1px solid var(--border);padding:16px 24px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-top{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding-bottom:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;box-shadow:0 0 14px rgba(59,130,246,0.3)}
.logo h1{font-size:16px;font-weight:700;letter-spacing:-0.02em}
.logo span{font-size:11px;color:var(--text-muted);font-weight:400}
.search-container{position:relative;flex:1;max-width:400px}
.search-container input{width:100%;padding:9px 14px 9px 36px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:13px;transition:all 0.2s}
.search-container input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-container input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text-muted);background:var(--bg-card);padding:2px 5px;border-radius:3px;font-family:monospace;border:1px solid var(--border)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-muted);cursor:pointer;display:none;z-index:2;width:20px;height:20px;text-align:center;line-height:20px;border-radius:50%;transition:all 0.2s}
.search-clear:hover{color:var(--text-primary);background:var(--bg-card)}
.header-controls{display:flex;gap:12px;align-items:center}
.cat-tabs{display:flex;gap:3px;background:var(--bg-surface);padding:3px;border-radius:var(--radius)}
.cat-tab{padding:6px 14px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;color:var(--text-secondary);border:none;background:none;white-space:nowrap}
.cat-tab:hover{color:var(--text-primary);background:var(--bg-card)}
.cat-tab.active{background:var(--accent);color:#fff;box-shadow:0 0 10px rgba(59,130,246,0.3)}
.cat-tab .kbd{font-size:8px;color:rgba(255,255,255,0.35);margin-left:3px;font-family:monospace}
.stats{display:flex;gap:12px;align-items:center}
.stat{text-align:center}
.stat-num{font-size:18px;font-weight:700;color:var(--accent)}
.stat-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em}
.sections-nav{max-width:1400px;margin:0 auto;display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sections-nav::-webkit-scrollbar{display:none}
.section-tab{position:relative;padding:10px 16px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-muted);border:none;background:none;white-space:nowrap;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.04em}
.section-tab:hover{color:var(--text-secondary)}
.section-tab.active{color:var(--text-primary)}
.section-tab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:1px 1px 0 0;transition:all 0.2s;opacity:0.3}
.section-tab.active::after{opacity:1}
.type-nav{max-width:1400px;margin:0 auto;padding:8px 0;display:flex;gap:4px;flex-wrap:wrap}
.type-chip{padding:3px 8px;font-size:10px;font-weight:500;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:all 0.2s;background:var(--bg-card);color:var(--text-secondary)}
.type-chip:hover{border-color:var(--border);color:var(--text-primary)}
.type-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.type-chip .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.grid{max-width:1400px;margin:20px auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;padding:0 24px}
.prompt-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:all 0.3s;position:relative;overflow:hidden}
.prompt-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 20px rgba(59,130,246,0.15)}
.prompt-card:hover .glow-bar{height:4px;opacity:1;animation:glow-pulse-active 1s ease-in-out infinite}
@keyframes glow-pulse-active{0%,100%{opacity:0.7;filter:brightness(1)}50%{opacity:1;filter:brightness(1.5)}}
.prompt-card .glow-bar{position:absolute;top:0;left:0;right:0;height:3px;opacity:0.8;animation:glow-pulse 2s ease-in-out infinite;box-shadow:0 0 8px currentColor,0 0 16px currentColor}
@keyframes glow-pulse{0%,100%{opacity:0.5;filter:brightness(0.8)}50%{opacity:1;filter:brightness(1.3)}}
.prompt-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.prompt-id{font-size:11px;font-weight:700;font-family:monospace;padding:2px 6px;border-radius:4px;background:var(--bg-surface);color:var(--text-muted)}
.prompt-name{font-size:13px;font-weight:600;color:var(--text-primary);flex:1;margin-left:8px}
.prompt-type{font-size:10px;color:var(--text-muted);margin-bottom:6px}
.prompt-desc{font-size:11px;color:var(--text-secondary);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.prompt-meta{display:flex;gap:8px;flex-wrap:wrap}
.prompt-badge{font-size:9px;padding:2px 6px;border-radius:3px;background:var(--bg-surface);color:var(--text-muted);border:1px solid var(--border)}
.prompt-copy-btn{position:absolute;top:12px;right:12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:10px;color:var(--text-muted);cursor:pointer;transition:all 0.2s;opacity:0}
.prompt-card:hover .prompt-copy-btn{opacity:1}
.prompt-copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.prompt-copy-btn.copied{border-color:var(--success);color:var(--success)}
.prompt-card.gnhf{background:linear-gradient(145deg,#1c1710 0%,#211c13 40%,#1a1510 100%);border-color:rgba(245,158,11,0.3);box-shadow:inset 0 0 30px rgba(245,158,11,0.03)}
.prompt-card.gnhf:hover{border-color:#f59e0b;box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 24px rgba(245,158,11,0.2),inset 0 0 30px rgba(245,158,11,0.05)}
.prompt-card.gnhf .glow-bar{background:linear-gradient(90deg,#f59e0b,#fbbf24,#f59e0b) !important;box-shadow:0 0 8px rgba(245,158,11,0.6),0 0 16px rgba(245,158,11,0.3) !important}
.prompt-card.gnhf .prompt-id{background:rgba(245,158,11,0.15);color:#fbbf24;border-color:rgba(245,158,11,0.35)}
.prompt-card.gnhf .prompt-name{color:#fef3c7}
.prompt-card.gnhf .prompt-type{color:rgba(251,191,36,0.6)}
.prompt-card.gnhf .prompt-badge{border-color:rgba(245,158,11,0.2);color:rgba(251,191,36,0.7)}
.prompt-card.gnhf .gnhf-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3);margin-left:6px;font-weight:600}
.prompt-card:not(.gnhf) .gnhf-badge{display:none}
.gnhf-badge{display:none}
.ref-toggle{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;border:none;border-radius:50%;width:48px;height:48px;font-size:20px;cursor:pointer;box-shadow:0 4px 20px rgba(59,130,246,0.4);z-index:200;transition:transform 0.2s}
.ref-toggle:hover{transform:scale(1.1)}
.ref-sidebar{position:fixed;top:0;right:-400px;width:380px;height:100vh;background:var(--bg-secondary);border-left:1px solid var(--border);z-index:150;transition:right 0.3s;overflow-y:auto;padding:20px}
.ref-sidebar.open{right:0}
.ref-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:140;display:none}
.ref-overlay.open{display:block}
.ref-section{margin-bottom:16px}
.ref-section h3{font-size:12px;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em}
.ref-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;margin-bottom:6px;font-size:11px;color:var(--text-secondary);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.ref-item:hover{border-color:var(--accent);color:var(--text-primary);background:var(--bg-card-hover);transform:translateX(2px)}
.ref-item .label{font-weight:600;color:var(--text-primary);font-family:monospace;font-size:10px;background:var(--bg-surface);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}
.ref-item[data-prompt]::after{content:'\2192';margin-left:auto;color:var(--text-muted);font-size:12px;opacity:0;transition:opacity 0.2s}
.ref-item[data-prompt]:hover::after{opacity:1;color:var(--accent)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--accent);border-radius:var(--radius);padding:8px 16px;font-size:12px;color:var(--text-primary);z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.doctrine-view{display:none;max-width:960px;margin:0 auto;padding:2rem}
.doctrine-view.active{display:block}
.doctrine-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem;transition:border-color 0.3s;cursor:pointer}
.doctrine-card:hover{border-color:var(--accent)}
.doctrine-card h3{font-size:1.1rem;color:var(--accent);margin:0 0 0.5rem}
.doctrine-card .subtitle{color:var(--text-muted);font-size:0.85rem;margin-bottom:0.5rem}
.doctrine-card .count{color:var(--text-muted);font-size:0.8rem}
.doctrine-detail{display:none}
.doctrine-detail.active{display:block}
.doctrine-back{background:none;border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.8rem;color:var(--text-muted);cursor:pointer;font-size:0.8rem;margin-bottom:1rem}
.doctrine-back:hover{border-color:var(--accent);color:var(--accent)}
.doctrine-section{margin-bottom:1.25rem}
.doctrine-section h4{font-size:0.9rem;color:var(--text-primary);margin:0 0 0.5rem;padding-bottom:0.3rem;border-bottom:1px solid var(--border)}
.doctrine-section pre{background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:0.75rem;font-size:0.8rem;line-height:1.5;white-space:pre-wrap;overflow-x:auto;color:var(--text-primary)}
.doctrine-section ul,.doctrine-section ol{margin:0.25rem 0;padding-left:1.5rem;font-size:0.85rem;color:var(--text-primary)}
.doctrine-section li{margin-bottom:0.25rem}
.doctrine-section table{width:100%;border-collapse:collapse;font-size:0.8rem}
.doctrine-section th,.doctrine-section td{text-align:left;padding:0.4rem 0.6rem;border:1px solid var(--border)}
.doctrine-section th{background:var(--bg-surface);color:var(--text-primary);font-weight:600}
.doctrine-section td{color:var(--text-primary)}
.doctrine-list{display:grid;gap:0.75rem}
.prompt-detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:250;display:none;align-items:center;justify-content:center;padding:20px}
.prompt-detail-overlay.open{display:flex}
.prompt-detail{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;max-width:720px;width:100%;max-height:85vh;overflow-y:auto;padding:24px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.prompt-detail-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all 0.2s}
.prompt-detail-close:hover{background:var(--bg-card);color:var(--text-primary)}
.prompt-detail .pd-glow{height:4px;border-radius:2px;margin-bottom:16px;animation:glow-pulse 2s ease-in-out infinite}
.prompt-detail .pd-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.prompt-detail .pd-id{font-size:14px;font-weight:700;font-family:monospace;padding:4px 10px;border-radius:6px;background:var(--bg-surface);color:var(--text-muted);border:1px solid var(--border)}
.prompt-detail .pd-name{font-size:18px;font-weight:700;color:var(--text-primary)}
.prompt-detail .pd-type{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.prompt-detail .pd-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.prompt-detail .pd-badge{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--bg-surface);color:var(--text-secondary);border:1px solid var(--border)}
.prompt-detail .pd-section{margin-bottom:16px}
.prompt-detail .pd-section h4{font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.prompt-detail .pd-section pre{background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;line-height:1.6;white-space:pre-wrap;overflow-x:auto;color:var(--text-primary);font-family:'SF Mono','Fira Code',monospace}
.prompt-detail .pd-copy{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:8px}
.prompt-detail .pd-copy:hover{background:var(--accent-hover);transform:translateY(-1px)}
.prompt-detail .pd-copy.copied{background:var(--success)}
.section-divider{grid-column:1/-1;padding:20px 0 8px;display:flex;align-items:center;gap:12px}
.section-divider .sd-line{flex:1;height:1px;background:var(--border)}
.section-divider .sd-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;display:flex;align-items:center;gap:8px}
.section-divider .sd-icon{font-size:16px}
.section-divider .sd-count{font-size:10px;color:var(--text-muted);font-weight:400}
.cat-tab .tab-icon{margin-right:4px;font-size:12px}
.cat-tab[data-cat="all"]{border:1px solid rgba(226,232,240,0.2)}
.cat-tab[data-cat="all"].active{background:linear-gradient(135deg,#64748b,#94a3b8);box-shadow:0 0 12px rgba(100,116,139,0.4)}
.cat-tab[data-cat="standard"]{border:1px solid rgba(14,165,233,0.15)}
.cat-tab[data-cat="standard"].active{background:linear-gradient(135deg,#0ea5e9,#38bdf8);box-shadow:0 0 12px rgba(14,165,233,0.4)}
.cat-tab[data-cat="doctrine"]{border:1px solid rgba(139,92,246,0.15)}
.cat-tab[data-cat="doctrine"].active{background:linear-gradient(135deg,#8b5cf6,#a78bfa);box-shadow:0 0 12px rgba(139,92,246,0.4)}
.ref-toggle .ref-icon{font-size:18px}
.version-badge{position:fixed;bottom:24px;left:24px;font-size:10px;color:var(--text-muted);background:var(--bg-card);padding:4px 8px;border-radius:4px;border:1px solid var(--border);z-index:200;font-family:monospace}
.add-prompt-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:4px}
.add-prompt-btn:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,0.3)}

</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">AK</div>
      <div><h1>AI Harness Prompt Kit <span>v39</span></h1><div style="font-size:10px;color:var(--text-muted)">Agent Control Panel</div></div>
    </div>
    <div class="search-container">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search" placeholder="Search prompts, types, keywords..." autocomplete="off">
      <span class="search-clear" id="searchClear">&times;</span>
      <span class="search-kbd">/</span>
    </div>
    <div class="header-controls">
      <div class="cat-tabs">
        <button class="cat-tab active" data-cat="all"><span class="tab-icon">&#128203;</span>All<span class="kbd">1</span></button>
        <button class="cat-tab" data-cat="standard"><span class="tab-icon">&#128196;</span>Standard<span class="kbd">2</span></button>
        <button class="cat-tab" data-cat="gnhf"><span class="tab-icon">&#9733;</span>GNHF<span class="kbd">3</span></button>
        <button class="cat-tab" data-cat="doctrine"><span class="tab-icon">&#128220;</span>Doctrine<span class="kbd">4</span></button>
      </div>
      <button class="add-prompt-btn" id="addPromptBtn">+ Add Prompt</button>
      <div class="stats">
        <div class="stat"><div class="stat-num" id="showing">0</div><div class="stat-label">Showing</div></div>
        <div class="stat"><div class="stat-num" id="total">0</div><div class="stat-label">Total</div></div>
      </div>
    </div>
  </div>
  <div class="sections-nav" id="sectionsNav"></div>
  <div class="type-nav" id="typeNav"></div>
</div>
<div class="grid" id="grid"></div>
<div class="doctrine-view" id="doctrineView">
  <div class="doctrine-detail" id="doctrineDetail">
    <button class="doctrine-back" id="doctrineBack">&larr; Back to Overview</button>
    <div id="doctrineContent"></div>
  </div>
  <div class="doctrine-list" id="doctrineList"></div>
</div>
<div class="ref-overlay" id="refOverlay"></div>
<div class="ref-sidebar" id="refSidebar">
  <h2 style="font-size:14px;margin-bottom:16px;color:var(--accent)">&#128218; Reference Panel</h2>
  <div id="refContent"></div>
  <button id="refClose" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer">&times;</button>
</div>
<button class="ref-toggle" id="refBtn" title="Reference Panel (R)"><span class="ref-icon">&#9776;</span></button>
<div class="toast" id="toast"></div>
<div class="prompt-detail-overlay" id="promptDetailOverlay">
  <div class="prompt-detail" id="promptDetail"></div>
</div>
<div class="version-badge" id="versionBadge">v39</div>
<script>
var PROMPTS=[{"id": "P00", "seq": "00", "name": "Governance Doctrine Installer", "type": "SETUP", "class": "SETUP / GOVERNANCE", "sprintRole": "Install the agent governance contract that defines how all agents must behave in this repository", "progress": "YES", "useWhen": "The repository has no agent governance contract, or the existing one is stale, incomplete, or not enforced. This is the first prompt to run on any repo that lacks agent rules.", "inspectFirst": "AGENTS.md, CLAUDE.md, HARNESS.md, .cursorrules, any existing agent instruction files, repo README for agent references, and branch/PR conventions.", "expectedOutput": "A tracked governance contract (AGENTS.md or equivalent) that defines: agent operating principles, instruction precedence, mandatory discipline, sprint declaration requirements, completion standard, and forbidden behaviors. Plus a validator or test that proves the contract is present.", "nextStep": "After governance is installed, run P01 to build the operational harness that the governance contract governs.", "proofGate": "Governance file exists and is tracked, validator passes, commit SHA exists, push or PR evidence reported.", "color": "Slate", "copySheet": "P00_COPY_SAFE", "category": "standard", "copyContent": "INSTALL GOVERNANCE DOCTRINE NOW. DO NOT MERELY ACKNOWLEDGE, SUMMARIZE, OR REPEAT THESE RULES.\n\nRepo: resolve the current repository from the environment.\nBranch: preserve existing work; use the current safe branch or create an isolated feature branch.\nSprint: Governance Doctrine Installation.\nLane: repository governance.\nOwned scope: the governance contract file, a validator that proves it exists, and the commit/PR that installs it.\nForbidden scope: harness infrastructure, product changes, destructive cleanup, force-push, secrets, generated junk.\nExpected artifacts: tracked governance file, enforcement validator, commit SHA, push or PR evidence.\n\nWHAT GOVERNANCE MUST DEFINE\nThe governance contract is the single source of truth for how agents operate in this repo. It must define:\n\n1. AGENT OPERATING PRINCIPLES\n   - Evidence before action\n   - Floor before furniture\n   - Bounded sprints with declared scope\n   - One writer per branch\n   - Reuse before replacing\n   - No completion without proof\n\n2. INSTRUCTION PRECEDENCE\n   When instructions conflict, the order is:\n   a. Platform, security, legal, repo-owner instructions\n   b. This governance contract\n   c. Task-specific prompts\n   d. Generic defaults\n\n3. MANDATORY SPRINT DECLARATION\n   Every writing sprint must state:\n   - repo and branch\n   - lane and mission\n   - owned scope and forbidden scope\n   - expected artifacts and validation commands\n   - proof ceiling\n\n4. COMPLETION STANDARD\n   A task is complete only when:\n   - files changed are named\n   - validation was actually run (not assumed)\n   - commit SHA exists\n   - push or PR state is reported\n   - one next command is given\n\n5. FORBIDDEN BEHAVIORS\n   - Acknowledgment without mutation\n   - Plans without execution\n   - Summaries without proof\n   - Completion claims without running checks\n   - Secret or credential exposure\n\nINSTALLATION PROCEDURE\n1. Inspect: look for existing AGENTS.md, CLAUDE.md, HARNESS.md, .cursorrules\n2. If a canonical governance file exists, repair it; do not create a competing one\n3. Write the governance contract as a tracked file in the repo root\n4. Add a validator (test script, manifest check, or CI rule) that fails if the governance file is missing or malformed\n5. Commit with message: docs(governance): install agent governance doctrine\n6. Push and open or update a PR\n\nVALIDATE\n- Governance file exists and is tracked by git\n- Validator passes (test or script confirms file is present and well-formed)\n- git diff --check passes\n- Commit SHA recorded\n- Push or PR evidence recorded\n\nFINAL REPORT\nRepo, branch, governance file path, validator result, commit SHA, push or PR state, and one exact next command.", "keywords": ["governance", "doctrine", "install doctrine", "agent rules", "operating principles", "repo rules", "constitution", "baseline rules", "operating law"]}, {"id": "P01", "seq": "01", "name": "Harness Infrastructure Builder", "type": "SETUP", "class": "SETUP / INFRASTRUCTURE", "sprintRole": "Build the operational harness components that agents use to navigate, validate, and produce work in this repository", "progress": "YES", "useWhen": "The governance contract (P00) exists but the repo lacks operational harness infrastructure: codebase maps, workflow specs, validators, artifact registries, hooks, skills, or operator reports.", "inspectFirst": "Existing AGENTS.md/governance contract, repo structure, test runners, validators, scripts, manifests, docs, generated-output policy, branch/PR conventions, and any partial harness artifacts.", "expectedOutput": "Implemented and validated harness components committed to the repository: codebase map, workflow specs, artifact registry, validators, hooks (where useful), scoped skills, and operator reports.", "nextStep": "After harness is built, run P11 (Validator) to prove the harness works end-to-end, or P12 (Closeout) to compress the handoff.", "proofGate": "Each harness component is a tracked file, validators pass, commit exists, push or PR state reported.", "color": "Slate", "copySheet": "P01_COPY_SAFE", "category": "standard", "copyContent": "BUILD THE REPO HARNESS NOW. DO NOT STOP AT A PLAN OR DESCRIPTION.\n\nRepo: resolve the current repository from the environment.\nBranch: preserve existing work; use the current safe branch or create an isolated feature branch.\nSprint: Harness Infrastructure Build.\nLane: harness infrastructure.\nOwned scope: harness component files (maps, workflows, validators, registries, hooks, skills, reports).\nForbidden scope: governance contract (that is P00 scope), product code changes, secrets, destructive cleanup.\nExpected artifacts: tracked harness component files, passing validators, commit SHA, push or PR evidence.\n\nWHAT THE HARNESS MUST INCLUDE\nA fresh agent entering this repo must be able to: inspect the harness, choose the right workflow, run validators, avoid known traps, produce artifacts, and hand off cleanly. Build these components:\n\n1. CODEBASE MAP\n   - Repository structure overview\n   - Key directories and their purposes\n   - Entry points and configuration files\n   - Build/test/deploy commands\n\n2. WORKFLOW SPECS\n   - How to pick up a task\n   - How to validate before committing\n   - How to handle failures\n   - How to hand off to the next agent or chat\n\n3. ARTIFACT REGISTRY\n   - What artifacts this repo produces\n   - Where they live\n   - How to generate them\n   - Naming conventions\n\n4. VALIDATORS\n   - Tests that prove correctness\n   - Lint/format checks\n   - Build verification\n   - Contract validators (schema, manifest, etc.)\n\n5. HOOKS (where useful)\n   - Pre-commit checks\n   - Pre-push validation\n   - File watchers or generators\n\n6. SCOPED SKILLS\n   - Repeatable procedures documented as skills\n   - Trigger conditions\n   - Required inputs and expected outputs\n\n7. OPERATOR REPORTS\n   - English-language summaries of repo state\n   - What is working, what is broken, what is missing\n   - Readable by humans, not just agents\n\nBUILD PROCEDURE\n1. Inspect: read governance contract (AGENTS.md), repo structure, existing tests/scripts/docs\n2. Identify which harness components are missing or incomplete\n3. Build each component as a tracked file in the appropriate location\n4. Run existing validators to ensure new components do not break anything\n5. Add a harness completeness check (test or script that verifies all components exist)\n6. Commit with message: feat(harness): build operational harness infrastructure\n7. Push and open or update a PR\n\nVALIDATE\n- Each harness component file exists and is tracked\n- Existing tests still pass\n- Harness completeness check passes\n- git diff --check passes\n- Commit SHA recorded\n- Push or PR evidence recorded\n\nFINAL REPORT\nRepo, branch, harness components built (list each), validator results, commit SHA, push or PR state, and one exact next command.", "keywords": ["harness builder", "build harness", "repo harness", "codebase map", "workflow", "validator", "artifact registry", "skills", "hooks", "operator reports", "infrastructure"]}, {"id": "P02", "seq": "02", "name": "Conversation Closeout + Executable Harness-Build Sprint Mapper", "type": "HARVEST", "class": "CLOSEOUT / CONVERSATION", "sprintRole": "Convert chat into implementation launch order and assign harness/application builders", "progress": "Support", "useWhen": "A chat contains decisions, unfinished work, or harness gaps that must become self-contained implementation sprints.", "inspectFirst": "Current conversation and known repo context.", "expectedOutput": "Launch order, executable build panels with named harness/application owners, and a supporting sprint map.", "nextStep": "Launch the first implementation panel; do not stop at the map.", "proofGate": "Every identified harness gap has an executable build owner or cited evidence that no build is needed.", "color": "Gray", "copySheet": "P02_COPY_SAFE", "category": "standard", "copyContent": "We covered a lot and only progressed partway. Convert this chat into a sprint map and executable launch pack.\nPreserve only context that prevents rework. Do not summarize every topic equally.\nSOURCE OF TRUTH\nUse the best available chat context and, when repo access exists, verify current repo, branch, PR, worktree, test, validator, artifact, and CI state.\nPrefer repository evidence over remembered chat context. Mark stale or uncertain claims explicitly.\nOUTPUT ORDER — LAUNCH ORDER FIRST\nAnalyze the material before writing, but the first substantive section must be LAUNCH ORDER.\n1. LAUNCH ORDER\nPut the launch order at the very top immediately after the title.\nName the first chat, every dependency gate, each parallel group, and the final convergence chat.\nNumber and title the prompts exactly as they will appear below.\nThe prompt panels must be displayed in the exact same order as this launch order.\nDo not describe one launch order and present the panels in another order.\nDo not include an alternate display order, category order, or convenience order.\nKeep prompts in the same parallel group contiguous under that group.\nState: one prompt panel goes into one new chat.\n2. COMPACT COORDINATION PREAMBLE\nPlace one short readable preamble after the launch order and before the panels.\nInclude:\n- mission\n- repo and primary local path if known\n- current branch, PR, and verified floor if known\n- wave order and hard dependencies\n- safe parallel lanes\n- principal collision risks\n- proof ceiling and critical safety boundary\nThe preamble is for orientation only.\nDo not output a shared chat preamble that must be copied separately.\nEvery prompt panel must contain all context required to run that chat by itself.\n3. NEXT CHAT PANELS\nImmediately after the preamble, emit every next-chat prompt in its own separate writing block or copyable panel.\nEach panel must have its own copy control.\nDisplay panels in the exact order already stated in LAUNCH ORDER.\nDo not put all prompts in one code fence.\nDo not put two prompts in one panel.\nDo not place commentary, analysis, or summaries between panels.\nDo not require the operator to combine text from multiple sections.\nEach panel must be self-contained and executable.\nEvery panel must include:\n- banner and sprint name\n- repo, local path if known, branch, PR, wave, and lane\n- dependencies and safe parallel work\n- owned scope and forbidden scope\n- expected artifacts and mission\n- read-first files and compact preflight\n- numbered tasks\n- sprint-specific safety\n- validation order\n- commit, push, and PR contract when repo mutation is intended\n- proof level, evidence, and proof ceiling\n- exact final response contract\n- exact next command\n- an explicit instruction to BUILD, REPAIR, VALIDATE, or RESEARCH the owned surface\n- when repo mutation is intended: inspect, implement, validate, commit, push, and open or update the PR\n- never leave required harness construction as an unassigned description\nUse a short title immediately above each panel.\n4. HARNESS AND APPLICATION FACTORING PASS\nBefore assigning sprint ownership, classify every lingering requirement into one primary surface:\n- harness spine: run context, artifact registry, schemas, validators, fixtures, workflows, proof gates\n- agent harness: skills, capabilities, triggers, routing, instruction surfaces, manifests, MCP/tools, hooks, context injection\n- conventional application logic: domain models, services, state machines, adapters, persistence, UI, launchers, deployment orchestration\n- integration seam: interfaces between harness, agent routing, and application logic\n- docs/reporting\n- validation\n- runtime proof\n- research/design\nFor every skill, capability, or trigger, decide: keep, create, split, merge, retire, or rewire.\nRecord for each:\n- owner\n- deterministic activation condition\n- inputs and outputs\n- preconditions and forbidden conditions\n- guardrails\n- tests and proof level\n- files or manifests likely to change\nUse these boundaries:\n- skills describe reusable workflow guidance\n- capabilities expose reusable operations\n- triggers deterministically route conditions to a skill, capability, or workflow\n- application logic remains in code and domain contracts, not hidden in prompts\n- prompts may orchestrate work but must not become the only implementation of product behavior\nCreate separate factoring sprints when agent harness work and application logic would otherwise collide.\n5. HARNESS BUILD OWNERSHIP\nDo not stop at describing, classifying, or mapping the harness.\nWhen the factoring pass finds missing, partial, stale, or unvalidated harness spine or agent-harness work, the launch order MUST include one or more executable build sprints that direct AI agents to implement it in the repository.\nEvery required harness surface must have an owner panel or explicit repository evidence that the current implementation is sufficient.\nA harness-build panel must instruct the assigned agent to:\n- inspect existing repo rules, harness files, validators, workflows, manifests, hooks, and generated-output policy before inventing\n- create or repair the owned harness files, schemas, fixtures, skills, capabilities, triggers, workflows, hooks, and integration seams\n- keep application behavior in code and domain contracts rather than prompts\n- run the exact harness and repository validators\n- commit coherent changes\n- push normally and open or update the intended PR when the environment allows\n- report exact artifacts, validation evidence, commit SHA, PR state, proof level, proof ceiling, and next command\nSeparate harness-spine, agent-harness, and application-logic build sprints when they would collide in the same files or ownership lane.\nResearch-only panels may precede implementation only when a real unknown blocks safe construction; they must name the exact downstream build panel they unblock.\nIf no harness build is required, state the inspected files and evidence proving the existing harness already satisfies the requirement.\nThe output is incomplete when it identifies a harness gap but assigns no AI agent to build or repair it.\n6. SUPPORTING SPRINT MAP\nPlace this section after all copyable panels.\nInclude:\nMISSION\n- what we are trying to accomplish\n- why it matters\n- what success looks like\nTOPICS COVERED\nFor each topic include status, useful context, and likely repo impact.\nUse statuses: decided, partial, unresolved, rejected, or future idea.\nDECISIONS MADE\n- product decisions\n- technical decisions\n- naming, contracts, and patterns\n- things explicitly rejected\nCURRENT STATE\n- repo or project\n- branch, PR, or sprint\n- recent changes\n- stale or uncertain context\nFACTORING MAP\n- harness spine\n- skills\n- capabilities\n- triggers and routing\n- conventional application logic\n- integration seams\n- shared contracts and collision ownership\nLINGERING WORK\nClassify remaining work into feature, harness, agent-harness factoring, application-logic factoring, cleanup, validation, docs/reporting, runtime proof, research/design, and parallel-safe sprints.\nTARGETS TO INSPECT FIRST\nName exact files, directories, scripts, docs, logs, commands, manifests, skills, capabilities, triggers, schemas, workflows, or artifacts.\nRISKS AND GAPS\nName unknowns, fragile assumptions, blockers, collision risks, proof gaps, and forbidden scope.\n7. QUALITY RULES\nMake panels bold, direct, compact, and execution-oriented.\nAvoid permission theater, duplicate ownership, trivial-only progress, and giant monolithic prompts.\nDo not claim a higher proof level from a lower one.\nDo not invent repo facts when evidence is unavailable.\nDo not repeat a second launch order after the panels.", "keywords": ["conversation closeout", "harvest chat", "session end", "decisions", "gaps", "unfinished work", "launch panels", "sprint map"]}, {"id": "P03", "seq": "03", "name": "Repository Evidence + First Sprint Executor", "type": "DISCOVERY + BUILD", "class": "REPO / EVIDENCE + ACTION", "sprintRole": "Analyze the repo and execute the first safe sprint", "progress": "YES", "useWhen": "Entering an unfamiliar, stale, or context-heavy repo.", "inspectFirst": "Git floor, rules, architecture, manifests, PRs, plans, tests, validators, artifacts.", "expectedOutput": "Cited evidence pack, ranked queue, and first bounded repo mutation.", "nextStep": "Use P11 or P12.", "proofGate": "Path-grounded evidence plus actual repo movement.", "color": "Sky", "copySheet": "P03_COPY_SAFE", "category": "standard", "copyContent": "ANALYZE THE REPOSITORY, BUILD THE EVIDENCE PACK, THEN EXECUTE THE FIRST SAFE SPRINT. DO NOT STOP AT A PLAN.\nRepo: xyz_repo_or_path\nBranch / PR if known: xyz_branch\nContext or plan path if available: xyz_plan_directory\nMISSION\nRecover operational truth from the repository itself, derive a ranked sprint queue from evidence, and immediately execute the highest-value bounded sprint that is safe in the current environment.\nTreat the current repository as the source of truth over remembered chat context.\nCollect all actionable evidence, not every byte or generated dependency.\nDO NOT ANSWER WITH\n- a repo summary only\n- a plan only\n- a prompt pack only\n- generic best practices without file-path evidence\n- a request for permission when a safe bounded sprint is available\n- confidence based only on filenames, timestamps, or stale handoff prose\nCOMPACT PREFLIGHT\nRun what is available and record exact skips:\ngit rev-parse --show-toplevel\ngit status --short\ngit branch --show-current\ngit log --oneline --decorate -12\ngit worktree list\ngit remote -v\ngh pr list --state open --limit 30\ngh pr status\nIf the worktree is dirty or conflicted:\n- preserve existing work\n- identify the owning branch, files, and likely sprint\n- use or create an isolated worktree when this lane does not own the dirt\n- make repo-floor repair the first sprint only when it is the safest useful move\n- otherwise stop with the exact blocker and safest next command\nREPOSITORY EVIDENCE HARVEST\nInspect the repository before selecting work:\n- local operating law: AGENTS.md, CLAUDE.md, .ai/, skills, workflow rules, CONTRIBUTING, README\n- architecture and entry points: source roots, services, launchers, apps, packages, modules\n- manifests and toolchain: build files, dependency files, task runners, lockfiles, environment contracts\n- recent center of gravity: recent commits, changed files, active branches, open PRs, review comments when available\n- plans and state: docs, status files, roadmaps, handoffs, decision logs, release notes\n- validation surface: tests, validators, linters, type checks, builds, CI workflows, fixtures, smoke scripts\n- harness spine: run context, artifact registry, schemas, workflow specs, reports, hooks, codebase maps\n- agent leverage: repo-local prompts, scoped skills, MCP/LSP or read-only navigation helpers\n- artifacts and output policy: generated files, logs, reports, ignored paths, committed evidence, cleanup rules\n- unresolved signals: TODO, FIXME, XXX, NotImplemented, skipped tests, quarantines, stubs, failing checks\n- runtime and deployment seams: launch scripts, installers, browser flows, target mutation boundaries, safety docs\n- stale or conflicting context: placeholder plans, superseded docs, abandoned branches, contradictory instructions\nEVIDENCE RULES\n- cite exact file paths, commands, commit SHAs, PR numbers, and validator names\n- distinguish FACT, INFERENCE, and UNKNOWN\n- use document content and git history to judge freshness; timestamps alone are weak evidence\n- search existing contracts, helpers, names, scripts, and output patterns before inventing\n- do not expose secrets, credentials, personal data, or huge generated logs\n- do not crawl vendored dependencies or build outputs unless they are directly relevant\n- name unavailable tools and the exact command that should be run later\nBUILD THE REPO EVIDENCE PACK\nProduce a compact operational ledger with these sections:\n1. REPO IDENTITY\n- repo path, branch, HEAD, remotes, worktrees, dirty/conflicted state, open PRs\n2. CURRENT CENTER OF GRAVITY\n- what recent commits and changed files show the repo is actively becoming\n3. ACTIVE WORKSTREAMS\n- feature, harness, cleanup, validation, docs/reporting, runtime proof, release/PR hygiene, research/design\n4. HARNESS INVENTORY\n- present, partial, missing, duplicated, or stale: rules, map, workflows, run context, registry, validators, hooks, skills, reports\n5. PRODUCT / FEATURE INVENTORY\n- implemented surfaces, incomplete surfaces, entry points, and integration boundaries\n6. VALIDATION AND PROOF SURFACE\n- commands, CI jobs, fixtures, artifacts, and the highest proof each can support\n7. UNRESOLVED SIGNALS\n- TODOs, failing or skipped checks, placeholders, stale plans, review requests, unmerged useful work\n8. RISKS AND FORBIDDEN SCOPE\n- mutation risks, credentials, live targets, destructive operations, unrelated rewrite zones\n9. IMPORTANT PATHS\n- the small set of files and directories the next action depends on\nDERIVE THE SPRINT QUEUE\nCreate a ranked list of bounded sprint candidates.\nFor each candidate include:\n- title and lane\n- evidence and why now\n- owned scope and forbidden scope\n- dependencies and collision risks\n- files to inspect and files likely to change\n- expected artifacts\n- validation commands\n- risk and proof ceiling\n- whether it is safe in parallel\nFIRST-SPRINT SELECTION RULES\n- floor before furniture: repair unsafe repo state before feature work\n- shared contracts before reports, dashboards, MCP consumers, or duplicated output shapes\n- unblock the highest number of later sprints with the smallest bounded change\n- prefer a real tested slice over broad documentation or speculative refactoring\n- do not select live mutation or runtime proof when the environment or scope forbids it\nEXECUTE THE FIRST SAFE SPRINT\nState repo, branch, PR/sprint, lane, owned scope, forbidden scope, and expected artifacts.\nThen immediately do one of these:\n1. Modify useful tracked repo files within the selected sprint.\n2. Prove the selected sprint is already complete with committed files and passing checks.\n3. Stop with an exact blocker plus the smallest patch, diff, or file content that should be applied.\nDefault to option 1.\nWork rules:\n- reuse repository patterns\n- keep changes bounded\n- avoid unrelated rewrites\n- add or update tests, validators, scripts, manifests, or operational docs that enforce the behavior\n- do not create a tracked census document merely to narrate the scan\n- persist a repo-intake artifact only when repo conventions or downstream workflows need it\n- keep generated evidence in approved ignored paths unless sanitized tracked evidence is explicitly required\nVALIDATE AND DELIVER\nRun targeted tests, relevant validators/static checks, build checks, and broader checks when practical.\nRun git diff --check, git status --short, git diff --stat, and review the final diff.\nCommit and push or open/update a PR when the environment allows.\nDo not claim a higher proof level than the evidence supports.\nFINAL RESPONSE FORMAT\nREPO EVIDENCE\n- identity, center of gravity, active workstreams, harness gaps, important paths\nSPRINT QUEUE\n- ranked candidates and the first-sprint decision\nWORK COMMITTED\n- summary, files changed, artifacts, commit SHA, push/PR state\nVALIDATION\n- commands, results, skipped checks, proof level reached\nGAPS / RISKS\n- blockers, unknowns, forbidden scope, collision risks\nFINAL GIT STATE\n- git status --short\nNEXT COMMAND\n- one exact command\nDo not include a next-agent prompt. Use P12 only after the repository-derived sprint is complete.", "keywords": ["discovery", "enter repo", "unfamiliar repo", "new repo", "stale repo", "evidence pack", "first sprint", "first commit", "repo analysis"]}, {"id": "P04", "seq": "04", "name": "[PARALLEL] Repo-Aware Sprint + Harness Factoring Distributor", "type": "PLAN", "class": "PLAN / DISTRIBUTE", "sprintRole": "Divide remaining work into bounded lanes", "progress": "No", "useWhen": "Repo state is known but harness, agent, and application work need explicit factoring and ownership.", "inspectFirst": "P03 evidence or current repo state.", "expectedOutput": "Launch order first, ordered copy-panel sprint candidates, plus harness, skill, capability, trigger, and app-logic factoring ledgers.", "nextStep": "Use P05 or P07.", "proofGate": "Dependencies, collision ownership, and exact panel sequence are explicit.", "color": "Amber", "copySheet": "P04_COPY_SAFE", "category": "standard", "copyContent": "You are entering an existing repository with prior chat context and need to factor the remaining work into bounded sprints.\nRepo:\n`xyz_repo_or_path`\nPlan or context path if available:\n`xyz_plan_directory`\nIf the plan path is missing, stale, blank, or placeholder, do not stall.\nInspect the repository, current branch, recent commits, open PRs, worktrees, status docs, handoffs, plans, tests, validators, workflows, artifacts, skills, capabilities, triggers, and current git state.\nPrefer current repository evidence over remembered context.\nCOMPACT PREFLIGHT\nRecord:\n- repo\n- primary local path if known\n- branch\n- head\n- status\n- worktrees\n- open PRs\n- recent center of gravity\n- likely active sprint\n- stale or missing context\nInspect before distributing work:\n- recent commits and changed files\n- open PR diffs, checks, reviews, and dependencies\n- docs, plans, handoffs, and codebase maps\n- schemas, run context, artifact registry, validators, and fixtures\n- workflows, launchers, and runtime evidence\n- agent skills, capabilities, triggers, routing, manifests, MCP/tools, and hooks\n- application services, state machines, adapters, persistence, UI, launchers, and deployment logic\nFACTORING PASS\nClassify each topic into one primary ownership surface:\n- floor or cleanup\n- harness spine\n- agent harness\n- conventional application logic\n- integration seam\n- validation\n- docs/reporting\n- runtime proof\n- research/design\n- unsafe or blocked\nFor agent-harness surfaces, inventory every relevant skill, capability, and trigger.\nFor each, determine whether to keep, create, split, merge, retire, or rewire it.\nRequire deterministic activation conditions, explicit inputs and outputs, preconditions, guardrails, owner, tests, and proof ceiling.\nUse these boundaries:\n- skills are reusable workflow guidance\n- capabilities are reusable operations or tool-backed actions\n- triggers route deterministic conditions to a skill, capability, or workflow\n- product and domain behavior belongs in application code and contracts\n- prompts must not become the only implementation of application logic\nSeparate harness factoring from application-logic factoring when they own different files or proof gates.\nDetect shared-file, shared-schema, shared-workflow, skill, capability, trigger, and PR-stacking collisions before recommending parallel work.\nOUTPUT ORDER — LAUNCH ORDER FIRST\nAnalyze fully, then output in this order:\n1. LAUNCH ORDER\nPut the launch order at the very top.\nName the first chat, proof gate, parallel groups, waiting lanes, and final convergence.\nNumber and title the panels exactly as they will appear.\nDisplay the panels below in that exact order.\nNever use a different display order, category order, or convenience order.\nKeep every parallel group contiguous.\nState: one prompt panel goes into one new chat.\n2. COMPACT COORDINATION PREAMBLE\nInclude repo floor, waves, hard dependencies, safe parallel lanes, collision owners, safety boundary, and proof ceiling.\nThe preamble is not a separately copied prompt fragment.\nDo not output a shared preamble that the operator must paste above each sprint.\n3. NEXT-CHAT SPRINT PANELS\nEmit each complete next-chat prompt in its own separate writing block or copyable panel.\nEach panel must have its own copy control.\nPanels must appear in the exact launch order listed above.\nDo not place all prompts in one code fence.\nDo not place two prompts in one panel.\nDo not make the operator copy global rules from another section.\nEach panel must be self-contained and include:\n- banner and sprint name\n- repo, local path if known, branch, PR, wave, and lane\n- hard dependencies and safe parallel work\n- owned scope and forbidden scope\n- expected artifacts\n- mission\n- read-first files\n- compact preflight\n- numbered tasks\n- safety\n- validation order\n- commit, push, and PR contract when mutation is intended\n- proof level and proof ceiling\n- exact final response contract\n- exact next command\nPut only a short sprint title above each panel and no commentary between panels.\n4. SUPPORTING FACTORING LEDGER\nAfter the panels, provide:\nTOPICS FOUND\nClassify feature, harness, agent harness, application logic, integration, cleanup, validation, docs/reporting, runtime proof, release/PR hygiene, research/design, and blocked topics.\nHARNESS FACTORING\nList run context, artifact registry, schemas, validators, fixtures, workflows, skills, capabilities, triggers, routing, instruction surfaces, manifests, MCP/tools, hooks, and ownership.\nAPPLICATION LOGIC FACTORING\nList domain services, state machines, adapters, persistence, UI, launchers, jobs, deployment orchestration, and ownership.\nSPRINT CANDIDATES\nFor each include title, goal, why now, owned scope, forbidden scope, files to inspect, files likely to change, expected outputs, validation, dependencies, parallel safety, risk level, and proof ceiling.\nRECOMMENDED EXECUTION ORDER\nRepeat only a compact confirmation that the panel sequence matched the launch order.\nDo not introduce a new or different order here.\nPut floor and shared contracts before reports, dashboards, MCP, agents, or UI consumers.\nQUALITY RULES\nBe ambitious but practical.\nAvoid permission theater, duplicate ownership, giant prompts, and trivial-only progress.\nDo not claim higher proof from lower proof.", "keywords": ["plan", "distribute", "factor", "sprint lanes", "work lanes", "harness factoring", "ordering", "dependencies", "parallel lanes", "distributed", "concurrent agents"]}, {"id": "P05", "seq": "05", "name": "[SERIALIZED] Ordered Sprint Plan Pack Generator", "type": "PLAN", "class": "PLAN / PACK", "sprintRole": "Generate a multi-chat launch pack", "progress": "No", "useWhen": "Multiple agents or sequential chats need one-click launch panels, bounded factoring, and proof rules.", "inspectFirst": "Repo evidence, candidate lanes, branch/PR state.", "expectedOutput": "Launch order at the top, compact coordination preamble, then one self-contained copy panel per sprint in that exact order.", "nextStep": "Launch P06/P07/P08 as required.", "proofGate": "Every lane is independently copyable; panel display equals launch order; no shared-preamble assembly.", "color": "Amber", "copySheet": "P05_COPY_SAFE", "category": "standard", "copyContent": "Create a sprint plan pack for parallel or sequential AI chats.\nOPERATING RULE\nOne sprint panel goes into one new chat.\nDo not paste multiple sprint panels into the same chat.\nBuild the pack from the best available context in this chat and, when repo access exists, from current repository evidence.\nPrefer current repo, branch, PR, worktree, test, validator, workflow, artifact, skill, capability, trigger, and CI state over remembered context.\nOUTPUT PRESENTATION CONTRACT\nThe first substantive section must be LAUNCH ORDER.\nDo not begin with a shared copyable preamble.\nDo not require the operator to assemble a prompt from multiple boxes.\nEvery sprint panel must be self-contained.\n1. LAUNCH ORDER — PUT THIS AT THE TOP\nState the first chat to launch, why it is first, the exact proof gate that unlocks later work, every parallel group, waiting lanes, and final convergence.\nNumber and title every sprint exactly as it will appear below.\nThe sprint panels must be displayed in the exact same order as this launch order.\nDo not present panels in category order, numeric convenience order, or any order different from the recommended launch order.\nDo not offer an alternate display order.\nKeep prompts in each parallel group contiguous and label the group once.\nDo not repeat a conflicting launch order at the bottom.\n2. COMPACT COORDINATION PREAMBLE\nAfter the launch order, provide one short readable preamble in normal markdown.\nInclude:\n- repo\n- primary local path if known\n- current branch, main SHA, active PR, or verified floor when known\n- first commands to inspect state\n- dirty or conflicted worktree rule\n- worktree policy\n- proof requirements\n- what must not be committed\n- safety constraints\n- branch and PR expectations\n- wave order\n- hard dependencies\n- safe parallel lanes\n- collision risks and ownership\nKeep this preamble compact enough to scan without repeated scrolling.\nThe preamble is orientation only and is not copied separately into sprint chats.\nEvery panel below repeats the essential rules it needs.\n3. FACTORING PASS\nBefore creating sprint panels, factor the work into these ownership surfaces:\n- floor and cleanup\n- harness spine\n- agent harness\n- conventional application logic\n- integration seams\n- validation\n- docs/reporting\n- runtime proof\n- research/design\nFor the harness spine, identify run context, artifact registry, schemas, validators, fixtures, workflows, proof gates, and shared output contracts.\nFor the agent harness, identify skills, capabilities, triggers, routing, instruction surfaces, manifests, MCP/tools, hooks, and context injection.\nFor conventional application logic, identify domain models, services, state machines, adapters, persistence, UI, launchers, jobs, and deployment orchestration.\nFor every skill, capability, or trigger, decide whether to keep, create, split, merge, retire, or rewire it.\nRecord:\n- canonical owner\n- deterministic activation condition\n- inputs and outputs\n- preconditions and forbidden conditions\n- guardrails\n- tests\n- proof level\n- files and manifests likely to change\nUse these boundaries:\n- skills describe reusable workflow guidance\n- capabilities expose reusable operations or tool-backed actions\n- triggers deterministically route conditions to a skill, capability, or workflow\n- application and domain behavior remains in code and contracts\n- prompts may orchestrate work but must not become the only implementation of product logic\nCreate separate factoring sprints when agent harness work and application logic own different files, contracts, or proof gates.\n4. PROOF TAXONOMY\nDefine only the proof levels relevant to the application, including when applicable:\n- contract proof\n- harness proof\n- static test proof\n- build proof\n- launcher or browser proof\n- command ACK proof\n- movement or behavior observed proof\n- live runtime proof\n- deployment completion proof\n- operator acceptance proof\nState clearly: do not claim a higher proof level from a lower one.\nInclude concrete non-equivalences such as unit PASS not equaling launcher proof, command ACK not equaling observed behavior, and fixture E2E not equaling live runtime proof.\n5. WAVES, DEPENDENCIES, AND COLLISIONS\nGroup work into:\n- Wave 0: clean or prove the floor\n- Wave A: harness spine\n- Wave B: conventional application and product reliability\n- Wave C: agent harness leverage\n- Wave D: integration and cleanup\nUse the floor-before-furniture rule:\nReports, dashboards, catalogs, MCP, skills, agents, and UI layers may not invent output shapes before canonical run context and artifact registry contracts exist.\nName which sprint establishes the floor and which later sprints must wait.\nName:\n- hard dependencies\n- soft dependencies\n- safe parallel lanes\n- shared-file collision risks\n- shared-schema collision risks\n- shared-workflow collision risks\n- skill, capability, and trigger ownership collisions\n- branch and PR stacking risks\n- the single owner for each shared surface\nDo not assign the same shared file, schema, workflow, skill, capability, or trigger to multiple simultaneous sprint owners.\n6. SPRINT PANELS\nImmediately after the preamble, output every sprint as its own separate writing block or copyable panel.\nEach panel must have its own copy control.\nOrder the panels in the exact launch order stated at the top.\nDo not put all sprint prompts in one giant code fence.\nDo not put two sprint prompts in one panel.\nDo not place long analysis between sprint panels.\nDo not require the operator to combine text from multiple sections.\nPut only a short sprint title immediately above each panel.\nEvery panel must contain the complete prompt to paste into one new AI chat.\nEvery sprint panel must include:\nBANNER\nSPRINT NAME\nREPO\nPRIMARY LOCAL PATH\nBRANCH\nPR, IF KNOWN\nWAVE\nLANE\nDEPENDENCIES\nSAFE PARALLEL WORK\nOWNED SCOPE\nFORBIDDEN SCOPE\nEXPECTED ARTIFACTS\nMISSION\nREAD FIRST\nCOMPACT PREFLIGHT\nDIRTY WORKTREE RULE\nTASKS\nSAFETY\nVALIDATION\nCOMMIT AND PUSH CONTRACT\nPROOF CONTRACT\nFINAL RESPONSE CONTRACT\nEXACT NEXT COMMAND\nCOMPACT PREFLIGHT must include at minimum:\ngit rev-parse --show-toplevel\ngit status --short\ngit branch --show-current\ngit log --oneline --decorate -12\ngit worktree list\ngit remote -v\ngit fetch --all --prune\ngh pr list --state open --limit 50\ngh pr status\nAdd exact PR inspection commands when relevant.\nDIRTY WORKTREE RULE must require preserving unknown work, avoiding destructive cleanup, and using an isolated worktree when the sprint does not own the dirt.\nTASKS must be numbered and name exact files, contracts, scripts, validators, tests, skills, capabilities, triggers, workflows, and artifacts when evidence supports them.\nVALIDATION must list targeted tests, validators, static checks, build or launcher checks, broader regressions, git diff and status checks, and final CI in execution order.\nCOMMIT AND PUSH CONTRACT must require:\ngit diff --check\ngit status --short\ngit diff --stat\ngit diff\ngit add <changed tracked files>\ngit commit -m \"<useful message>\"\ngit push -u origin <branch>\nRequire opening or updating the correct PR when appropriate.\nPROOF CONTRACT must require proof level reached, supporting evidence, proof ceiling, and missing live or operator evidence.\nFINAL RESPONSE CONTRACT must require:\nCONTEXT\nCOMPLETED WORK\nVALIDATION\nGENERATED ARTIFACTS\nKNOWN GAPS / RISKS\nSKIPPED CHECKS\nFINAL GIT STATE\nNEXT COMMAND\nNEXT-AGENT HANDOFF\nRequire changed files, commits, PR URL, validation output, artifact paths, git status, skipped checks with exact later commands, and the next bounded owner.\n7. EXECUTION REQUIREMENT\nEvery sprint panel must tell the new chat to execute repository work and not stop at a plan.\nRequire at least one useful repository or GitHub mutation unless the sprint is already proven complete or an exact blocker prevents safe mutation.\nA valid result must include changed tracked files, a commit SHA, push or PR mutation, branch or worktree mutation, merge or cherry-pick evidence, or an exact blocker with the smallest useful patch or diff.\n8. SUPPORTING LEDGER\nAfter all panels, include the factoring ledger, dependency map, collision ledger, proof taxonomy, and supporting rationale.\nThis ledger may explain the launch order but may not change it.\nDo not add a second alternative order.\nFINAL QUALITY RULES\nMake the pack practical, bold, compact, and executable.\nOptimize for one-click copying, minimal scrolling, self-contained prompts, explicit ownership, and clean agent handoff.\nDo not optimize only for reading.\nDo not output one monolithic markdown document containing all sprint prompts in one code fence.\nDo not hide operational instructions outside the sprint panels.\nDo not allow skills, capabilities, triggers, or application logic to remain unfactored when they create separate ownership or proof requirements.", "keywords": ["launch pack", "multi chat", "sprint plan", "copy panel", "one click", "writing panel", "parallel lanes", "sequential", "serialized", "ordered steps"]}, {"id": "P06", "seq": "06", "name": "Repo / PR Cleanup Executor", "type": "CLEANUP", "class": "REPO / PR CLEANUP", "sprintRole": "Clean repo and PR state with preservation-first authority", "progress": "YES", "useWhen": "The user wants cherry-picks, repairs, merges, comments, branch mutations, and PR closure.", "inspectFirst": "Branches, worktrees, open PRs, unique commits, checks, dependencies.", "expectedOutput": "Preserved useful work, repaired/merged/closed PRs, clean base.", "nextStep": "Use P07 for remaining feature work or P12 to close.", "proofGate": "Actual Git/GitHub mutations and disposition proof.", "color": "Blue", "copySheet": "P06_COPY_SAFE", "category": "standard", "copyContent": "CLEAN THE REPOSITORY AND PR FLOOR. CHERRY-PICK FIRST; REPAIR, MERGE, COMMENT, AND CLOSE. DO NOT STOP AT ANALYSIS.\nRepo: xyz_repo_or_path\nSprint: xyz_sprint_name\nOwned scope: xyz_owned_scope\nForbidden scope: xyz_forbidden_scope\nContext or plan path: xyz_plan_directory\nValidation order: xyz_validation_order\nMISSION\nLeave the repository, branches, worktrees, and pull requests cleaner than you found them.\nYou have full authority inside owned scope to preserve useful work, create safe branches or worktrees, cherry-pick commits, repair PR branches, commit, push, update PR metadata, comment, label, retarget, mark draft or ready, merge, and close superseded PRs.\nThe default posture is preservation-first, not deletion-first.\nCherry-pick unique useful work before closing or abandoning its source PR.\nRespect explicit validation order. When the user says to save Pester, survey, integration, or other expensive checks for last, do that.\nDO NOT ANSWER WITH\n- a repo or PR inventory only\n- a cleanup plan only\n- a list of commands the user should run\n- a request for permission when authority and scope are already explicit\n- a destructive cleanup proposal that has not preserved unique work\n- a handoff instead of repository or PR mutations\nCOMPACT PREFLIGHT\nRun what is available:\ngit status --short\ngit branch --show-current\ngit log --oneline --decorate -8\ngit worktree list\ngit fetch --all --prune\ngh pr list --state open --limit 50\ngh pr status\nIf the primary worktree is dirty, conflicted, stale, or owned by another lane:\n- preserve it\n- use an existing safe worktree or create an isolated cleanup worktree\n- never discard uncommitted work merely to obtain a clean base\nPR DISPOSITION MAP\nClassify every in-scope PR or branch:\n- merge-ready\n- repairable in place\n- unique commits to cherry-pick\n- superseded after preservation\n- duplicate with no unique value\n- blocked by CI, review, credentials, or base divergence\n- intentionally deferred until later validation\nPRESERVATION-FIRST RULES\n- inspect commit and file deltas before deciding\n- preserve unique commits on an integration or destination branch\n- prefer cherry-pick, revert, restore, or bounded branch repair over deletion\n- merge clean green predecessors in dependency order\n- close a PR only after its useful work is merged, cherry-picked, replaced, or proven unnecessary\n- leave a concise closing comment naming where useful work went\n- do not delete remote branches unless explicitly requested or clearly allowed by repo policy after preservation proof\n- do not force-push unless explicitly authorized and no safer repair exists\nEXECUTION\nPerform useful repo or PR mutations immediately.\nValid movement includes:\n- creating a branch or worktree\n- cherry-picking or reverting commits\n- restoring unrelated file drift\n- resolving conflicts\n- committing and pushing cleanup\n- updating PR title, body, base, labels, reviewers, draft state, or comments\n- merging a PR\n- closing a superseded or duplicate PR after preservation\n- proving that an already-complete cleanup requires no further mutation\nDo not require a tracked-file edit when the sprint deliverable is a valid Git or GitHub mutation.\nVALIDATION\nValidate in the user-declared order.\nUse the strongest practical checks appropriate to changed behavior.\nAlways review:\ngit diff --check\ngit status --short\ngit log --oneline --decorate -12\ngit branch -vv\nFor PR work, also inspect:\ngh pr checks <number>\ngh pr view <number>\ngh pr diff <number>\nFINAL RESPONSE\nCONTEXT\n- repo:\n- branch/worktree:\n- sprint:\n- owned scope:\n- forbidden scope:\n- validation order honored:\nOPERATIONS COMPLETED\n- branches/worktrees created or reused:\n- commits cherry-picked/reverted/restored:\n- code/doctrine/docs changed:\n- pushes:\n- PR comments/labels/base/draft/review mutations:\n- PRs merged:\n- PRs closed:\n- useful work preservation destination:\nPR DISPOSITION\n- PR:\n- prior state:\n- action:\n- resulting state:\n- evidence:\nVALIDATION\n- command:\n- result:\n- deferred checks run last:\n- skipped checks and exact reason:\nFINAL GIT / PR STATE\n- git status --short:\n- open PRs remaining:\n- blocked PRs:\n- clean base for next sprint:\nNEXT COMMAND\n- one exact command, or `none; cleanup complete`\nA final answer without actual repo/PR mutations, preservation proof, an exact blocker, or proof that cleanup was already complete is invalid.\nClean the repo. Preserve useful work. Merge and close what is ready. Then stop.", "keywords": ["cleanup", "pr cleanup", "branches", "worktrees", "cherry pick", "preserve", "merge", "close pr", "clean state"]}, {"id": "P07", "seq": "07", "name": "Repo Sprint Executor", "type": "BUILD", "class": "SPRINT / BUILD + MUTATE", "sprintRole": "Execute any bounded repo change", "progress": "YES", "useWhen": "The sprint is known and must change code, doctrine, docs, branches, comments, PRs, contracts, or releases.", "inspectFirst": "Repo patterns, branch state, tests, validators, diff, mutation capability.", "expectedOutput": "Committed or remotely mutated repo progress with validation.", "nextStep": "Use P11 or P12.", "proofGate": "Commit or concrete Git/GitHub mutation evidence.", "color": "Green", "copySheet": "P07_COPY_SAFE", "category": "standard", "copyContent": "EXECUTE THE REPO SPRINT. DO NOT REWRITE THIS PROMPT.\nRepo: xyz_repo_or_path\nSprint: xyz_sprint_name\nOwned scope: xyz_owned_scope\nForbidden scope: xyz_forbidden_scope\nContext or plan path: xyz_plan_directory\nYour job is to change the repository, validate the change, commit it, and push or open/update a PR when the environment allows.\nDo not answer with:\n- a corrected prompt\n- a plan only\n- a handoff only\n- a summary of what should be done\n- a request for permission when the task is scoped and safe\n- preflight notes without repo changes\nIf you respond by writing a better prompt instead of committing repo work, you failed.\nStart with only enough preflight to avoid damaging existing work:\ngit status --short\ngit branch --show-current\ngit log --oneline --decorate -5\nIf the worktree is dirty or conflicted:\n- if this sprint owns cleanup, repair it safely\n- otherwise create or use an isolated worktree\n- if neither is possible, stop with the exact blocker and the safest next command\nIf the plan path is missing, stale, blank, or placeholder, do not stall.\nInspect repo evidence: recent commits, open PRs, handoff docs, plan docs, validators, tests, scripts, artifacts, and current branch state.\nProceed from the clearest current context.\nImplementation rule:\nAfter preflight, immediately do one of these:\n1. Modify tracked repo files within owned scope.\n2. Prove the sprint is already complete with existing committed files and passing checks.\n3. Stop with an exact blocker plus the smallest patch, diff, or file content that should be applied.\nDefault to option 1.\nMinimum movement:\nAt least one useful repository mutation must occur unless the sprint is already complete or blocked. Valid movement includes tracked-file changes, commits, branch or worktree creation, cherry-picks, merges, pushes, PR comments, labels, base or draft changes, PR closure, or other owned Git/GitHub mutations.\nWork rules:\n- reuse existing repo patterns before inventing\n- keep changes bounded\n- avoid unrelated rewrites\n- prefer tests, validators, scripts, docs, or manifests that enforce behavior\n- when run context, artifact registry, schemas, shared output contracts, or their validators are in owned scope, implement them here\n- do not turn real behavior into stubs just to pass tests\n- do not commit secrets, personal data, huge logs, crash dumps, generated runtime evidence, or machine-local junk\n- do not hide behind missing context when repo evidence can answer the question\n- repository work may include code, doctrine, docs, comments, branches, worktrees, cherry-picks, merges, PR mutations, and releases when those actions are inside owned scope\nValidation:\nRun the strongest practical checks available:\n1. targeted tests for changed behavior\n2. relevant validators or static checks\n3. build checks\n4. broader checks when practical\nIf a check is skipped, say why and name the exact command that should be run later.\nCommit and push contract:\ngit diff --check\ngit status --short\ngit diff --stat\ngit diff\ngit add <changed tracked files>\ngit commit -m \"<useful message>\"\ngit push -u origin <branch>\nOpen or update a PR when appropriate.\nFinal response must not include a next-agent prompt.\nFinal response format:\nCONTEXT\n- repo:\n- branch:\n- sprint:\n- scope:\n- forbidden scope:\nWORK COMMITTED\n- summary:\n- files changed:\n- commit SHA:\n- pushed: yes/no\n- PR: URL or not opened\nVALIDATION\n- command:\n- result:\n- skipped checks:\nBLOCKERS / GAPS\n- blocker:\n- gap:\n- risk:\nFINAL GIT STATE\n- git status --short:\nNEXT COMMAND\n- one exact command:\nA final response without a commit SHA, concrete Git/GitHub mutation evidence, patch/diff, exact blocker, or proof that the work was already complete is invalid.\nDo the repo work. Commit it. Then stop.", "keywords": ["sprint executor", "implement", "code change", "mutation", "commit", "bounded change", "general build", "code", "doctrine change", "docs change"]}, {"id": "P08", "seq": "08", "name": "Live Runtime Proof Executor", "type": "RUNTIME PROOF", "class": "RUNTIME / PROVE", "sprintRole": "Prove live behavior safely", "progress": "Conditional", "useWhen": "Static checks cannot prove the requested behavior.", "inspectFirst": "Safety docs, launchers, sessions, runtime logs, proof chain.", "expectedOutput": "Observed behavior proof or honest bounded failure.", "nextStep": "Use P12.", "proofGate": "Observed behavior is not confused with ACK/static proof.", "color": "Rose", "copySheet": "P08_COPY_SAFE", "category": "standard", "copyContent": "You are executing a live/runtime proof sprint.\nRepo:\n`xyz_repo_or_path`\nSprint:\n`xyz_runtime_sprint`\nLane:\nruntime proof / live behavior evidence\nScope:\nprove the specific app/game/browser/service behavior under controlled conditions\nForbidden scope:\nunrelated feature work, personal data mutation, save/account mutation, free resources, broad refactors, lower-proof success claims\nDependency:\nDo not start until repo floor/hygiene is known safe and required launcher/focus/session safety is in place. If dependency is skipped, state why.\nBefore runtime:\n- stop the app/game/service first if required by repo doctrine\n- use repo-owned launcher/session scripts\n- do not rely on terminal focus\n- bound every wait\n- use disposable/safe state only\n- do not mutate personal saves/accounts/data\nRequired proof chain:\n- stop/safe-start completed if required\n- launcher/session attach succeeded\n- target surface ready\n- command or trigger issued\n- command ACK observed if applicable\n- behavior actually observed\n- runtime artifact/log collected\n- failure reason captured if behavior did not occur\nProof rule:\nDo not claim live runtime proof from static tests, contract checks, launcher proof, command ACK, or route/request issuance alone. Name the exact proof level reached.\nValidation:\n- targeted build/test before runtime\n- runtime proof collection\n- log/artifact grep proving the required chain\n- git diff --check\n- git status --short\nFinal response:\nruntime state used, completed work, live proof chain, validation output, generated artifacts/logs, changed files, known gaps/risks, git status, exact next command, PR URL if opened.", "keywords": ["runtime", "live proof", "behavior proof", "observed behavior", "live test", "runtime safety", "stop condition"]}, {"id": "P09", "seq": "09", "name": "Read-Only Code Intelligence Catalog", "type": "LEVERAGE", "class": "LEVERAGE / NAVIGATE", "sprintRole": "Reduce rediscovery with read-only intelligence", "progress": "Support", "useWhen": "Agents repeatedly waste time finding seams, symbols, contracts, or entry points.", "inspectFirst": "Codebase maps, MCP/LSP docs, source roots, workflow contracts.", "expectedOutput": "Read-only navigation tools, catalogs, and tests.", "nextStep": "Use P07 faster.", "proofGate": "Navigation prerequisites and limits are honest.", "color": "Purple", "copySheet": "P09_COPY_SAFE", "category": "standard", "copyContent": "You are building a read-only code intelligence catalog for this repo.\nRepo:\n`xyz_repo_or_path`\nSprint:\nRead-only MCP/LSP/code intelligence catalog\nLane:\nlocal agent leverage\nScope:\ndeterministic read-only tools or docs that help future agents find policies, contracts, services, commands, handlers, and runtime seams without grep chaos\nForbidden scope:\nruntime execution, target mutation, command inbox writes, ignored evidence reads by default, secret exposure, gameplay/product mutation\nRead first:\n- codebase map if present\n- MCP/LSP docs if present\n- workflow contracts\n- harness scripts\n- src/app code\n- docs/handoff relevant to runtime or harness\nInitial tool/catalog ideas:\n- find_runtime_seam\n- find_command_handler\n- find_harness_contract\n- find_policy_source\n- find_workflow_spec\n- find_artifact_schema\n- outline_service\n- outline_harness_script\nRules:\n- read tracked docs/code/contracts by default\n- exclude ignored logs, saves, runtime evidence, generated artifacts, and secrets\n- return concise structured results\n- symbol-backed tools must report missing_prereqs if LSP/project load is unavailable\n- do not claim symbol navigation if only grep worked\nTests must prove:\n- catalog exists\n- allowed tools are read-only\n- ignored evidence roots are excluded\n- policy lookup finds docs\n- result shape is JSON-serializable\n- missing LSP reports planned/missing/missing_prereqs honestly\n- no runtime execution strings appear in read-only catalog\nFinal response:\ntool list, query examples, tests run, missing dependency behavior, gaps/risks, git state, exact next command, PR URL if opened.", "keywords": ["navigation", "code intelligence", "read only", "symbol", "entry point", "codebase map", "seam", "contract"]}, {"id": "P10", "seq": "10", "name": "Local Hook and Artifact Hygiene", "type": "SAFETY", "class": "SAFETY / HYGIENE", "sprintRole": "Prevent secrets and generated junk from reaching commits", "progress": "Support", "useWhen": "Logs, evidence, secrets, or local artifacts threaten repo cleanliness.", "inspectFirst": "Ignore rules, hooks, artifact paths, staged-file patterns.", "expectedOutput": "Guardrails, hooks, validators, and cleanup guidance.", "nextStep": "Use P11.", "proofGate": "Bad staged artifacts are blocked or warned.", "color": "Peach", "copySheet": "P10_COPY_SAFE", "category": "standard", "copyContent": "You are adding local hook and artifact hygiene.\nRepo:\n`xyz_repo_or_path`\nSprint:\nLocal hook and artifact hygiene\nLane:\nrepo hygiene / safety rails\nScope:\nprevent generated evidence, logs, saves, local tool installs, crash dumps, secrets, and machine-local junk from leaking into commits\nForbidden scope:\nproduct behavior changes, runtime execution, mandatory global hooks, broad blockers that slow normal code/docs work\nRead first:\n- .gitignore\n- .githooks if present\n- hook installer if present\n- harness docs\n- artifact/output conventions\n- existing tests around generated/runtime artifacts\nRequired behavior:\n- hooks remain local opt-in unless repo already has mandatory policy\n- generated/live/runtime evidence is blocked or warned clearly\n- sanitized fixtures/docs remain commit-friendly\n- hook output tells the operator what to do next\n- no sensitive excerpts printed\n- no broad blocking of normal docs/code changes\nGood error wording:\n[harness] refusing staged generated/runtime artifact: <path>\nMove live/generated evidence back to ignored local output, or commit a sanitized fixture under an approved fixture/docs path.\nTests must prove:\n- installer configures local hooks if installer exists\n- pre-commit blocks obvious generated/runtime evidence\n- remediation guidance appears\n- sanitized fixtures are allowed\n- docs/code are not broadly blocked\n- hooks do not execute runtime/launcher/network activity\n- hooks do not print sensitive excerpts\nFinal response:\nhook behavior before/after, files changed, tests run, safety proof, false-positive notes, git state, exact next command, PR URL if opened.", "keywords": ["hygiene", "secrets", "hooks", "artifact hygiene", "clean", "ignore", "leak prevention", "generated junk"]}, {"id": "P11", "seq": "11", "name": "End-to-End Harness Validator", "type": "VALIDATE", "class": "VALIDATE / GATE", "sprintRole": "Aggregate proof into one command", "progress": "Proof", "useWhen": "Implementation needs a repeatable PASS/SKIP/FAIL gate.", "inspectFirst": "Tests, validators, schemas, fixtures, workflows, reports.", "expectedOutput": "Validation matrix and machine-readable result.", "nextStep": "Use P12.", "proofGate": "Skipped checks are not reported as passes.", "color": "Teal", "copySheet": "P11_COPY_SAFE", "category": "standard", "copyContent": "You are building an end-to-end synthetic harness validator.\nRepo:\n`xyz_repo_or_path`\nSprint:\nOne-command harness proof\nLane:\nvalidation / harness proof\nScope:\noffline/synthetic validator that aggregates safe harness checks and prints an honest PASS/SKIP/FAIL matrix\nForbidden scope:\nlive runtime execution, network probing, launcher execution, target mutation, save/account mutation, secret collection\nRead first:\n- existing validators\n- run context / artifact registry if present\n- report renderer if present\n- workflow specs\n- MCP/LSP readiness if present\n- hook/artifact hygiene if present\nExpected output:\nAPP HARNESS VALIDATION\n[PASS] required files\n[PASS] run context\n[PASS] artifact registry\n[PASS] report renderer\n[SKIP] optional MCP symbol smoke: lsp_project_not_loaded\n[PASS] hook hygiene\nResult:
